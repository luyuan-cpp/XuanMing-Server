// Pandora MatchService 协议。
//
// 职责(docs/design/go-services.md §2.8):撮合 5v5
// 流程:enqueue → MMR 撮合 → 凑齐 10 → 确认期(15s)→ 全确认 → 拉 DS → 发 ds_addr
//
// ⚠️ 推送架构(ds-arch.md §0.8):
//   go-zero zrpc 不支持 gRPC server stream。
//   "匹配进度变化"(QUEUEING / FOUND / CONFIRM / READY 各阶段)通过 kafka topic
//   `pandora.match.progress`(key=player_id)推给玩家所在 Hub DS,DS 转 UE ClientRPC。
//   本 service **不提供** StreamMatchProgress RPC,客户端按需调 GetMatchProgress 拉一次。

syntax = "proto3";

package pandora.match.v1;

import "pandora/common/v1/errcode.proto";

service MatchService {
  rpc StartMatch(StartMatchRequest) returns (StartMatchResponse);
  rpc CancelMatch(CancelMatchRequest) returns (CancelMatchResponse);
  rpc ConfirmMatch(ConfirmMatchRequest) returns (ConfirmMatchResponse);
  rpc GetMatchProgress(GetMatchProgressRequest) returns (GetMatchProgressResponse);

  // ReleaseMatch 释放一场已结束(结算 / abandoned)对局的全部撮合状态:
  // 删每个成员的 player→ticket 归属(SETNX claim)、本局全部排队票据、match 镜像、active 索引。
  // 后端内部接口(battle_result 结算落库后调用),不经 Envoy / 不带玩家 JWT,
  // 按 match_id(+ 兜底 player_ids)操作,非玩家鉴权路径。幂等:重复调用 / 已释放均安全。
  rpc ReleaseMatch(ReleaseMatchRequest) returns (ReleaseMatchResponse);
  // 内部恢复权威读取：login 合并 placement 时使用，不直接暴露给客户端。
  rpc ResolvePlayerMatchContext(ResolvePlayerMatchContextRequest) returns (ResolvePlayerMatchContextResponse);
}

enum MatchStage {
  MATCH_STAGE_UNSPECIFIED = 0;
  MATCH_STAGE_QUEUEING    = 1;
  MATCH_STAGE_FOUND       = 2;  // 凑齐 10 人
  MATCH_STAGE_CONFIRM     = 3;  // 等待玩家确认
  MATCH_STAGE_ALLOCATING  = 4;  // 拉 DS 中
  MATCH_STAGE_READY       = 5;  // DS 就绪,可以连
  MATCH_STAGE_FAILED      = 6;
}

// MatchAllocationPhase 是 ALLOCATING 阶段的持久推进游标。
// MatchStage 决定客户端可见阶段；本枚举只供服务端 worker 在进程重启、RPC 取消后续跑。
enum MatchAllocationPhase {
  MATCH_ALLOCATION_PHASE_UNSPECIFIED = 0;
  MATCH_ALLOCATION_PHASE_PENDING     = 1;  // 已由最后一次确认提交，等待 worker
  MATCH_ALLOCATION_PHASE_REQUESTING  = 2;  // 可幂等重放 AllocateBattle(match_id)
  MATCH_ALLOCATION_PHASE_COMPLETED   = 3;  // READY 已持久化
  MATCH_ALLOCATION_PHASE_FAILED      = 4;  // 已明确失败并转 MATCH_STAGE_FAILED
  MATCH_ALLOCATION_PHASE_ABORTING    = 5;  // exact target 已 fenced，唯一合法推进是 signed abort 重试
}

// MatchStartPhase 是 StartMatch 持久 saga 的推进阶段。RPC 只负责落 ACCEPTED；
// 后台 worker 完成票据主体、成员 claim 与最终入队，进程重启后可从任一阶段续跑。
enum MatchStartPhase {
  MATCH_START_PHASE_UNSPECIFIED  = 0;
  MATCH_START_PHASE_ACCEPTED     = 1;
  MATCH_START_PHASE_TICKET_READY = 2;
  MATCH_START_PHASE_CLAIMING     = 3;
  MATCH_START_PHASE_CLAIMS_READY = 4;
  MATCH_START_PHASE_QUEUED       = 5;
  MATCH_START_PHASE_COMPENSATING = 6;
  MATCH_START_PHASE_FAILED       = 7;
}

enum PlayerMatchContextState {
  PLAYER_MATCH_CONTEXT_STATE_UNSPECIFIED = 0; // UNKNOWN：读取错误/索引漂移/坏记录
  PLAYER_MATCH_CONTEXT_STATE_NONE        = 1; // start index 与 player claim 均明确不存在
  PLAYER_MATCH_CONTEXT_STATE_ACTIVE      = 2;
}

enum PlayerMatchResumeStage {
  PLAYER_MATCH_RESUME_STAGE_UNSPECIFIED = 0;
  PLAYER_MATCH_RESUME_STAGE_STARTING    = 1;
  PLAYER_MATCH_RESUME_STAGE_QUEUED      = 2;
  PLAYER_MATCH_RESUME_STAGE_CONFIRMING  = 3;
  PLAYER_MATCH_RESUME_STAGE_ALLOCATING  = 4;
  PLAYER_MATCH_RESUME_STAGE_READY       = 5;
}

message StartMatchRequest {
  uint64 team_id = 1;
  // map_id:玩家选择的副本编号(对齐策划 g_关卡.xlsx 的关卡 id)。0 = 用服务端默认副本
  // (向后兼容:老客户端不填 → matchmaker 回退 cfg.Match.MapId)。同一 game_mode 内不同
  // map_id 的票据分池撮合(不会被凑进同一局),透传到 AllocateBattle 决定 DS 加载哪张图。
  uint32 map_id = 2;
}

message StartMatchResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 match_id = 2;
}

message CancelMatchRequest {
  uint64 match_id = 1;
  uint64 player_id = 2;
}

message CancelMatchResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ConfirmMatchRequest {
  // player_id 已删:身份以 JWT x-pandora-player-id 为准;字段号 1 勿复用(老客户端仍会发)。
  reserved 1;
  reserved "player_id";
  uint64 match_id  = 2;
  bool   accept    = 3;  // false = 拒绝
}

message ConfirmMatchResponse {
  pandora.common.v1.ErrCode code = 1;
}

message GetMatchProgressRequest {
  // 客户端句柄:match_id(已撮合)或 ticket_id(排队中)。
  // 重新登录 / 换设备丢了句柄时填 0,服务端按 JWT player_id 反查本人当前票据(重连兜底)。
  // 鉴权以 JWT player_id 为准:仅本局成员可查,match_id 不是授权凭证。
  uint64 match_id = 1;
}

message GetMatchProgressResponse {
  pandora.common.v1.ErrCode code = 1;
  MatchProgress progress = 2;
}

// ReleaseMatch:对局结束(结算 / abandoned)后释放撮合状态。
// player_ids 为兜底:match 镜像若已过 TTL 消失,仍可凭它清掉残留的 player→ticket 归属(SETNX claim),
// 保证玩家回 Hub 后能立即再次 StartMatch(不被 ErrMatchAlreadyMatching 拒)。
message ReleaseMatchRequest {
  uint64 match_id = 1;
  repeated uint64 player_ids = 2;  // 兜底:match 镜像已过期时据此清 player 归属
}

message ReleaseMatchResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ResolvePlayerMatchContextRequest {
  uint64 player_id = 1;
}

message ResolvePlayerMatchContextResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerMatchContextState state = 2;
  PlayerMatchResumeStage stage = 3;
  uint64 ticket_id = 4;
  uint64 match_id = 5;
  string battle_ds_addr = 6;
  string battle_ticket = 7;
  uint64 placement_version = 8;
  string placement_operation_id = 9;
  string game_mode = 10;
  // [proto] 本局副本编号(语义同 MatchProgress.map_id):QUEUED 时来自 ticket,
  // 有 match 记录时来自 match;0 = 未指定/默认。冷启动/换设备恢复据此预置关卡上下文。
  uint32 map_id = 11;
}

message MatchProgress {
  uint64     match_id              = 1;
  MatchStage stage                 = 2;
  int32      queue_seconds         = 3;
  int32      estimated_wait_seconds = 4;
  // ALLOCATING / READY 时填
  string battle_ds_addr = 5;
  string battle_ticket  = 6;
  // FOUND / CONFIRM 时填
  repeated uint64 team_a = 7;  // 5 人 player_id
  repeated uint64 team_b = 8;
  // 9-19 reserved
  reserved 9 to 19;
  // [proto] 本局副本编号(g_关卡.xlsx 关卡 id,uint32 配置表 ID,CLAUDE.md §9.12)。
  // 权威源 MatchTicketStorageRecord/MatchStorageRecord.map_id;票据/对局已知即填。
  // 客户端在收到 READY 时(ClientTravel 之前)据此预置关卡上下文 NextLevel,
  // 不再等 DS 握手后按地图包名反查(同资源多关卡行会歧义)。
  // 0 = 未指定(服务端默认副本),客户端保留地图名反查兜底。
  uint32 map_id = 20;
}

// ===== Kafka 推送 payload =====
//
// topic: pandora.match.progress
// key:   player_id
// 消费方:Hub DS,转 UE ClientRPC 给客户端。
//
// 客户端首次进匹配可以调 GetMatchProgress 拉一次,之后被动接收推送。

// MatchPushEventType 是 pandora.match.progress **域内的事件类型判别键**,
// 填入 PushFrame.event_type(见 pandora/push/v1/push.proto §event_type)。
//
// 作用:pandora.match.progress 这一个 topic 下要承载多种「结构不同」的事件 message;
//       客户端按 (topic=pandora.match.progress, event_type) 定位该反序列化哪个 message。
//       域内加新事件类型**不新增 topic**(拒绝 topic 爆炸)。
//
// 编号规则:**每域独立**(match 的 1 与 team 的 1 无关);**0 永远 = 现有 MatchProgressEvent**
// (兼容正在游戏中的老客户端:老 producer 不填→缺省 0→旧事件);枚举值只增不复用。
enum MatchPushEventType {
  MATCH_PUSH_EVENT_TYPE_UNSPECIFIED = 0;  // = MatchProgressEvent(旧事件,向后兼容)
  // 将来新增(示例,当前未启用):
  //   MATCH_PUSH_EVENT_TYPE_CANCELLED = 1;  // payload=MatchCancelledEvent
}

message MatchProgressEvent {
  MatchProgress progress     = 1;
  uint64        to_player_id = 2;  // 接收推送的玩家(也是 kafka key)
  int64         ts_ms        = 3;
  // 4-9 reserved
  reserved 4 to 9;
}

// ===== 服务端存储快照(Redis value,protobuf bytes)=====
//
// CLAUDE.md §5.8/§5.10:存储快照用 <Domain>StorageRecord,与客户端可见结构
// (MatchProgress)分开,禁止值拷贝 proto message(克隆用 proto.Clone)。
//
// Redis key 模板(uint64 用 %d;<mode> = game_mode,空则退回无模式段的旧全局 key):
//   pandora:match:<mode>:queue   → ZSET(score=avg_mmr,member=ticket_id),撮合池(按 game_mode 隔离)
//   pandora:match:ticket:%d      → MatchTicketStorageRecord proto bytes
//   pandora:match:{%d}           → MatchStorageRecord proto bytes(hashtag 锁 cluster slot)
//   pandora:match:player:%d      → ticket_id(string,SETNX,落"一人只在一个队列";故意全局不分模式)
//   pandora:match:<mode>:active  → ZSET(score=confirm_deadline_ms,member=match_id),确认期超时扫描

// MatchConfirmStatus 是确认期内单个玩家的确认状态。
enum MatchConfirmStatus {
  MATCH_CONFIRM_STATUS_UNSPECIFIED = 0;
  MATCH_CONFIRM_STATUS_PENDING     = 1;  // 等待玩家确认
  MATCH_CONFIRM_STATUS_ACCEPTED    = 2;  // 已接受
  MATCH_CONFIRM_STATUS_REJECTED    = 3;  // 已拒绝
}

// MatchMemberStorageRecord 是 match 内单个玩家的存储快照。
message MatchMemberStorageRecord {
  uint64             player_id = 1;
  uint64             team_id   = 2;  // 玩家所属 team(整队进出,不可拆)
  int32              mmr       = 3;
  uint32             hero_id   = 4;
  // match-local 战斗阵营。它独立于 team_id/guild_id：多个队伍可同阵营，
  // 同一局也可使用 0..N 的多个阵营；当前 5v5 仍使用 0/1。
  int32              side      = 5;
  MatchConfirmStatus confirm   = 6;  // 确认期状态
  // 7-9 reserved
  reserved 7 to 9;
}

// MatchTicketStorageRecord 是排队票据(一个 team = 一张票)。
message MatchTicketStorageRecord {
  uint64                            ticket_id     = 1;
  uint64                            team_id       = 2;
  uint64                            captain_id    = 3;
  repeated MatchMemberStorageRecord members       = 4;
  int32                             avg_mmr       = 5;  // 队伍平均 MMR(ZSET score)
  int64                             enqueued_at_ms = 6;  // 进队列时间(放宽窗口 + 退回保留排队时长用)
  uint64                            match_id      = 7;  // 被撮合进的 match;未撮合时为 0
  // 8-9 reserved
  reserved 8 to 9;
  uint32                            map_id        = 10;  // 选择的副本编号(g_关卡.xlsx),0=默认;同 game_mode 内按此分池撮合
  string                            game_mode     = 11;  // canonical queue namespace; mutation RPC must match
}

// MatchStorageRecord 是一场已撮合 match 的存储快照。
message MatchStorageRecord {
  uint64                            match_id            = 1;
  MatchStage                        stage               = 2;
  repeated MatchMemberStorageRecord members             = 3;  // 10 人(team_a 5 + team_b 5)
  repeated uint64                   ticket_ids          = 4;  // 组成本 match 的 ticket(失败退回用)
  int64                             created_at_ms       = 5;
  int64                             confirm_deadline_ms = 6;  // 确认期截止(active ZSET score)
  string                            battle_ds_addr      = 7;  // ALLOCATING/READY 时填
  string                            battle_ticket       = 8;  // 同上
  // 9 reserved
  reserved 9;
  uint32                            map_id              = 10;  // 本局副本编号(从票据继承),透传到 AllocateBattle 选 DS 关卡
  // durable allocation job（仅服务端存储，不直接返回客户端）。
  // operation_id 是跨 matchmaker / placement 重试稳定的 UUIDv4 幂等键；旧记录为空时
  // 由 worker 在 ALLOCATING 的 CAS 内生成并持久化，后续重试只能复用。
  string                            allocation_operation_id = 11;
  MatchAllocationPhase              allocation_phase       = 12;
  uint32                            allocation_attempt      = 13;
  int64                             allocation_next_attempt_at_ms = 14;
  MatchBattleTargetStorageRecord    battle_target = 15;
  string                            game_mode = 16; // canonical worker/route namespace
}

message MatchPlayerPlacementBindingStorageRecord {
  uint64 player_id = 1;
  uint64 placement_version = 2;
  string operation_id = 3;
  uint64 source_match_id = 4;
}

message MatchBattleTargetStorageRecord {
  string ds_addr = 1;
  string ds_pod_name = 2;
  string ds_instance_uid = 3;
  uint32 ds_instance_epoch = 4;
  string allocation_id = 5;
  string release_track = 6;
  repeated MatchPlayerPlacementBindingStorageRecord player_bindings = 7;
}

// MatchStartOperationStorageRecord 是 StartMatch 的 Redis 持久 saga。
// operation_id / lease_token 均为 UUIDv4；lease 只防多 leader 重叠推进，不承载业务真相。
message MatchStartOperationStorageRecord {
  string                            operation_id             = 1;
  uint64                            ticket_id                = 2;
  uint64                            team_id                  = 3;
  uint64                            captain_id               = 4;
  repeated MatchMemberStorageRecord members                  = 5;
  int32                             avg_mmr                  = 6;
  uint32                            map_id                   = 7;
  MatchStartPhase                   phase                    = 8;
  repeated uint64                   claimed_player_ids       = 9;
  uint32                            attempt                  = 10;
  int64                             next_attempt_at_ms       = 11;
  string                            lease_token              = 12;
  int64                             lease_deadline_ms        = 13;
  int64                             created_at_ms            = 14;
  string                            game_mode                = 15;
}

// MatchReleaseStorageRecord 是 battle_result→matchmaker 释放 outbox 的 payload。
// MySQL 行以 match_id 唯一，重复结算会补建缺失行而不会重复释放新一局 claim。
message MatchReleaseStorageRecord {
  string          operation_id = 1;
  uint64          match_id     = 2;
  repeated uint64 player_ids    = 3;
  int64           created_at_ms = 4;
}
