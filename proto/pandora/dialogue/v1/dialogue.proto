// Pandora DialogueService 协议。
//
// 职责(docs/design/go-services.md §2.10):NPC 对话树运行时
// 对话树存储:配置中心 / mysql `dialogue_trees` 表(json blob)
// MOBA 早期:简单 if-else,不上行为树

syntax = "proto3";

package pandora.dialogue.v1;

import "pandora/common/v1/errcode.proto";

service DialogueService {
  rpc StartDialogue(StartDialogueRequest) returns (StartDialogueResponse);
  rpc ChooseOption(ChooseOptionRequest) returns (ChooseOptionResponse);
  rpc EndDialogue(EndDialogueRequest) returns (EndDialogueResponse);
}

message DialogueOption {
  string option_id = 1;
  string text      = 2;
  bool   visible   = 3;  // 部分选项有前置条件
  // 4-9 reserved
  reserved 4 to 9;
}

message DialogueState {
  uint64 dialogue_id = 1;  // 本次会话 ID
  uint32 npc_id      = 2;
  string node_id     = 3;  // 当前节点
  string speaker     = 4;  // NPC 名字
  string text        = 5;  // 当前对话文本
  repeated DialogueOption options = 6;
  bool   ended       = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

message StartDialogueRequest {
  uint64 player_id = 1;
  uint32 npc_id    = 2;
}

message StartDialogueResponse {
  pandora.common.v1.ErrCode code = 1;
  DialogueState state = 2;
}

message ChooseOptionRequest {
  uint64 player_id   = 1;
  uint64 dialogue_id = 2;
  string option_id   = 3;
}

message ChooseOptionResponse {
  pandora.common.v1.ErrCode code = 1;
  DialogueState state = 2;
}

message EndDialogueRequest {
  uint64 player_id   = 1;
  uint64 dialogue_id = 2;
}

message EndDialogueResponse {
  pandora.common.v1.ErrCode code = 1;
}
