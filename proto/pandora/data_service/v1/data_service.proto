// Pandora DataService 协议。
//
// 职责(docs/design/go-services.md §2.3):
//   - 玩家数据统一读写网关(保证 cache + db + kafka 三处一致)
//   - 缓存失效广播
//
// 写流程:DB 写成功 → kafka 发 update → 删 cache(cache-aside)
// 读流程:cache 命中返回,miss 读 db 写 cache
// 乐观锁:UPDATE ... WHERE version = ?

syntax = "proto3";

package pandora.data_service.v1;

import "pandora/common/v1/errcode.proto";

service DataService {
  rpc ReadPlayer(ReadPlayerRequest) returns (ReadPlayerResponse);
  rpc WritePlayer(WritePlayerRequest) returns (WritePlayerResponse);
  rpc InvalidateCache(InvalidateCacheRequest) returns (InvalidateCacheResponse);
}

// PlayerData 玩家数据(强 schema),同时是 MySQL player_data 表的 schema 唯一来源:
// data_service 启动时按本 message 经 proto2mysql CreateOrUpdateTable 建表/同步表结构,
// 每个标量字段即一列(MySQL 直接可见、可查询)。
//
// 设计约束:
//   - 字段镜像 player.v1.PlayerProfile 的档案字段,但不 import player.v1(避免循环依赖;
//     且嵌套 message 在 proto2mysql 中会退化成 MEDIUMBLOB 列,失去列可见性)
//   - 本 message 兼作存储快照与内网 RPC 载荷(data_service 仅内网,不经 Envoy 对客户端开放)
//   - 改字段只允许加新编号字段 / reserved 删字段(CLAUDE.md §9 不变量 17)
//   - 2026-06-20 开发期重构:原 `bytes data = 3` 删除,编号 3-10 复用为强类型字段
//     (开发期允许,已全量重生 proto;dev 环境需清空 player_data 表与 Redis 缓存)
message PlayerData {
  uint64 player_id = 1;      // Snowflake
  uint32 version = 2;        // 乐观锁(每次写 +1;写请求带 0 = 新建)
  string nickname = 3;
  uint32 level = 4;
  uint32 mmr = 5;
  string avatar = 6;
  uint64 created_at_ms = 7;
  uint64 last_seen_ms = 8;
  uint32 total_battles = 9;
  uint32 total_wins = 10;
}

message ReadPlayerRequest {
  uint64 player_id = 1;
}

message ReadPlayerResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerData data = 2;
}

message WritePlayerRequest {
  PlayerData data = 1;
}

message WritePlayerResponse {
  pandora.common.v1.ErrCode code = 1;
  uint32 new_version = 2;
}

message InvalidateCacheRequest {
  uint64 player_id = 1;
}

message InvalidateCacheResponse {
  pandora.common.v1.ErrCode code = 1;
}
