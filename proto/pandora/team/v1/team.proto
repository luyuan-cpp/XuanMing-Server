// Pandora TeamService 协议。
//
// 职责(docs/design/go-services.md §2.7):组队(5 人队)
// 状态机:FORMING → READY(全员 ready)→ MATCHING → IN_BATTLE → DISBANDED
//
// ⚠️ 推送架构(ds-arch.md §0.8):
//   go-zero zrpc 不支持 gRPC server stream。
//   "队伍状态变更"通过 kafka topic `pandora.team.update`(key=player_id)
//   广播给所有相关玩家所在的 Hub DS,由 DS 转成 UE ClientRPC 推给客户端。
//   本 service **不提供** StreamTeamUpdates RPC。

syntax = "proto3";

package pandora.team.v1;

import "pandora/common/v1/errcode.proto";

service TeamService {
  rpc CreateTeam(CreateTeamRequest) returns (CreateTeamResponse);
  rpc Invite(InviteRequest) returns (InviteResponse);
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse);
  rpc LeaveTeam(LeaveTeamRequest) returns (LeaveTeamResponse);
  rpc Kick(KickRequest) returns (KickResponse);
  rpc SetReady(SetReadyRequest) returns (SetReadyResponse);
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse);  // 客户端拉一次完整 Team(进入大厅时)
}

enum TeamState {
  TEAM_STATE_UNSPECIFIED = 0;
  TEAM_STATE_FORMING     = 1;
  TEAM_STATE_READY       = 2;
  TEAM_STATE_MATCHING    = 3;
  TEAM_STATE_IN_BATTLE   = 4;
  TEAM_STATE_DISBANDED   = 5;
}

message TeamMember {
  uint64 player_id = 1;
  string nickname  = 2;
  int32  mmr       = 3;
  bool   ready     = 4;
  uint32 hero_id   = 5;
  // 6-9 reserved
  reserved 6 to 9;
}

message Team {
  uint64 team_id       = 1;
  uint64 captain_id    = 2;
  repeated TeamMember members = 3;
  TeamState state      = 4;
  int64  created_at_ms = 5;
  int32  max_size      = 6;  // MOBA 5
  // 7-9 reserved
  reserved 7 to 9;
}

// ===== RPC =====

message CreateTeamRequest {
  uint64 player_id = 1;
}

message CreateTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 team_id = 2;
}

message InviteRequest {
  uint64 team_id          = 1;
  uint64 inviter_id       = 2;
  uint64 target_player_id = 3;
}

message InviteResponse {
  pandora.common.v1.ErrCode code = 1;
}

message AcceptInviteRequest {
  uint64 player_id = 1;
  uint64 team_id   = 2;
}

message AcceptInviteResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;
}

message LeaveTeamRequest {
  uint64 team_id   = 1;
  uint64 player_id = 2;
}

message LeaveTeamResponse {
  pandora.common.v1.ErrCode code = 1;
}

message KickRequest {
  uint64 team_id           = 1;
  uint64 captain_id        = 2;
  uint64 target_player_id  = 3;
}

message KickResponse {
  pandora.common.v1.ErrCode code = 1;
}

message SetReadyRequest {
  uint64 team_id   = 1;
  uint64 player_id = 2;
  bool   ready     = 3;
  uint32 hero_id   = 4;  // 可选,选英雄一并设
}

message SetReadyResponse {
  pandora.common.v1.ErrCode code = 1;
}

message GetTeamRequest {
  uint64 team_id = 1;
}

message GetTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;
}

// ===== Kafka 推送 payload =====
//
// topic: pandora.team.update
// key:   player_id(每个相关玩家收到一份;同队 5 人 = 5 条消息)
// 消费方:Hub DS(玩家所在 hub),按 player_id 路由��对应 PlayerController
//        转成 UE ClientRPC 推给客户端。
//
// 该 message 通过 kafka_envelope.proto 的 KafkaEnvelope.payload 传输,
// 不通过 gRPC 直接 stream。

message TeamUpdateEvent {
  Team   team           = 1;
  string change_summary = 2;  // "joined" | "left" | "ready" | "kicked" | "disbanded" | ...
  uint64 by_player_id   = 3;  // 触发本次变更的玩家
  uint64 to_player_id   = 4;  // 接收推送的玩家(也是 kafka key)
  int64  ts_ms          = 5;
  // 6-9 reserved
  reserved 6 to 9;
}
