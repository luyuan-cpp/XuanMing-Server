// Pandora TeamService 协议。
//
// 职责(docs/design/go-services.md §2.7):组队(5 人队)
// 状态机:FORMING → READY(全员 ready)→ MATCHING → IN_BATTLE → DISBANDED
//
// 推送架构(ds-arch.md §0.8):
//   "队伍状态变更"通过 kafka topic `pandora.team.update`(key=player_id)
//   广播给所有相关玩家所在的 push 服务 → push 服务 server stream 推给客户端。
//   本 service **不提供** StreamTeamUpdates RPC。

syntax = "proto3";

package pandora.team.v1;

import "pandora/common/v1/errcode.proto";

// 所有写 RPC 均为"立即完成型":biz 完成状态机迁移 + 写 redis + 发 kafka 后立刻返回。
//   - 不阻塞等待外部服务;不 hold 连接
//   - PushToPlayers 不发给 caller(协议原则 2)
// StartMatch → 由 matchmaker 负责(W3 ⑧),此处不提供 RPC。
service TeamService {
  rpc CreateTeam(CreateTeamRequest) returns (CreateTeamResponse);       // 立即完成型
  rpc Invite(InviteRequest) returns (InviteResponse);                    // 立即完成型;push 不发 inviter
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse);  // 立即完成型
  rpc LeaveTeam(LeaveTeamRequest) returns (LeaveTeamResponse);           // 立即完成型
  rpc Kick(KickRequest) returns (KickResponse);                          // 立即完成型;push 不发 captain
  rpc SetReady(SetReadyRequest) returns (SetReadyResponse);              // 立即完成型
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse);                 // 只读,按 team_id 查任意队伍快照
  rpc GetMyTeam(GetMyTeamRequest) returns (GetMyTeamResponse);           // 只读,登录后进大厅查"我的队伍"完整快照(队伍主界面)
  rpc ListMyPendingInvites(ListMyPendingInvitesRequest) returns (ListMyPendingInvitesResponse);  // 只读,拉取兜底:查"发给我的待处理邀请"
}

enum TeamState {
  TEAM_STATE_UNSPECIFIED = 0;
  TEAM_STATE_FORMING     = 1;
  TEAM_STATE_READY       = 2;
  TEAM_STATE_MATCHING    = 3;
  TEAM_STATE_IN_BATTLE   = 4;
  TEAM_STATE_DISBANDED   = 5;
}

message TeamMember {
  uint64 player_id = 1;
  string nickname  = 2;
  int32  mmr       = 3;
  bool   ready     = 4;
  uint32 hero_id   = 5;
  // 6-9 reserved
  reserved 6 to 9;
}

message Team {
  uint64 team_id       = 1;
  uint64 captain_id    = 2;
  repeated TeamMember members = 3;
  TeamState state      = 4;
  int64  created_at_ms = 5;
  int32  max_size      = 6;  // MOBA 5
  // 7-9 reserved
  reserved 7 to 9;
}

// Redis 内部存储快照,对应 key `pandora:team:{team_id}` 的 protobuf bytes。
// 不直接复用 Team,因为存储层需要 updated_at_ms。
message TeamMemberStorageRecord {
  uint64 player_id = 1;
  string nickname  = 2;
  int32  mmr       = 3;
  bool   ready     = 4;
  uint32 hero_id   = 5;
  // 6-9 reserved
  reserved 6 to 9;
}

message TeamStorageRecord {
  uint64 team_id       = 1;
  uint64 captain_id    = 2;
  TeamState state      = 3;
  repeated TeamMemberStorageRecord members = 4;
  int64  created_at_ms = 5;
  int64  updated_at_ms = 6;
  int32  max_size      = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

// ===== RPC =====

message CreateTeamRequest {
  // player_id 已删:身份一律以 JWT x-pandora-player-id 为准,客户端无需也不应自报。
  // 保留字段号 1(勿复用):老客户端仍会发 field 1(varint),复用会让其字节被误解。
  reserved 1;
  reserved "player_id";
}

message CreateTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 team_id = 2;
  Team   team    = 3;  // 完整快照;客户端无需再发 GetTeam
}

message InviteRequest {
  uint64 team_id          = 1;
  uint64 inviter_id       = 2;  // 服务端以 JWT x-pandora-player-id 为准,此字段忽略
  uint64 target_player_id = 3;
}

message InviteResponse {
  pandora.common.v1.ErrCode code = 1;
  Team   team          = 2;  // 发送邀请后的完整队伍快照
  uint64 invite_id     = 3;  // 邀请令牌 ID;AcceptInvite 时回传可校验未过期
  int64  expires_at_ms = 4;  // 邀请过期时间(unix ms)
}

message AcceptInviteRequest {
  uint64 player_id = 1;  // 服务端以 JWT x-pandora-player-id 为准,此字段忽略
  uint64 team_id   = 2;
  uint64 invite_id = 3;  // 可选;传入时服务端校验未过期/未取消;不传时仅校验 team_id
}

message AcceptInviteResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;  // 加入后的完整队伍快照(协议原则 1)
}

message LeaveTeamRequest {
  uint64 team_id   = 1;
  uint64 player_id = 2;  // 服务端以 JWT x-pandora-player-id 为准,此字段忽略
}

message LeaveTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;  // 离开后的队伍快照(已解散时 team.state=DISBANDED)
}

message KickRequest {
  uint64 team_id           = 1;
  uint64 captain_id        = 2;  // 服务端以 JWT x-pandora-player-id 为准,此字段忽略
  uint64 target_player_id  = 3;
}

message KickResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;  // 踢人后的完整队伍快照
}

message SetReadyRequest {
  uint64 team_id   = 1;
  uint64 player_id = 2;  // 服务端以 JWT x-pandora-player-id 为准,此字段忽略
  bool   ready     = 3;
  uint32 hero_id   = 4;  // 0=不改 hero 只切 ready 状态;≥1=设英雄并 ready(选英雄一并设置)
}

message SetReadyResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;  // 变更 ready 状态后的完整队伍快照
}

message GetTeamRequest {
  uint64 team_id = 1;
}

message GetTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  Team team = 2;
}

// GetMyTeam:登录后进大厅时调用,客户端不需要预先知道 team_id。
// 服务端从 JWT x-pandora-player-id 取 player_id → 查 pandora:team:player:<id> 索引。
// 返回完整 Team 快照(队伍主界面直接渲染,无需再发 GetTeam)。
// 带宽说明:这是登录进大厅调一次的 unary,5 人队 Team 序列化后 ~200 字节,
// 比拆成两次 RPC(先查 team_id 再 GetTeam)更省;Team 本身已是 §5.11 客户端最小视图。
message GetMyTeamRequest {
  // player_id 已删:服务端从 JWT x-pandora-player-id 取 player_id,客户端无需也不应自报。
  // 保留字段号 1(勿复用):老客户端仍会发 field 1(varint),复用会让其字节被误解。
  reserved 1;
  reserved "player_id";
}

message GetMyTeamResponse {
  pandora.common.v1.ErrCode code = 1;
  bool has_team_msg = 2;  // false=玩家当前没有队伍(正常态,code 仍为 OK)
  Team team         = 3;  // has_team_msg=false 时为空;完整快照,队伍主界面直接用
}

// ListMyPendingInvites:查询"发给我的待处理邀请"(只读,拉取兜底)。
//
// 为什么需要它(推送单点消除):邀请令牌的唯一权威在 Redis(pandora:team:invite:*),
// kafka→push 推送只是投影/加速器(不变量 §9-22)。此前 invite_id 只能从推送获得,
// producer 故障窗口 / push 副本崩溃 / 客户端恰好断线,邀请就静默失效到 TTL 过期。
// 客户端在登录、回前台、打开组队 UI 时调用本 RPC 兜底,丢推送最多延迟弹窗,不丢邀请。
//
// 上限治理(不变量 §9-18,组队邀请是"客户端可写入的堆积列表"):
//   - 写入侧:同一被邀请人 pending 邀请数上限 TeamConf.max_pending_invites(默认 10),
//     超限 Invite 返回 ERR_TEAM_INVITE_PENDING_LIMIT(3008)。
//   - 读取侧:单次全量返回,服务端按同一上限截断(写入侧硬上限已兜住总量,无需分页)。
message ListMyPendingInvitesRequest {
  // 身份一律以 JWT x-pandora-player-id 为准,客户端无需也不应自报 player_id。
}

// PendingInvite 是待处理邀请的查询视图,与 TeamInviteEvent(推送)字段对齐:
// 客户端拿到后走与收到推送完全相同的弹框/接受流程(AcceptInvite 回传 invite_id)。
message PendingInvite {
  uint64 team_id       = 1;  // 邀请加入的队伍
  uint64 invite_id     = 2;  // 邀请令牌;AcceptInvite 回传校验未过期/未取消
  uint64 inviter_id    = 3;  // 发起邀请的玩家
  int64  expires_at_ms = 4;  // 邀请过期时间(unix ms)
}

message ListMyPendingInvitesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated PendingInvite invites = 2;  // 按过期时间升序;数量 ≤ max_pending_invites
}

// ===== Kafka 推送 payload =====
//
// topic: pandora.team.update
// key:   player_id(每个相关玩家收到一份;同队 5 人 = 5 条消息,不变量 §9)
// 消费方:push 服务 KafkaConsumer → ConnectionManager.SendTo → 客户端 server stream。
//
// 该 message 通过 KafkaEnvelope.payload 传输,不通过 gRPC 直接 stream。

// TeamPushEventType 是 pandora.team.update **域内的事件类型判别键**,
// 填入 PushFrame.event_type(见 pandora/push/v1/push.proto §event_type)。
//
// 作用:pandora.team.update 这一个 topic 下要承载多种「结构不同」的事件 message;
//       客户端按 (topic=pandora.team.update, event_type) 定位该反序列化哪个 message。
//       这样域内加新事件类型**不新增 topic**(拒绝 topic 爆炸)。
//
// ⚠️ 与 TeamUpdateReason 是两个不同的轴,别混:
//   - TeamPushEventType:选「哪个 message」(TeamUpdateEvent vs 将来的 TeamInviteEvent...)。
//   - TeamUpdateReason  :在 TeamUpdateEvent **内部**说明「这次 update 为什么触发」(播动画/音效)。
//
// 编号规则:**每域独立**(team 的 1 与 match 的 1 无关);**0 永远 = 现有 TeamUpdateEvent**
// (兼容正在游戏中的老客户端:老 producer 不填→缺省 0→旧事件);枚举值只增不复用。
enum TeamPushEventType {
  TEAM_PUSH_EVENT_TYPE_UNSPECIFIED = 0;  // = TeamUpdateEvent(旧事件,向后兼容)
  TEAM_PUSH_EVENT_TYPE_INVITE      = 1;  // payload=TeamInviteEvent(邀请专属事件,见下)
  // 将来新增(示例,当前未启用):
  //   TEAM_PUSH_EVENT_TYPE_DISBAND = 2;  // payload=TeamDisbandEvent
}

// TeamUpdateReason 描述本次 TeamUpdateEvent 的触发原因,供客户端决定播放哪段动画/音效。
// 枚举值编号永不复用(只 reserved)。
enum TeamUpdateReason {
  TEAM_UPDATE_REASON_UNSPECIFIED      = 0;
  TEAM_UPDATE_REASON_MEMBER_JOINED    = 1;
  TEAM_UPDATE_REASON_MEMBER_LEFT      = 2;
  TEAM_UPDATE_REASON_MEMBER_KICKED    = 3;
  TEAM_UPDATE_REASON_MEMBER_READY     = 4;
  TEAM_UPDATE_REASON_HERO_CHANGED     = 5;
  TEAM_UPDATE_REASON_CAPTAIN_TRANSFER = 6;
  TEAM_UPDATE_REASON_STATE_CHANGED    = 7;
  TEAM_UPDATE_REASON_DISBANDED        = 8;
  TEAM_UPDATE_REASON_INVITE_SENT      = 9;
}

message TeamUpdateEvent {
  Team   team         = 1;
  // 2 was string change_summary — 已删除(W3 ⑦ Phase 1)
  reserved 2;
  reserved "change_summary";
  uint64 by_player_id = 3;  // 触发本次变更的玩家
  uint64 to_player_id = 4;  // 接收推送的玩家(也是 kafka key)
  int64  ts_ms        = 5;
  // 6-9 reserved
  reserved 6 to 9;
  TeamUpdateReason reason    = 10;  // 变更原因;客户端用于播动画/音效
  // ⚠️ invite_id 为历史字段:邀请曾复用 TeamUpdateEvent(reason=INVITE_SENT)承载。
  //    新客户端改用独立的 TeamInviteEvent(event_type=TEAM_PUSH_EVENT_TYPE_INVITE)。
  //    金丝雀共存期生产者"双发"(TeamConf.invite_push_mode=dual):老客户端认此字段、
  //    新客户端认独立事件,各弹一次不双弹。全量铺完新客户端后切 dedicated 停发本字段
  //    (字节兼容,勿删勿改号)。
  uint64           invite_id = 11;  // [legacy] reason=INVITE_SENT 时填;其他 reason 为 0
}

// TeamInviteEvent 是「收到组队邀请」的**专属事件**,通过 PushFrame.event_type=
// TEAM_PUSH_EVENT_TYPE_INVITE(=1)投递到 topic pandora.team.update。
//
// 为什么独立成一个 message(而不是继续塞进 TeamUpdateEvent):
//   邀请只需「谁邀请我、进哪个队、令牌、何时过期」这几项,不需要 team 全量快照,
//   也不属于「队伍成员变更」语义。塞进 TeamUpdateEvent 会让那个 message 随事件种类
//   膨胀成宽表(每种事件挂一批专属字段、对其他事件全是废字段)。event_type 的本意
//   就是「每种事件 payload 是它自己的 proto」,故邀请独立成 TeamInviteEvent。
//
// 客户端收到后弹「接受/拒绝」邀请框;AcceptInvite 时回传 invite_id 供服务端校验未过期。
message TeamInviteEvent {
  uint64 team_id       = 1;  // 邀请加入的队伍
  uint64 invite_id     = 2;  // 邀请令牌;AcceptInvite 回传校验未过期/未取消
  uint64 inviter_id    = 3;  // 发起邀请的玩家(队内成员)
  uint64 to_player_id  = 4;  // 被邀请人(也是 kafka key)
  int64  ts_ms         = 5;  // 事件产生时间(unix ms)
  int64  expires_at_ms = 6;  // 邀请过期时间(unix ms),与 InviteResponse.expires_at_ms 一致
  // 7-9 reserved(将来如需队长昵称等展示字段)
  reserved 7 to 9;
}
