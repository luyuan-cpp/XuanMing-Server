// Pandora DSAllocatorService 协议。
//
// 职责(docs/design/go-services.md §2.11):战斗 DS 调度(Agones GameServer)
// 实现:调用 Agones K8s API GameServerAllocation CRD,维护 redis 中的 DS 状态镜像
//
// ⚠️ Heartbeat 单向 unary(架构决策 2026-06-03):
//   go-zero zrpc 不支持 server stream,所以心跳改为 DS 每 5s 主动调用 unary RPC。
//   控制指令(stop / drain / reload_config)通过 response 字段下发,DS 在下次 Heartbeat
//   的响应里收到指令。允许的延迟 ≤ 5s,业务可接受。

syntax = "proto3";

package pandora.ds.v1;

import "pandora/common/v1/errcode.proto";

service DSAllocatorService {
  rpc AllocateBattle(AllocateBattleRequest) returns (AllocateBattleResponse);
  // ResolveBattleTarget 是重连重签票据的只读权威查询。它不创建 claim、不调用
  // GameServerAllocation、不续 TTL；只有目标仍 ReadyAuthorized 且 player 在 roster 时返回。
  rpc ResolveBattleTarget(ResolveBattleTargetRequest) returns (ResolveBattleTargetResponse);
  rpc ReleaseBattle(ReleaseBattleRequest) returns (ReleaseBattleResponse);
  // EnsurePlayerDeparture 是 Battle→Hub 的物理离场门。调用方必须携带从
  // placement/source snapshot 取得的完整实例元组；只在该玩家已从 credential-bound
  // Battle DS 的可信在线集合消失，或该 exact GameServer UID 已被确认回收后返回 departed。
  rpc EnsurePlayerDeparture(EnsurePlayerDepartureRequest) returns (EnsurePlayerDepartureResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);  // DS 每 5s 主动调
  rpc ListBattles(ListBattlesRequest) returns (ListBattlesResponse);
}

message ResolveBattleTargetRequest {
  uint64 match_id = 1;
  uint64 player_id = 2;
}

message ResolveBattleTargetResponse {
  pandora.common.v1.ErrCode code = 1;
  string ds_addr = 2;
  string ds_pod_name = 3;
  int64 allocated_at_ms = 4;
  string gameserver_uid = 5;
  uint32 instance_epoch = 6;
  string allocation_id = 7;
  string release_track = 8;
}

// ===== Allocate / Release =====

message AllocateBattleRequest {
  uint64 match_id  = 1;
  repeated uint64 player_ids = 2;
  uint32 map_id    = 3;
  string game_mode = 4;  // "ranked_5v5" | "casual_5v5" | "custom"
  // 5-9 reserved
  reserved 5 to 9;
}

message AllocateBattleResponse {
  pandora.common.v1.ErrCode code = 1;
  string ds_addr        = 2;
  string ds_pod_name    = 3;
  int64  allocated_at_ms = 4;
  // DSTicket v2(方案 B,decision-revisit-player-jwt-key-rotation.md §7.3):
  // matchmaker 签 battle 票需要把票绑死到唯一 DS 实例。以下字段来自 ds_allocator
  // 判定 ReadyAuthorized 的同一权威快照(BattleStorageRecord / 授权记录),兼容加字段:
  // 旧 ds_allocator 不回填时字段为零值,matchmaker v2 签票路径 fail-closed 拒签。
  string gameserver_uid   = 5;  // Agones GameServer uid(票据 ds_uid claim)
  uint32 instance_epoch   = 6;  // 实例代际(票据 ds_instance_epoch claim)
  string allocation_id    = 7;  // 本次分配 ID(票据 allocation_id claim)
  string release_track    = 8;  // "stable" | "canary" | ""(未启用双轨)
}

message ReleaseBattleRequest {
  uint64 match_id = 1;
  string reason   = 2;  // "completed" | "abandoned" | "crash"
  // authority_mode=redis 下 ReleaseBattle 只接受 terminal_release_outbox relay 传入的
  // 持久证明，禁止按 match_id 临时回读当前实例后回收。以下字段全部来自
  // ReportResult 完成 Guard + Redis active 校验时的服务端快照，不得由 DS 请求体补值。
  string allocation_id       = 3;
  string ds_pod_name         = 4;
  string gameserver_uid      = 5;
  uint32 instance_epoch      = 6;
  uint64 auth_gen            = 7;
  string auth_jti            = 8;
  int64 auth_exp_ms          = 9;
  string auth_kid            = 10;
  string auth_token_sha256   = 11;
  uint32 auth_writer_epoch   = 12;
  int64 authorized_at_ms     = 13;
}

message ReleaseBattleResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== Battle→Hub exact player departure =====

enum BattlePlayerDepartureStatus {
  BATTLE_PLAYER_DEPARTURE_STATUS_UNSPECIFIED = 0;
  BATTLE_PLAYER_DEPARTURE_STATUS_PENDING = 1;
  BATTLE_PLAYER_DEPARTURE_STATUS_DEPARTED = 2;
  BATTLE_PLAYER_DEPARTURE_STATUS_SOURCE_TORN_DOWN = 3;
}

message EnsurePlayerDepartureRequest {
  uint64 match_id = 1;
  uint64 player_id = 2;
  // operation_id 来自服务端 placement transition；同 operation 重试幂等，
  // 不同 operation 不能消费对方的 ACK。
  string operation_id = 3;
  string ds_pod_name = 4;
  string gameserver_uid = 5;
  uint32 instance_epoch = 6;
  string allocation_id = 7;
  // source STABLE BATTLE placement 的版本。旧 version/op 的迟到 RPC 不得
  // 消费新一轮 Hub transition 的离场证明（ABA fence）。
  uint64 placement_version = 8;
}

message EnsurePlayerDepartureResponse {
  pandora.common.v1.ErrCode code = 1;
  bool departed = 2;
  BattlePlayerDepartureStatus status = 3;
}

// BattleEvictionOrder 只由 allocator 在已验证 active credential 的心跳响应下发。
// DS 必须踢掉该 exact player；下一次心跳中的完整 active snapshot 不再含他
// 后 allocator 才提交 departed。
message BattleEvictionOrder {
  string departure_id = 1;
  uint64 match_id = 2;
  uint64 player_id = 3;
  string ds_pod_name = 4;
  string gameserver_uid = 5;
  uint32 instance_epoch = 6;
  string allocation_id = 7;
  uint64 placement_version = 8;
}

// ===== Heartbeat(单向 unary,DS 每 5s 调一次)=====

// DS 上报状态
message HeartbeatRequest {
  string ds_pod_name = 1;
  uint64 match_id    = 2;
  int32  player_count = 3;
  float  cpu_pct     = 4;
  float  mem_mb      = 5;
  string state       = 6;  // "warming" | "ready" | "running" | "ended"
  int64  ts_ms       = 7;
  // 8-9 reserved
  reserved 8 to 9;
  // 滚动更新门：只有 present=true 才把 active_player_ids 解释为完整可信快照。
  // 旧 DS 的 proto3 零值绝不能被误解释为“全员已离场”。
  repeated uint64 active_player_ids = 10;
  bool active_player_snapshot_present = 11;
  // DS 仅在执行过 order 且当前快照已不含该 player 时回报。
  repeated string acknowledged_departure_ids = 12;
}

// allocator 返回控制指令(DS 在下次 heartbeat 之间消费)
message HeartbeatResponse {
  pandora.common.v1.ErrCode code = 1;
  string command = 2;  // "" | "stop" | "drain" | "reload_config"
  // 3-9 reserved for future control commands
  reserved 3 to 9;
  uint64 accepted_token_gen = 10;
  string accepted_token_jti = 11;
  string accepted_instance_uid = 12;
  uint32 accepted_instance_epoch = 13;
  uint32 accepted_writer_epoch = 14;
  repeated BattleEvictionOrder eviction_orders = 15;
}

// ===== List =====

message BattleInfo {
  uint64 match_id    = 1;
  string ds_pod_name = 2;
  string ds_addr     = 3;
  string state       = 4;
  int32  player_count = 5;
  int64  allocated_at_ms = 6;
}

message ListBattlesRequest {
  string state_filter = 1;  // 空 = 全部
}

message ListBattlesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated BattleInfo battles = 2;
}

// ===== 服务端存储快照 =====

// BattleStorageRecord 是 ds_allocator 在 Redis 中维护的战斗 DS 实例镜像
// (CLAUDE.md §5.8 服务端存储快照,key `pandora:ds:battle:{<match_id>}` proto bytes)。
//
// 注意:这是**服务端内部存储**结构,不直接外发给客户端;客户端可见的对局信息走 BattleInfo。
message BattleStorageRecord {
  uint64 match_id          = 1;
  string ds_pod_name       = 2;
  string ds_addr           = 3;
  string state             = 4;  // "warming" | "ready" | "running" | "ended" | "abandoned"
  repeated uint64 player_ids = 5;
  uint32 map_id            = 6;
  string game_mode         = 7;
  int64  allocated_at_ms   = 8;
  int64  last_heartbeat_ms = 9;  // 最近一次 DS Heartbeat 时刻(心跳超时扫描用,不变量 §4)
  int32  player_count      = 10;
  // 空场起始时刻:对局活跃(ready/running)且 DS 上报 player_count==0 时盖章,有人回来清零。
  // 持续空场超过 allocator.empty_battle_timeout → 后端兜底判 abandoned(全员掉线未归 /
  // 客户端从未连入,DS 空转烧资源)。主路径是 DS 侧空场计时器自结算(agones-dev.md §2.4)。
  int64  empty_since_ms    = 11;
  string gameserver_uid    = 12;
  uint32 instance_epoch    = 13;
  uint64 last_verified_gen = 14;
  string last_verified_jti = 15;
  uint32 last_verified_writer_epoch = 16;
  string allocation_id     = 17;
  // 实际承载本局的发布轨道，只接受 stable/canary。必须来自已分配 GameServer
  // 权威 metadata/GET 回读，不得按 cohort 意图猜测（canary 可回退 stable）。
  string release_track     = 18;
}

// ===== Model B Battle DS 回调授权状态机 =====

enum BattleAuthPhase {
  BATTLE_AUTH_PHASE_UNSPECIFIED = 0;
  BATTLE_AUTH_PHASE_BOOTSTRAP = 1;
  BATTLE_AUTH_PHASE_ACTIVE = 2;
  BATTLE_AUTH_PHASE_ROTATING = 3;
  BATTLE_AUTH_PHASE_QUARANTINED = 4;
  BATTLE_AUTH_PHASE_TERMINATING = 5;
}

message BattleDSCredential {
  uint64 gen = 1;
  string jti = 2;
  uint64 exp_ms = 3;
  string kid = 4;
  string instance_uid = 5;
  uint32 instance_epoch = 6;
  string token_sha256 = 7;
  uint32 writer_epoch = 8;
}

// BattleDSAuthStorageRecord 是 battle 回调授权的 Redis 唯一权威，key
// `pandora:ds:auth:{<match_id>}`，与 BattleStorageRecord/代际计数器同 slot。
message BattleDSAuthStorageRecord {
  uint64 match_id = 1;
  string ds_pod_name = 2;
  string instance_uid = 3;
  uint32 instance_epoch = 4;
  BattleAuthPhase phase = 5;
  BattleDSCredential active = 6;
  BattleDSCredential pending = 7;
  uint64 high_water_gen = 8;
  int64 pending_started_ms = 9;
  string delivered_rv = 10;
  int64 updated_at_ms = 11;
  uint32 required_writer_epoch = 12;
  string allocation_id = 13;
  // 仅由携带完整 active/pending 凭据的 Model B 心跳以服务端接收时间原子推进。
  int64 last_active_heartbeat_ms = 14;
}

// 每个 match 一份无 TTL journal，与 battle/auth 共用 {match_id} slot。pending 绝不
// 依赖 TTL 自愈；departed 记录保留供同 placement operation 幂等重试。
message BattlePlayerDepartureStorageRecord {
  string departure_id = 1;
  uint64 match_id = 2;
  uint64 player_id = 3;
  string operation_id = 4;
  string ds_pod_name = 5;
  string gameserver_uid = 6;
  uint32 instance_epoch = 7;
  string allocation_id = 8;
  BattlePlayerDepartureStatus status = 9;
  int64 requested_at_ms = 10;
  int64 issued_at_ms = 11;
  int64 departed_at_ms = 12;
  uint64 placement_version = 13;
}

message BattlePlayerDepartureJournalStorageRecord {
  uint64 match_id = 1;
  repeated BattlePlayerDepartureStorageRecord departures = 2;
}

// 只在外部 GameServer UID 条件回收得到明确成功后写入。Redis battle key
// 缺失、心跳超时、TTL 过期都不能代替这份物理 teardown proof。
message BattleInstanceTeardownStorageRecord {
  uint64 match_id = 1;
  string ds_pod_name = 2;
  string gameserver_uid = 3;
  uint32 instance_epoch = 4;
  string allocation_id = 5;
  int64 torn_down_at_ms = 6;
}

// ===== 生命周期事件(kafka pandora.ds.lifecycle)=====

// DSLifecyclePhase 是 DS 实例生命周期阶段。
//
// W4 ③:ds_allocator 仅在心跳超时补偿时发 ABANDONED(不变量 §4);
// ALLOCATED / RELEASED 留后续 DS 监控接入时启用,占位先定义保持枚举稳定。
enum DSLifecyclePhase {
  DS_LIFECYCLE_PHASE_UNSPECIFIED = 0;
  DS_LIFECYCLE_PHASE_ALLOCATED   = 1;  // 分配成功(W4 ③ 暂不发)
  DS_LIFECYCLE_PHASE_RELEASED    = 2;  // 正常回收(W4 ③ 暂不发)
  DS_LIFECYCLE_PHASE_ABANDONED   = 3;  // 心跳超时 → 玩家段位回滚补偿
}

// DSLifecycleEvent 是 ds_allocator 发到 pandora.ds.lifecycle 的事件
// (kafka key = match_id,不变量 §9 同对局事件保序)。
//
// 消费方 battle_result:ABANDONED → 写 abandoned 战绩(outcome=ABANDONED,mmr_delta 全 0,
// 不变量 §4 DS 崩溃必有补偿);player 服务上线后据此回滚玩家段位。
message DSLifecycleEvent {
  uint64 match_id          = 1;
  string ds_pod_name       = 2;
  DSLifecyclePhase phase   = 3;
  repeated uint64 player_ids = 4;
  uint32 map_id            = 5;
  string game_mode         = 6;
  int64  ts_ms             = 7;
}
