// Pandora DSAllocatorService 协议。
//
// 职责(docs/design/go-services.md §2.11):战斗 DS 调度(Agones GameServer)
// 实现:调用 Agones K8s API GameServerAllocation CRD,维护 redis 中的 DS 状态镜像
//
// ⚠️ Heartbeat 单向 unary(架构决策 2026-06-03):
//   go-zero zrpc 不支持 server stream,所以心跳改为 DS 每 5s 主动调用 unary RPC。
//   控制指令(stop / drain / reload_config)通过 response 字段下发,DS 在下次 Heartbeat
//   的响应里收到指令。允许的延迟 ≤ 5s,业务可接受。

syntax = "proto3";

package pandora.ds.v1;

import "pandora/common/v1/errcode.proto";

service DSAllocatorService {
  rpc AllocateBattle(AllocateBattleRequest) returns (AllocateBattleResponse);
  rpc ReleaseBattle(ReleaseBattleRequest) returns (ReleaseBattleResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);  // DS 每 5s 主动调
  rpc ListBattles(ListBattlesRequest) returns (ListBattlesResponse);
}

// ===== Allocate / Release =====

message AllocateBattleRequest {
  uint64 match_id  = 1;
  repeated uint64 player_ids = 2;
  uint32 map_id    = 3;
  string game_mode = 4;  // "ranked_5v5" | "casual_5v5" | "custom"
  // 5-9 reserved
  reserved 5 to 9;
}

message AllocateBattleResponse {
  pandora.common.v1.ErrCode code = 1;
  string ds_addr        = 2;
  string ds_pod_name    = 3;
  int64  allocated_at_ms = 4;
}

message ReleaseBattleRequest {
  uint64 match_id = 1;
  string reason   = 2;  // "completed" | "abandoned" | "crash"
}

message ReleaseBattleResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== Heartbeat(单向 unary,DS 每 5s 调一次)=====

// DS 上报状态
message HeartbeatRequest {
  string ds_pod_name = 1;
  uint64 match_id    = 2;
  int32  player_count = 3;
  float  cpu_pct     = 4;
  float  mem_mb      = 5;
  string state       = 6;  // "warming" | "ready" | "running" | "ended"
  int64  ts_ms       = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

// allocator 返回控制指令(DS 在下次 heartbeat 之间消费)
message HeartbeatResponse {
  pandora.common.v1.ErrCode code = 1;
  string command = 2;  // "" | "stop" | "drain" | "reload_config"
  // 3-9 reserved for future control commands
  reserved 3 to 9;
}

// ===== List =====

message BattleInfo {
  uint64 match_id    = 1;
  string ds_pod_name = 2;
  string ds_addr     = 3;
  string state       = 4;
  int32  player_count = 5;
  int64  allocated_at_ms = 6;
}

message ListBattlesRequest {
  string state_filter = 1;  // 空 = 全部
}

message ListBattlesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated BattleInfo battles = 2;
}

// ===== 服务端存储快照 =====

// BattleStorageRecord 是 ds_allocator 在 Redis 中维护的战斗 DS 实例镜像
// (CLAUDE.md §5.8 服务端存储快照,key `pandora:ds:battle:{<match_id>}` proto bytes)。
//
// 注意:这是**服务端内部存储**结构,不直接外发给客户端;客户端可见的对局信息走 BattleInfo。
message BattleStorageRecord {
  uint64 match_id          = 1;
  string ds_pod_name       = 2;
  string ds_addr           = 3;
  string state             = 4;  // "warming" | "ready" | "running" | "ended" | "abandoned"
  repeated uint64 player_ids = 5;
  uint32 map_id            = 6;
  string game_mode         = 7;
  int64  allocated_at_ms   = 8;
  int64  last_heartbeat_ms = 9;  // 最近一次 DS Heartbeat 时刻(心跳超时扫描用,不变量 §4)
  int32  player_count      = 10;
  // 空场起始时刻:对局活跃(ready/running)且 DS 上报 player_count==0 时盖章,有人回来清零。
  // 持续空场超过 allocator.empty_battle_timeout → 后端兜底判 abandoned(全员掉线未归 /
  // 客户端从未连入,DS 空转烧资源)。主路径是 DS 侧空场计时器自结算(agones-dev.md §2.4)。
  int64  empty_since_ms    = 11;
}

// ===== 生命周期事件(kafka pandora.ds.lifecycle)=====

// DSLifecyclePhase 是 DS 实例生命周期阶段。
//
// W4 ③:ds_allocator 仅在心跳超时补偿时发 ABANDONED(不变量 §4);
// ALLOCATED / RELEASED 留后续 DS 监控接入时启用,占位先定义保持枚举稳定。
enum DSLifecyclePhase {
  DS_LIFECYCLE_PHASE_UNSPECIFIED = 0;
  DS_LIFECYCLE_PHASE_ALLOCATED   = 1;  // 分配成功(W4 ③ 暂不发)
  DS_LIFECYCLE_PHASE_RELEASED    = 2;  // 正常回收(W4 ③ 暂不发)
  DS_LIFECYCLE_PHASE_ABANDONED   = 3;  // 心跳超时 → 玩家段位回滚补偿
}

// DSLifecycleEvent 是 ds_allocator 发到 pandora.ds.lifecycle 的事件
// (kafka key = match_id,不变量 §9 同对局事件保序)。
//
// 消费方 battle_result:ABANDONED → 写 abandoned 战绩(outcome=ABANDONED,mmr_delta 全 0,
// 不变量 §4 DS 崩溃必有补偿);player 服务上线后据此回滚玩家段位。
message DSLifecycleEvent {
  uint64 match_id          = 1;
  string ds_pod_name       = 2;
  DSLifecyclePhase phase   = 3;
  repeated uint64 player_ids = 4;
  uint32 map_id            = 5;
  string game_mode         = 6;
  int64  ts_ms             = 7;
}

