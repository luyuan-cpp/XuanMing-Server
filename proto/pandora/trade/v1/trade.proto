// Pandora TradeService 协议。
//
// 职责(docs/design/go-services.md §2.9):玩家间交易(两阶段)
// 状态机:PENDING → BUYER_CONFIRMED → SELLER_CONFIRMED → COMPLETED
//                                                      ↓
//                                                    FAILED / EXPIRED

syntax = "proto3";

package pandora.trade.v1;

import "pandora/common/v1/errcode.proto";

service TradeService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc ConfirmOrder(ConfirmOrderRequest) returns (ConfirmOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListMyOrdersResponse);
}

enum OrderState {
  ORDER_STATE_UNSPECIFIED      = 0;
  ORDER_STATE_PENDING          = 1;
  ORDER_STATE_BUYER_CONFIRMED  = 2;
  ORDER_STATE_SELLER_CONFIRMED = 3;
  ORDER_STATE_COMPLETED        = 4;
  ORDER_STATE_FAILED           = 5;
  ORDER_STATE_EXPIRED          = 6;
  ORDER_STATE_CANCELED         = 7;
}

message TradeItem {
  string item_uid = 1;  // 道具实例 ID
  int32  count    = 2;
  // 3-9 reserved
  reserved 3 to 9;
}

message Order {
  string  order_id   = 1;
  int64   seller_id  = 2;
  int64   buyer_id   = 3;
  repeated TradeItem items = 4;
  int64   price      = 5;  // 金币
  OrderState state   = 6;
  int64   created_at_ms = 7;
  int64   expires_at_ms = 8;
  // 9 reserved
  reserved 9;
}

message CreateOrderRequest {
  int64 seller_id  = 1;
  int64 buyer_id   = 2;
  repeated TradeItem items = 3;
  int64 price      = 4;
}

message CreateOrderResponse {
  pandora.common.v1.ErrCode code = 1;
  string order_id = 2;
}

message ConfirmOrderRequest {
  int64  player_id = 1;
  string order_id  = 2;
}

message ConfirmOrderResponse {
  pandora.common.v1.ErrCode code = 1;
  OrderState new_state = 2;
}

message CancelOrderRequest {
  int64  player_id = 1;
  string order_id  = 2;
}

message CancelOrderResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ListMyOrdersRequest {
  int64 player_id = 1;
  bool  active_only = 2;
}

message ListMyOrdersResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated Order orders = 2;
}
