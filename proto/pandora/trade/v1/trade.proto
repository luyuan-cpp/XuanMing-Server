// Pandora TradeService 协议。
//
// 职责(docs/design/go-services.md §2.9):玩家间交易(两阶段)
// 状态机:PENDING → BUYER_CONFIRMED → SELLER_CONFIRMED → COMPLETED
//                                                      ↓
//                                                    FAILED / EXPIRED

syntax = "proto3";

package pandora.trade.v1;

import "pandora/common/v1/errcode.proto";

service TradeService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc ConfirmOrder(ConfirmOrderRequest) returns (ConfirmOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListMyOrdersResponse);
}

enum OrderState {
  ORDER_STATE_UNSPECIFIED      = 0;
  ORDER_STATE_PENDING          = 1;
  ORDER_STATE_BUYER_CONFIRMED  = 2;
  ORDER_STATE_SELLER_CONFIRMED = 3;
  ORDER_STATE_COMPLETED        = 4;
  ORDER_STATE_FAILED           = 5;
  ORDER_STATE_EXPIRED          = 6;
  ORDER_STATE_CANCELED         = 7;
}

message TradeItem {
  // 1 原 item_uid(string 实例 ID 模型)已废弃:inventory 是 item_config_id 可堆叠模型,
  // 无实例 UID 概念;交易统一对齐到「配置 ID + 数量」,实例 UID 留待 inventory 引入实例化后再恢复。
  reserved 1, 3 to 9;
  uint32 item_config_id = 10;  // 道具配置 ID(uint32,CLAUDE.md §12),对齐 inventory.ItemGrant
  int32  count          = 2;   // 数量(>0)
}

message Order {
  uint64  order_id   = 1;
  uint64  seller_id  = 2;
  uint64  buyer_id   = 3;
  repeated TradeItem items = 4;  // 卖家交付给买家的道具
  int64   price      = 5;  // 买家付卖家的金币(>=0)
  OrderState state   = 6;
  int64   created_at_ms = 7;
  int64   expires_at_ms = 8;
  // 9 reserved
  reserved 9;
  repeated TradeItem buyer_items = 10;  // 买家交付给卖家的道具(物物 / 双向交易;可空 = 纯金币购买)
}

message CreateOrderRequest {
  uint64 seller_id = 1;
  uint64 buyer_id  = 2;
  repeated TradeItem items = 3;  // 卖家交付给买家的道具
  int64 price      = 4;          // 买家付卖家的金币(>=0)
  repeated TradeItem buyer_items = 5;  // 买家交付给卖家的道具(可空 = 纯金币购买)
}

message CreateOrderResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 order_id = 2;
}

message ConfirmOrderRequest {
  uint64 player_id = 1;
  uint64 order_id  = 2;
}

message ConfirmOrderResponse {
  pandora.common.v1.ErrCode code = 1;
  OrderState new_state = 2;
}

message CancelOrderRequest {
  uint64 player_id = 1;
  uint64 order_id  = 2;
}

message CancelOrderResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ListMyOrdersRequest {
  uint64 player_id = 1;
  bool  active_only = 2;
  uint64 cursor    = 3;  // 上页末 order_id;0=首页(按 order_id 降序)
  int32  limit     = 4;  // 0=服务端默认 50,>100 收敛
}

message ListMyOrdersResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated Order orders = 2;
  uint64 next_cursor = 3;  // 0=无更多
}

// ===== 预留:域内推送事件类型判别键(当前无 push 通道)=====
//
// ⚠️ 现状:trade 域**尚无任何 kafka/push 通道**(客户端靠 ListMyOrders 等主动拉取)。
// 这里**预先占位**一个域内事件类型判别键,和 team/match/friend 对齐同一套路由模型
//(见 pandora/push/v1/push.proto §event_type、docs/design/go-services.md「域内多事件类型路由」),
// 以便将来给 trade 接入 push(如「对方已确认/交易完成/超时」实时提醒)时,判别键结构已就位。
//
// 落地顺序(将来接入 push 时):新增事件 message + producer 发 kafka(带 event_type header)+
// push consumer 透传 + 客户端新建订阅 Model。届时:
//   - 0(UNSPECIFIED)= 接入时的首个/基础推送事件;
//   - 结构不同的后续事件从 1 起顺延,只增不复用。
enum TradePushEventType {
  TRADE_PUSH_EVENT_TYPE_UNSPECIFIED = 0;  // 预留;将来接入 push 时 = 首个/基础事件
}
