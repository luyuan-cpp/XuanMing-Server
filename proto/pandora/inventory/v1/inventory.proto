// Pandora InventoryService 协议(背包,W5 ③ 2026-06-18)。
//
// 职责(docs/design/go-services.md §2.9 economy 域):
//   - 玩家货币(金币)余额读写
//   - 背包道具持有(按 item_config_id 堆叠计数)
//   - 大厅态道具使用(开箱 / 经验书 / 消耗品)与出售换金币
//
// 边界(docs/design/ds-arch.md §0.1):
//   - 战斗内即时用道具 / 出装 / 购买道具 = UE GAS(GameplayEffect),不经 gRPC;
//   - 本服务只管大厅态持久化与经济结算,反作弊靠 WATCH/MULTI/EXEC 乐观锁 + 幂等键。
//
// 不变量(CLAUDE.md §9.7):交易/扣减必须原子 + 有补偿幂等键;
//   GrantItems / UseItem / SellItem 全部带 idempotency_key,同键只生效一次。

syntax = "proto3";

package pandora.inventory.v1;

import "pandora/common/v1/errcode.proto";
import "pandora/bag/v1/bag.proto";

service InventoryService {
  // GetInventory 读玩家背包(货币 + 道具堆叠);客户端可见结构,不下发存储字段。
  rpc GetInventory(GetInventoryRequest) returns (GetInventoryResponse);

  // GrantItems 幂等发放道具 / 货币(系统驱动:战后掉落 / 活动 / 购买到账)。
  rpc GrantItems(GrantItemsRequest) returns (GrantItemsResponse);

  // UseItem 大厅态使用消耗品(开箱 / 经验书等);战斗内即时道具走 GAS,不走此 RPC。
  rpc UseItem(UseItemRequest) returns (UseItemResponse);

  // SellItem 出售道具换金币(原子扣道具 + 加金币)。
  rpc SellItem(SellItemRequest) returns (SellItemResponse);

  // ── 装备实例 / 鉴定(W5 ④ 实例化背包,ds-arch §0.5 大厅态持久化)──
  //
  // 背景:可堆叠消耗品仍走上面的 player_items 计数(GrantItems/UseItem/SellItem);
  // 装备类道具需要"每件唯一 + 鉴定后属性随机",走独立的 item_instance 实例模型。
  // 战斗内出装/换装仍走 UE GAS(ds-arch §0.1);本组 RPC 只管大厅态持久化。

  // GrantInstances 幂等发放装备实例(系统驱动:掉落 / 活动 / 购买到账)。
  // 每件生成一个雪花 instance_id,默认未鉴定(identified=false,无随机属性);
  // 幂等键防重复入账(同 drop:<match_id> 重放只生效一次)。不在 Envoy 暴露(同 GrantItems)。
  rpc GrantInstances(GrantInstancesRequest) returns (GrantInstancesResponse);

  // IdentifyItem 鉴定一件未鉴定装备实例:服务端权威 roll 随机属性(反作弊,不变量 §6)后落库。
  // 幂等:instance_id 已鉴定 → 直接回放已有属性(不重复 roll);实例不存在 / 非本人 → 拒。
  // 客户端 RPC:以 Envoy 注入身份为准,不信任请求体 player_id(同 GetInventory)。
  rpc IdentifyItem(IdentifyItemRequest) returns (IdentifyItemResponse);

  // DiscardInstance 丢弃一件装备实例(从背包永久删除;客户端 RPC,以调用者身份为准)。
  // 幂等:实例不存在(已丢弃)→ OK no-op;非本人持有 → 拒。
  rpc DiscardInstance(DiscardInstanceRequest) returns (DiscardInstanceResponse);

  // MoveInstance 移动一件装备实例到新格子(改 slot_index;客户端 RPC,以调用者身份为准)。
  // 目标格越界(>= capacity)/ 已被占用 → 拒。纯大厅整理操作,不影响属性。
  rpc MoveInstance(MoveInstanceRequest) returns (MoveInstanceResponse);

  // FreezeForOrder 拍卖挂单冻结资产(系统接口,仅后端内部直连):
  //   卖单(SELL):把 quantity 个 item_config_id 从活跃背包移入托管(escrow),挂单期间不可被别处消耗;
  //   买单(BUY):把 quantity*unit_price 金币从活跃余额移入托管,出价期间锁定。
  // 幂等键 = order_id(挂单雪花),同一挂单重复冻结只生效一次;资产不足 → ERR_INVENTORY_INSUFFICIENT。
  // 与 SettleAuctionMatch / ReleaseEscrow 配套:成交从 escrow 消费、撤单 / 过期从 escrow 退还。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc FreezeForOrder(FreezeForOrderRequest) returns (FreezeForOrderResponse);

  // EnsureAuctionEscrow 修复旧版本拍卖订单的托管缺口(系统接口,仅后端内部直连):
  //   已有 active escrow 时严格核对方向、物品与剩余可结算资产,满足要求即幂等成功;
  //   escrow 缺失时从玩家活跃资产原子补冻 remaining_quantity 并创建 escrow。
  // closed / 订单参数冲突会明确拒绝,绝不把唯一键冲突直接当成功。
  // 该 RPC 只供 auction 持久补偿器调用,不在 Envoy 暴露;带玩家 JWT 的调用一律拒绝。
  rpc EnsureAuctionEscrow(EnsureAuctionEscrowRequest) returns (EnsureAuctionEscrowResponse);

  // SettleAuctionMatch 原子结算一笔拍卖成交(系统接口,仅后端内部直连):
  //   同一 MySQL 本地事务里从双方 escrow 消费完成资产对转 ——
  //     卖家:从卖单 escrow 消费 quantity 个 item_config_id 交付买家,卖家加 quantity*unit_price 金币;
  //     买家:从买单 escrow 消费 quantity*unit_price 金币付给卖家,买家加 quantity 个 item_config_id。
  // 因双方资产已在 FreezeForOrder 阶段冻结,成交不会因余额不足失败。
  // 幂等键 = match_id(雪花),同一成交重复结算只生效一次(不变量 §9.2 / §9.7)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc SettleAuctionMatch(SettleAuctionMatchRequest) returns (SettleAuctionMatchResponse);

  // SettlePlayerTrade 原子结算一笔玩家间点对点交易(系统接口,仅后端内部直连):
  //   与拍卖不同,P2P 交易无 escrow 预冻,直接从双方活跃背包 / 余额在同一 MySQL 本地事务里对转 ——
  //     卖家:手 seller_items 给买家,收 buyer_items + price 金币;
  //     买家:手 buyer_items + price 金币给卖家,收 seller_items。
  //   任一方道具 / 金币不足 → ERR_INVENTORY_INSUFFICIENT,整笔回滚。
  // 幂等键 = order_id(雪花),同一订单重复结算只生效一次(不变量 §9.7)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc SettlePlayerTrade(SettlePlayerTradeRequest) returns (SettlePlayerTradeResponse);

  // ReleaseEscrow 拍卖挂单托管退还(系统接口,仅后端内部直连):
  //   撤单 / 过期 / 完全成交后把某挂单 escrow 的残余资产退回玩家活跃余额并关闭托管。
  //   卖单残余 = 未成交道具;买单残余 = 未成交金币 + 成交价优于出价的价差返还。
  // 幂等键 = order_id,重复退还只生效一次(escrow status=closed 后再调为 no-op)。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc ReleaseEscrow(ReleaseEscrowRequest) returns (ReleaseEscrowResponse);

  // ── 邮件 transfer 附件实例托管(2026-07-22,bag-domain.md §7.1 三不变量落地)──
  //
  // 既存装备实例"只改归属"的托管转移链(拍卖成交到账 / 玩家转赠 / 活动补发已鉴定物):
  //   ① EscrowOutInstances:从源玩家原子扣出实例并托管(同一 MySQL 事务,托管期间实例
  //      不存在于任何玩家背包,player_item_instance 与 mail_transfer_escrow 互斥持有);
  //   ② 调用方(受信内部服务)把返回的 BagItem 快照装进 mail TransferAttachment 发个人邮件;
  //   ③ mail ClaimMail → ClaimTransferInstances:托管行逐字节原样搬进领取人实例表
  //      (同一事务;零重铸零重 roll,instance_id 与鉴定态/词条全保留);
  //   ④ 邮件发送失败时调用方补偿 ReleaseTransferEscrow 归还源玩家(saga)。
  // 领取侧只认托管行(escrow 权威),伪造附件(声称托管但未扣出)在 ③ 必然 fail-closed。
  // phase 2 背包域写权威切换后,本组 RPC 的领取入包路径迁 bag journal(mail_claim op),
  // 托管扣出/互斥持有语义不变。

  // EscrowOutInstances 邮件 transfer 托管扣出(系统接口,仅后端内部直连)。
  // 幂等键 = escrow_key(inventory_ledger uk,指纹含 instance_ids+to_player);
  // 实例不存在/非源玩家持有 → ERR_INVENTORY_ITEM_NOT_FOUND;绑定实例 → ERR_INVENTORY_INSTANCE_BOUND。
  // 不在 Envoy 暴露;带玩家 JWT 的客户端调用一律拒绝(同 GrantItems)。
  rpc EscrowOutInstances(EscrowOutInstancesRequest) returns (EscrowOutInstancesResponse);

  // ClaimTransferInstances 领取托管实例(mail ClaimMail 专用;系统接口,仅后端内部直连)。
  // 幂等键 = idempotency_key(mail 侧 mail_xfer:{mail}:{player});重放命中直接成功。
  // 托管行缺失 / to_player 不符 / config 漂移 → ERR_INVENTORY_ITEM_NOT_FOUND(整批拒,
  // 邮件保持未领取);领取人实例背包满 → ERR_INVENTORY_CAPACITY_FULL(重领可重试)。
  rpc ClaimTransferInstances(ClaimTransferInstancesRequest) returns (ClaimTransferInstancesResponse);

  // ReleaseTransferEscrow 托管释放回源玩家(发信 saga 失败补偿;系统接口,仅后端内部直连)。
  // 幂等由托管行存在性承担:行已被领取/已释放 → no-op 成功(资产只落一处)。
  // 释放不设容量闸(资产归还优先):无空闲格时以未分配格(slot NULL)入包。
  rpc ReleaseTransferEscrow(ReleaseTransferEscrowRequest) returns (ReleaseTransferEscrowResponse);

  // ConsumeTransferEscrow 消托管行不物化(bag phase 2 DS 领取链;mail.MarkMailClaimed 调):
  // transfer 附件已经 bag journal 原样入包(bag 域),经济域托管行只删不再物化,
  // 防"bag 域已入 + 托管行残留被释放/领取"造成实例双持。行必须 destined to 该玩家;
  // 行缺失 = 已消费,no-op 幂等。系统接口,仅后端内部直连。
  rpc ConsumeTransferEscrow(ConsumeTransferEscrowRequest) returns (ConsumeTransferEscrowResponse);
}

// EscrowSide 冻结方向(对齐 auction OrderSide:SELL=1 冻道具 / BUY=2 冻金币)。
enum EscrowSide {
  ESCROW_SIDE_UNSPECIFIED = 0;
  ESCROW_SIDE_SELL        = 1;  // 卖单:冻结道具
  ESCROW_SIDE_BUY         = 2;  // 买单:冻结金币
}

// ItemStack 是背包里某配置道具的持有堆叠(客户端可见结构)。
// item_config_id 是道具配置 ID(uint32,§12);count 是持有数量(>0)。
message ItemStack {
  uint32 item_config_id = 1;
  int64  count          = 2;
}

// ItemGrant 是一次发放里对某配置道具增加的数量(count>0)。
message ItemGrant {
  uint32 item_config_id = 1;
  int64  count          = 2;
}

// CurrencyKind 货币类型(枚举底层 int32,§13;不属于 ID 规则)。
enum CurrencyKind {
  CURRENCY_KIND_UNSPECIFIED = 0;
  CURRENCY_KIND_GOLD        = 1;  // 金币(出售道具 / 大厅经济主货币)
}

// Inventory 是玩家背包快照(客户端可见结构)。
message Inventory {
  uint64 player_id = 1;
  int64  gold      = 2;  // 金币余额
  repeated ItemStack items = 3;
  int32  capacity  = 4;              // 背包格子容量(装备实例上限;<=0 表示未启用实例背包)
  repeated ItemInstance instances = 5;  // 装备类实例(每件唯一 + 鉴定后随机属性)
}

// ItemAttribute 是装备实例鉴定后的一条随机属性(attr_id 属性配置 ID,§12;value 数值)。
message ItemAttribute {
  uint32 attr_id = 1;
  int64  value   = 2;
}

// ItemInstance 是一件装备类道具的唯一实例(不可堆叠;客户端可见结构,不下发存储字段 §14)。
//
//   instance_id  雪花唯一 ID(uint64,§11),背包内定位 / 移动 / 丢弃 / 鉴定的键;
//   identified   是否已鉴定:false=未鉴定(attributes 为空,客户端显示"未鉴定");
//   attributes   鉴定后服务端 roll 的随机属性(identified=true 才非空,不变量 §6);
//   slot_index   背包格子索引([0,capacity),客户端拼格子布局用);
//   bound        是否绑定(绑定后不可交易 / 出售,规则由配置裁决)。
message ItemInstance {
  uint64 instance_id   = 1;
  uint32 item_config_id = 2;
  bool   identified    = 3;
  repeated ItemAttribute attributes = 4;
  int32  slot_index    = 5;
  bool   bound         = 6;
}

message GetInventoryRequest {
  uint64 player_id = 1;
}

message GetInventoryResponse {
  pandora.common.v1.ErrCode code = 1;
  Inventory inventory = 2;
}

// GrantItemsRequest 幂等发放(idempotency_key 防重复入账,来源:drop:<match_id> / reward:<id>)。
message GrantItemsRequest {
  uint64 player_id       = 1;
  repeated ItemGrant items = 2;  // 每条 count 须 > 0
  int64  gold            = 3;    // 同时发放金币(>=0)
  string idempotency_key = 4;
}

message GrantItemsResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 gold = 2;  // 发放后金币余额
}

// UseItemRequest 大厅态使用消耗品(数量不足 → ERR_INVENTORY_INSUFFICIENT;
// 不可大厅使用 → ERR_INVENTORY_ITEM_NOT_USABLE)。
message UseItemRequest {
  uint64 player_id       = 1;
  uint32 item_config_id  = 2;
  int64  count           = 3;  // 须 > 0
  string idempotency_key = 4;
}

message UseItemResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 remaining = 2;  // 使用后该道具剩余数量
}

// SellItemRequest 出售道具换金币(数量不足 → ERR_INVENTORY_INSUFFICIENT;
// 不可出售 → ERR_INVENTORY_NOT_SELLABLE)。
message SellItemRequest {
  uint64 player_id       = 1;
  uint32 item_config_id  = 2;
  int64  count           = 3;  // 须 > 0
  string idempotency_key = 4;
}

message SellItemResponse {
  pandora.common.v1.ErrCode code = 1;
  int64 remaining = 2;  // 出售后该道具剩余数量
  int64 gold      = 3;  // 出售后金币余额
}

// SettleAuctionMatchRequest 拍卖成交结算(系统接口,后端内部直连)。
// 幂等键 = match_id;总价 = quantity * unit_price(在 inventory 端做溢出安全乘法)。
// 资产从双方挂单 escrow 消费,故须带 sell_order_id / buy_order_id 定位 escrow。
message SettleAuctionMatchRequest {
  uint64 match_id       = 1;  // 成交幂等键(雪花 uint64,§11)
  uint64 seller_id      = 2;  // 卖家 player_id(交付道具 / 收金币)
  uint64 buyer_id       = 3;  // 买家 player_id(付金币 / 收道具)
  uint32 item_config_id = 4;  // 成交道具配置 ID(uint32,§12)
  int64  quantity       = 5;  // 成交数量(> 0)
  int64  unit_price     = 6;  // 成交单价金币(> 0,被动挂单价)
  uint64 sell_order_id  = 7;  // 卖单 order_id(定位卖家道具 escrow)
  uint64 buy_order_id   = 8;  // 买单 order_id(定位买家金币 escrow)
}

message SettleAuctionMatchResponse {
  pandora.common.v1.ErrCode code = 1;
}

// SettlePlayerTradeRequest 玩家间点对点交易结算(系统接口,后端内部直连)。
// 幂等键 = order_id;无 escrow,直接从双方活跃背包 / 余额原子对转。
message SettlePlayerTradeRequest {
  uint64 order_id     = 1;  // 交易订单 order_id(结算幂等键,雪花 uint64,§11)
  uint64 seller_id    = 2;  // 卖家 player_id(交 seller_items,收 buyer_items + price)
  uint64 buyer_id     = 3;  // 买家 player_id(交 buyer_items + price,收 seller_items)
  repeated ItemGrant seller_items = 4;  // 卖家交付给买家的道具(每条 count > 0)
  repeated ItemGrant buyer_items  = 5;  // 买家交付给卖家的道具(可空 = 纯金币购买)
  int64  price        = 6;  // 买家付卖家的金币(>= 0)
}

message SettlePlayerTradeResponse {
  pandora.common.v1.ErrCode code = 1;
}

// FreezeForOrderRequest 挂单冻结资产(系统接口,后端内部直连)。
// 幂等键 = order_id;SELL 冻 quantity 道具,BUY 冻 quantity*unit_price 金币(溢出安全乘)。
message FreezeForOrderRequest {
  uint64     player_id      = 1;  // 挂单玩家 player_id
  uint64     order_id       = 2;  // 挂单 order_id(冻结幂等键 + escrow 键)
  EscrowSide side           = 3;  // SELL=冻道具 / BUY=冻金币
  uint32     item_config_id = 4;  // 道具配置 ID(uint32,§12)
  int64      quantity       = 5;  // 挂单数量(> 0)
  int64      unit_price     = 6;  // 挂单单价金币(> 0;BUY 冻 quantity*unit_price)
}

message FreezeForOrderResponse {
  pandora.common.v1.ErrCode code = 1;
}

// EnsureAuctionEscrowRequest 为旧版本已进入 OPEN/PARTIAL、但可能尚未冻结资产的订单补齐 escrow。
// remaining_quantity / unit_price 均为非负业务量,按 CLAUDE.md §5.12 使用 uint64;
// inventory 权威库为 BIGINT,超出 int64 或乘法溢出会返回 ERR_INVALID_ARG。
message EnsureAuctionEscrowRequest {
  uint64     player_id          = 1;  // 挂单玩家 player_id
  uint64     order_id           = 2;  // 挂单 order_id(escrow 唯一键)
  EscrowSide side               = 3;  // SELL=确保剩余道具托管 / BUY=确保剩余金币托管
  uint32     item_config_id     = 4;  // 订单不可变道具配置 ID
  uint64     remaining_quantity = 5;  // 尚未成交的剩余数量(> 0)
  uint64     unit_price         = 6;  // 订单单价金币(> 0;BUY 至少托管 remaining*price)
}

message EnsureAuctionEscrowResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ReleaseEscrowRequest 退还挂单 escrow 残余(系统接口,后端内部直连)。幂等键 = order_id。
message ReleaseEscrowRequest {
  uint64 player_id = 1;  // 挂单玩家 player_id
  uint64 order_id  = 2;  // 挂单 order_id(escrow 键)
}

message ReleaseEscrowResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ── 装备实例 / 鉴定消息(W5 ④)──

// GrantInstancesRequest 幂等发放装备实例(系统接口,后端内部直连)。
// 每个 item_config_id 生成一件独立实例(默认未鉴定);幂等键防重复入账。
message GrantInstancesRequest {
  uint64 player_id       = 1;
  repeated uint32 item_config_ids = 2;  // 每个元素发一件实例(> 0)
  string idempotency_key = 3;
}

message GrantInstancesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated ItemInstance instances = 2;  // 本次发放的实例(含新生成 instance_id)
}

// IdentifyItemRequest 鉴定一件未鉴定装备实例(客户端 RPC,以调用者身份为准)。
message IdentifyItemRequest {
  uint64 player_id   = 1;
  uint64 instance_id = 2;
}

message IdentifyItemResponse {
  pandora.common.v1.ErrCode code = 1;
  ItemInstance instance = 2;  // 鉴定后(或幂等回放的)实例,含随机属性
}

// DiscardInstanceRequest 丢弃一件装备实例(客户端 RPC,以调用者身份为准)。
message DiscardInstanceRequest {
  uint64 player_id   = 1;
  uint64 instance_id = 2;
}

message DiscardInstanceResponse {
  pandora.common.v1.ErrCode code = 1;
}

// MoveInstanceRequest 移动一件装备实例到新格子(客户端 RPC,以调用者身份为准)。
message MoveInstanceRequest {
  uint64 player_id     = 1;
  uint64 instance_id   = 2;
  int32  to_slot_index = 3;  // 目标格子([0,capacity),须空闲)
}

message MoveInstanceResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ── 邮件 transfer 附件实例托管消息(2026-07-22)──

// EscrowOutInstancesRequest 托管扣出:source_player_id 必填(>0,当前持有人);
// to_player_id 是预期领取人(领取侧校验,防其它邮件冒领);escrow_key 是幂等键
// (建议 = 业务源操作键,如 auction_deliver:<match_id> / gift:<order_id>)。
message EscrowOutInstancesRequest {
  uint64 source_player_id      = 1;
  uint64 to_player_id          = 2;
  repeated uint64 instance_ids = 3;  // 非空,无重复
  string escrow_key            = 4;
}

// EscrowOutInstancesResponse items 是托管快照(BagItem:instance_id/config/鉴定态/词条,
// count 恒 1),调用方原样装进 mail TransferAttachment.item,不得改写任何字段。
message EscrowOutInstancesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated pandora.bag.v1.BagItem items = 2;
}

// TransferClaimItem 领取核对项:instance_id 定位托管行,item_config_id 交叉核对
// (与托管行不符 = 附件漂移/伪造,整批拒)。
message TransferClaimItem {
  uint64 instance_id    = 1;
  uint32 item_config_id = 2;
}

message ClaimTransferInstancesRequest {
  uint64 to_player_id             = 1;  // 领取人(须与托管行 to_player_id 一致)
  repeated TransferClaimItem items = 2;  // 非空,无重复
  string idempotency_key          = 3;  // mail 侧 mail_xfer:{mail}:{player}
}

message ClaimTransferInstancesResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ReleaseTransferEscrowRequest {
  repeated uint64 instance_ids = 1;  // 非空;逐行按托管行 source_player_id 归还
}

message ReleaseTransferEscrowResponse {
  pandora.common.v1.ErrCode code = 1;
}

message ConsumeTransferEscrowRequest {
  uint64 to_player_id          = 1;  // 领取人(托管行 to_player_id 必须一致,否则整批拒)
  repeated uint64 instance_ids = 2;  // 非空,无重复
}

message ConsumeTransferEscrowResponse {
  pandora.common.v1.ErrCode code = 1;
}
