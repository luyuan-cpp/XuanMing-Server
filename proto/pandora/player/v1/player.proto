// Pandora PlayerService 协议。
//
// 职责(docs/design/go-services.md §2.2):
//   - 玩家档案(昵称/头像/等级/段位)
//   - 英雄解锁记录 / 皮肤
//   - MMR 读写(写由 battle_result 调,必须幂等 idempotency_key=match_id)

syntax = "proto3";

package pandora.player.v1;

import "pandora/common/v1/errcode.proto";

service PlayerService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc UpdateNickname(UpdateNicknameRequest) returns (UpdateNicknameResponse);
  rpc ListHeroes(ListHeroesRequest) returns (ListHeroesResponse);
  rpc UnlockHero(UnlockHeroRequest) returns (UnlockHeroResponse);
  rpc GetMMR(GetMMRRequest) returns (GetMMRResponse);
  rpc UpdateMMR(UpdateMMRRequest) returns (UpdateMMRResponse);

  // ── 出战养成(选英雄 / 属性加点 / 出战快照)──
  // 边界(docs/design/ds-arch.md §0):仅大厅态持久化与配置;纯战斗内逻辑(技能/出装/
  // 道具即时使用)走 UE GAS,不经 gRPC。GetLoadout 提供"开战前快照"。
  rpc SelectHero(SelectHeroRequest) returns (SelectHeroResponse);
  rpc GetActiveHero(GetActiveHeroRequest) returns (GetActiveHeroResponse);
  rpc GrantAttributePoints(GrantAttributePointsRequest) returns (GrantAttributePointsResponse);
  rpc AllocateAttributePoints(AllocateAttributePointsRequest) returns (AllocateAttributePointsResponse);
  rpc ResetAttributes(ResetAttributesRequest) returns (ResetAttributesResponse);
  rpc GetAttributes(GetAttributesRequest) returns (GetAttributesResponse);

  // ── 出战装备预设 / 天赋树(W5 ② loadout)──
  // 装备预设 = 大厅态"出装预设"(引用装备配置 ID),开战前转成初始 GameplayEffect;
  // 战斗内买装 / 换装走 UE GAS,不经 gRPC(ds-arch.md §0.1、§0.5)。
  rpc SetEquipment(SetEquipmentRequest) returns (SetEquipmentResponse);
  rpc GetEquipment(GetEquipmentRequest) returns (GetEquipmentResponse);
  rpc GrantTalentPoints(GrantTalentPointsRequest) returns (GrantTalentPointsResponse);
  rpc SetTalents(SetTalentsRequest) returns (SetTalentsResponse);
  rpc ResetTalents(ResetTalentsRequest) returns (ResetTalentsResponse);
  rpc GetTalents(GetTalentsRequest) returns (GetTalentsResponse);

  rpc GetLoadout(GetLoadoutRequest) returns (GetLoadoutResponse);

  // ── 领奖(签到里程碑 / 成就 / 新手 / 永久任务 / 活动)──
  // 客户端经 Envoy 调用领取奖励档位;服务端权威判重幂等(不变量 §2 / §7),
  // 永久类与活动类分别落进玩家领奖记录(见 RewardClaimStorageRecord)。
  // 响应只回客户端可见最小视图(§14),不外露存储位图。
  rpc ClaimReward(ClaimRewardRequest) returns (ClaimRewardResponse);
  rpc GetRewardClaims(GetRewardClaimsRequest) returns (GetRewardClaimsResponse);
}

// ===== 玩家档案 =====

message PlayerProfile {
  uint64 player_id     = 1;
  string nickname      = 2;
  int32  level         = 3;
  int32  mmr           = 4;
  string avatar        = 5;
  int64  created_at_ms = 6;
  int64  last_seen_ms  = 7;
  // 8-9 reserved core
  reserved 8 to 9;

  int32  total_battles = 10;
  int32  total_wins    = 11;
  // 12-49 reserved for stats
  reserved 12 to 49;
}

message GetProfileRequest {
  uint64 player_id = 1;
}

message GetProfileResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerProfile profile = 2;
}

message UpdateNicknameRequest {
  uint64 player_id = 1;
  string nickname  = 2;
}

message UpdateNicknameResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== 英雄 =====

message ListHeroesRequest {
  uint64 player_id = 1;
}

message ListHeroesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated uint32 hero_ids = 2;
}

message UnlockHeroRequest {
  uint64 player_id = 1;
  uint32 hero_id   = 2;
  string source   = 3;  // "purchase" | "reward" | "freebie"
}

message UnlockHeroResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== MMR(段位)=====

message GetMMRRequest {
  uint64 player_id = 1;
}

message GetMMRResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 mmr = 2;
}

// UpdateMMR 必须幂等(idempotency_key 通常是 match_id)。
// 同一 idempotency_key 重复调用,服务端只算一次。
message UpdateMMRRequest {
  uint64 player_id       = 1;
  int32  delta           = 2;
  string reason          = 3;  // "win" | "lose" | "abandon" | "rollback"
  string idempotency_key = 4;  // 一般是 match_id
}

message UpdateMMRResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 new_mmr = 2;
}

// ===== 推送事件(kafka pandora.player.update)=====

// PlayerUpdateEvent 是玩家档案变更事件(kafka key = player_id,不变量 §9)。
//
// W4 ③:battle_result 结算后发本事件携带 mmr_delta(reason="win"/"lose"/"abandon"),
// player 服务上线后消费做幂等 UpdateMMR(idempotency_key=match_id);push 可订阅推客户端。
// W4 ③ 阶段尚无消费方,先定义 proto + 生产侧打通,至少投递一次保留供后续消费。
message PlayerUpdateEvent {
  uint64 player_id = 1;
  uint64 match_id  = 2;  // 幂等键来源
  int32  mmr_delta = 3;
  string reason    = 4;  // "win" | "lose" | "draw" | "abandon"
  int64  ts_ms     = 5;
}

// ===== 出战养成(选英雄 / 属性加点 / 出战快照)=====

// AttributeAllocation 是某条属性的已分配点数(客户端可见结构)。
// attr_key 是属性键(如 "str" / "agi" / "int" / "vit"),由配置约定。
message AttributeAllocation {
  string attr_key = 1;
  int32  points   = 2;
}

// SelectHero 设定出战英雄(只能选已解锁英雄;功能开关关闭时返回 ERR_PLAYER_FEATURE_DISABLED)。
message SelectHeroRequest {
  uint64 player_id = 1;
  uint32 hero_id   = 2;
}

message SelectHeroResponse {
  pandora.common.v1.ErrCode code = 1;
}

message GetActiveHeroRequest {
  uint64 player_id = 1;
}

message GetActiveHeroResponse {
  pandora.common.v1.ErrCode code = 1;
  uint32 hero_id = 2;  // 0 表示未选定
}

// GrantAttributePoints 幂等授予可分配点(idempotency_key 防重复授予,来源:升级/活动)。
message GrantAttributePointsRequest {
  uint64 player_id       = 1;
  int32  points          = 2;  // 须 > 0
  string idempotency_key = 3;
}

message GrantAttributePointsResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;  // 授予后剩余可分配点
}

// AllocateAttributePoints 分配属性点(点数不足返回 ERR_PLAYER_INSUFFICIENT_POINTS)。
message AllocateAttributePointsRequest {
  uint64 player_id = 1;
  repeated AttributeAllocation allocations = 2;  // 每条 points 须 > 0
}

message AllocateAttributePointsResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;  // 分配后剩余可分配点
}

// ResetAttributes 洗点(已分配点全退回可分配点)。
message ResetAttributesRequest {
  uint64 player_id = 1;
}

message ResetAttributesResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;  // 洗点后可分配点
}

message GetAttributesRequest {
  uint64 player_id = 1;
}

message GetAttributesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated AttributeAllocation attributes = 2;
  int32 unspent_points = 3;
}

// LoadoutEquipment 是出战装备预设的一个槽位(大厅态;开战前转成初始 GameplayEffect,ds-arch §0.5)。
// slot 是槽位序号(0..N-1,配置约定);item_config_id 是装备配置 ID(uint32,§12)。
message LoadoutEquipment {
  uint32 slot           = 1;
  uint32 item_config_id = 2;
}

// TalentNode 是天赋树某节点的已点等级(客户端可见结构)。
// talent_id 是天赋配置 ID(uint32,§12);level 是已点等级(>0)。
message TalentNode {
  uint32 talent_id = 1;
  int32  level     = 2;
}

// SetEquipment 全量替换出战装备预设(功能开关关闭时返回 ERR_PLAYER_FEATURE_DISABLED)。
message SetEquipmentRequest {
  uint64 player_id = 1;
  repeated LoadoutEquipment equipment = 2;  // 槽位唯一;item_config_id 须 > 0
}

message SetEquipmentResponse {
  pandora.common.v1.ErrCode code = 1;
}

message GetEquipmentRequest {
  uint64 player_id = 1;
}

message GetEquipmentResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated LoadoutEquipment equipment = 2;
}

// GrantTalentPoints 幂等授予天赋点(来源:升级 / 活动,idempotency_key 防重复授予)。
message GrantTalentPointsRequest {
  uint64 player_id       = 1;
  int32  points          = 2;  // 须 > 0
  string idempotency_key = 3;
}

message GrantTalentPointsResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;  // 授予后剩余可点天赋点
}

// SetTalents 全量重置天赋分配(re-spec;sum(level) 超过已授予天赋点 → ERR_PLAYER_INSUFFICIENT_POINTS)。
message SetTalentsRequest {
  uint64 player_id = 1;
  repeated TalentNode talents = 2;  // talent_id 唯一;level 须 > 0
}

message SetTalentsResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;  // 设置后剩余可点天赋点
}

// ResetTalents 清空天赋分配(全部退回可点天赋点)。
message ResetTalentsRequest {
  uint64 player_id = 1;
}

message ResetTalentsResponse {
  pandora.common.v1.ErrCode code = 1;
  int32 unspent_points = 2;
}

message GetTalentsRequest {
  uint64 player_id = 1;
}

message GetTalentsResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated TalentNode talents = 2;
  int32 unspent_points = 3;
}

// PlayerLoadout 是开战前快照(出战英雄 + 属性点 + 装备预设 + 天赋),供匹配/进战下发(客户端可见结构)。
message PlayerLoadout {
  uint64 player_id = 1;
  uint32 active_hero_id = 2;
  repeated AttributeAllocation attributes = 3;
  int32 unspent_attr_points = 4;
  repeated LoadoutEquipment equipment = 5;
  repeated TalentNode talents = 6;
  int32 unspent_talent_points = 7;
}

message GetLoadoutRequest {
  uint64 player_id = 1;
}

message GetLoadoutResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerLoadout loadout = 2;
}

// ===== 领奖记录(存储快照)=====

// RewardClaimStorageRecord 是玩家"领奖记录"的服务端存储快照(CLAUDE.md §5.8 四类命名:
// 存储快照 = <Domain>StorageRecord)。用变长位图(bytes)记录每个奖励档位是否已领取,
// 判重 O(1)、落地紧凑;由 pkg/rewardclaim 在内存里维护、序列化进本 record 的 bytes。
//
// 落地:整条 record 序列化成 bytes 存进 pandora_player.player_reward_claims.record 列
// (player_id PK + version 乐观锁)。和玩家档案同库同 player_id,回档随库一起恢复、
// 合服随 player_id 一起迁移,天然原子(不变量 §2 / §7 幂等;§14 不外露)。
//
// ⚠️ §5.10 / §5.11 / 不变量 §14:本 record 是存储快照,禁止直接返回 / 推送给客户端。
// 面向客户端的领奖结果只回最小视图(已领 / 可领布尔、奖励内容),由服务端从本 record 组装。
//
// permanent:永久类(签到里程碑 / 成就 / 新手 / 永久任务……),key = 来源名(如 "sign_in"
//   / "achievement"),只增不删,bit 位永久稳定。
// activity:活动类,key = 活动实例 ID(每期唯一,含轮次 / 版本);活动下线整条删除回收,
//   下期新活动用新实例 ID 从零开始,即使复用相同档位 bit 也不串味。
message RewardClaimStorageRecord {
  map<string, bytes> permanent = 1;  // 来源名 → 领取位图(变长 bitmap bytes)
  map<uint64, bytes> activity  = 2;  // 活动实例 ID → 领取位图(变长 bitmap bytes)
}

// RewardSourceType 区分领奖来源的两类生命周期(对应 RewardClaimStorageRecord 两张 map)。
enum RewardSourceType {
  REWARD_SOURCE_TYPE_UNSPECIFIED = 0;
  REWARD_SOURCE_TYPE_PERMANENT   = 1;  // 永久类:按来源名(sign_in / achievement / ……)
  REWARD_SOURCE_TYPE_ACTIVITY    = 2;  // 活动类:按活动实例 ID,下线整条回收
}

// ClaimRewardRequest 领取一档奖励(客户端 → player,经 Envoy 鉴权)。
// 服务端把 reward_id(配置 ID)映射成 bit 位,判重幂等后置位并持久化(乐观锁)。
message ClaimRewardRequest {
  uint64 player_id = 1;
  RewardSourceType source_type = 2;
  // 永久类:来源名(如 "sign_in" / "achievement");活动类留空。
  string source = 3;
  // 活动类:活动实例 ID(每期唯一,含轮次);永久类填 0。
  uint64 activity_instance_id = 4;
  // 奖励档位配置 ID(uint32,§12);服务端映射成 bit 位记录领取。
  uint32 reward_id = 5;
}

message ClaimRewardResponse {
  pandora.common.v1.ErrCode code = 1;
}

// GetRewardClaimsRequest 查询某来源已领取的档位(客户端可见最小视图)。
message GetRewardClaimsRequest {
  uint64 player_id = 1;
  RewardSourceType source_type = 2;
  string source = 3;                 // 永久类:来源名;活动类留空
  uint64 activity_instance_id = 4;   // 活动类:活动实例 ID;永久类填 0
}

// GetRewardClaimsResponse 只回已领取的奖励配置 ID 列表(§14 最小视图,不外露存储位图)。
message GetRewardClaimsResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated uint32 claimed_reward_ids = 2;
}
