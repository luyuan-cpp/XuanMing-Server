// Pandora 配置表 Excel 注解(自定义 option;做法对齐旧项目 protogen 的选项驱动生成)。
//
// proto 是配置表的单一事实源:表(容器 message)与列(行 message 字段)的导表元信息
// 全部以下列 option 标注,tools/configtable-gen 经 protoreflect 描述符自动发现:
//   - 打了 (excel_file) 的 <Name>TableData 容器 = 一张配置表;
//   - 行 message 里打了 (excel_col) 的字段 = 源表一列(按字段号序对应表头列序);
//   - 主键约定:行 message 必有名为 id 的 uint32 字段(CLAUDE.md §5.6)。
// 加新表不再手写任何登记代码:写 proto(带注解)→ proto_gen.ps1 → configtable-gen。
//
// 扩展号取内部保留区 [50000, 99999](不对外发布,仓库内自治)。

syntax = "proto3";

package pandora.config.v1;

import "google/protobuf/descriptor.proto";

extend google.protobuf.MessageOptions {
  // excel_file 源表相对路径(相对 Pandora-Client-SVN/Table 根目录)。
  // 标注在整表容器 message 上;未标注的 message 不参与导表。
  string excel_file = 51501;

  // excel_bit_index 为本表生成「稳定 ID → 位序」映射(<name>_bitindex.gen.go),
  // 供按位图存储进度/解锁标记的系统使用(旧项目 mission/reward 用途)。
  // 稳定性由状态文件 configtable/bitindex_state/<name>.json 保证:
  // 新 ID 追加分配、删除的 ID 保留占位永不复用,已落库位图不因改表而错位。
  bool excel_bit_index = 51506;
}

extend google.protobuf.FieldOptions {
  // excel_col 源表列名(表头第 1 行,逐列精确匹配;列序 = 字段号序)。
  string excel_col = 51502;

  // excel_required 单元格必填:空单元格报错。默认 false(空取 excel_default,无默认则类型零值)。
  bool excel_required = 51503;

  // excel_default 空单元格的默认值(按列类型解析,如 bool 列 "1"/"0");与 excel_required 互斥。
  string excel_default = 51504;

  // excel_prefix 非空单元格必须以该前缀开头(如 UE 资产 / 类路径 "/")。
  string excel_prefix = 51505;

  // excel_key 唯一二级键(旧项目列标记 `key`):生成 By<Field> 单行查询,
  // 生成与加载两阶段都校验取值唯一。不可与 excel_multi_key / excel_fk 同用,不可标在 id 上。
  bool excel_key = 51507;

  // excel_multi_key 非唯一索引(旧项目列标记 `multi`):生成 ListBy<Field> 多行查询。
  bool excel_multi_key = 51508;

  // excel_fk 外键(旧项目列标记 `fk:Table`):取值必须存在于目标表的 id
  // (值填目标表注册键,如 "level";列类型必须 uint32,对齐配置表 ID 规则)。
  // 生成阶段做批内引用完整性校验(§7.5),加载阶段由生成的 validateCrossTables 再兜底;
  // 代码侧生成正向解析(Tables.<Src><Field>Row)与反向索引(ListBy<Field>)。
  // 非必填列取值 0 = 无引用,跳过校验。暂只支持引用目标表 id,不支持 fk:Table.column 与 gfk。
  string excel_fk = 51509;
}
