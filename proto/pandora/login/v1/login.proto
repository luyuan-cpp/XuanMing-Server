// Pandora LoginService 协议。
//
// 职责(docs/design/go-services.md §2.1):
//   - 账号注册 / 登录 / 登出
//   - 颁发 Session Token(给客户端)
//   - 颁发 DS Ticket(JWT,给 UE DS 校验)
//   - 验证 DS Ticket(防重放,jti 黑名单)
//
// W2 (2026-06-05) 加 google.api.http 注解(Kratos protoc-gen-go-http 用):
//   - 业务服同时暴露 gRPC + HTTP 两套 endpoint
//   - Envoy gRPC-Web filter 把客户端请求转 gRPC,优先走 gRPC
//   - HTTP endpoint 给运营后台 / 第三方 webhook 用,玩家客户端不直连

syntax = "proto3";

package pandora.login.v1;

import "pandora/common/v1/errcode.proto";
import "google/api/annotations.proto";

service LoginService {
  // Login 立即完成型(synchronous),response 含完整 session_token + hub 地址
  // kafka push 不发给 caller(他看 RPC response 即可)
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
  }

  // Logout 立即完成型,清 session
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/logout"
      body: "*"
    };
  }

  // IssueDSTicket 立即完成型,DS 进入前 client 调拿短期票据
  rpc IssueDSTicket(IssueDSTicketRequest) returns (IssueDSTicketResponse) {
    option (google.api.http) = {
      post: "/v1/ds/ticket/issue"
      body: "*"
    };
  }

  // SelectRole 立即完成型,选角(2026-07-08)。
  // 玩家在选角界面确认角色后调用:服务端校验 role_id 合法 → 落库(player_roles,权威源)
  //   → 经 hub_allocator.AssignHub 拿"当前有效"大厅地址 + 把 role_id 签进全新 hub 票据。
  // 客户端凭 response 的 hub_ds_addr + hub_ticket ClientTravel 进大厅;
  // Hub DS 从票据 claim 读 role_id 生成角色(不再信任 URL ?role= 自报)。
  // player_id 取自 JWT sub(Envoy jwt_authn 注入 x-pandora-player-id),请求体不含 player_id。
  // 幂等:重复调用/换角色重选都是覆盖式 upsert。
  rpc SelectRole(SelectRoleRequest) returns (SelectRoleResponse) {
    option (google.api.http) = {
      post: "/v1/role/select"
      body: "*"
    };
  }

  // VerifyDSTicket 立即完成型,DS 内部用(不暴露 HTTP path 给客户端)
  // ⚠️ Envoy 应该用 ext_authz / route 限制此 path 只允许内网
  rpc VerifyDSTicket(VerifyDSTicketRequest) returns (VerifyDSTicketResponse) {
    option (google.api.http) = {
      post: "/v1/ds/ticket/verify"
      body: "*"
    };
  }

  // GetResumeContext 让冷启动/前台恢复重新读取服务端权威路由；客户端不得继续相信
  // 旧地址、旧票据或本地超时推导。match_stage 可由 matchmaker durable saga 后续补齐。
  rpc GetResumeContext(GetResumeContextRequest) returns (GetResumeContextResponse) {
    option (google.api.http) = {
      post: "/v1/resume/context"
      body: "*"
    };
  }
}

// ===== 登录 =====

message LoginRequest {
  string account        = 1;
  string password_hash  = 2;  // 客户端先 sha256
  string device_id      = 3;
  string client_version = 4;
  // 5-9 reserved core
  reserved 5 to 9;

  string region = 10;
  string locale = 11;
  // 12-49 reserved for client metadata
  reserved 12 to 49;
}

message LoginResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 player_id     = 2;
  string session_token = 3;  // 连后端 gRPC 用
  string hub_ds_addr   = 4;  // 直连大厅 DS 的 IP:port
  string hub_ticket    = 5;  // hub DS 票据(JWT)
  // [proto] 全服扩容三层化(docs/design/scale-cellular-20m.md §3.2/§3.3):玩家确定性路由落点。
  // 客户端 / 边缘网关据此把后续连接(gRPC-Web、push stream)连到正确 Region 的正确 Cell。
  // 单 Cell / dev 部署为 0。uint32 拓扑维度(非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 region_id = 6;
  uint32 cell_id   = 7;
  // ===== 断线重连(docs/design/battle-reconnect.md)=====
  // 玩家已在 battle DS 中掉线,重新登录时 login 查 player_locator 发现其处于 BATTLE 态,
  // 直接下发原对局的 battle DS 直连信息(而非把玩家丢回大厅)。三字段"要么全空、要么全填":
  //   - 空(默认):玩家不在战斗中,客户端走 hub_ds_addr / hub_ticket 进大厅(既有流程)。
  //   - 非空:客户端应直连 battle_ds_addr 用 battle_ticket 重连原对局;
  //     连接失败(对局已结束 / 票据过期)再回退调 IssueDSTicket 拿 hub 地址回大厅。
  // battle 字段非空时 hub_ds_addr / hub_ticket 为空(login 检测到 BATTLE 不再分配 hub)。
  string battle_ds_addr = 8;  // 直连 battle DS 的 IP:port
  string battle_ticket  = 9;  // battle DS 票据(JWT,新 jti)
  uint64 match_id       = 10; // 重连对局 ID(Snowflake uint64,CLAUDE.md §9.11)
  // ===== 选角(2026-07-08)=====
  // 玩家当前已选角色(player_roles 表,服务端权威)。0 = 从未选过角。
  // 客户端登录后进选角界面,用此值预选中上次角色;确认后调 SelectRole。
  // uint32 配置表 ID(CfgRole.Id,非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 selected_role_id = 11;
  ResumeContext resume_context = 12;
}

enum ResumeRoute {
  RESUME_ROUTE_UNSPECIFIED = 0;
  RESUME_ROUTE_HUB = 1;
  RESUME_ROUTE_BATTLE = 2;
  RESUME_ROUTE_UNKNOWN = 3;
}

enum ResumeMatchStage {
  RESUME_MATCH_STAGE_UNSPECIFIED = 0;
  RESUME_MATCH_STAGE_NONE = 1;
  RESUME_MATCH_STAGE_QUEUED = 2;
  RESUME_MATCH_STAGE_CONFIRMING = 3;
  RESUME_MATCH_STAGE_ALLOCATING = 4;
  RESUME_MATCH_STAGE_READY = 5;
  RESUME_MATCH_STAGE_RUNNING = 6;
}

// ResumePlacementState distinguishes an admitted route from an in-flight
// transition. A route alone is never sufficient proof that ClientTravel /
// Admission completed: HUB_PENDING still routes toward Hub but must retain the
// operation/fence and retry.
enum ResumePlacementState {
  RESUME_PLACEMENT_STATE_UNSPECIFIED = 0;
  RESUME_PLACEMENT_STATE_PENDING = 1;
  RESUME_PLACEMENT_STATE_STABLE = 2;
}

message ResumeContext {
  ResumeRoute route = 1;
  uint64 match_id = 2;
  ResumeMatchStage match_stage = 3;
  uint64 placement_version = 4;
  string operation_id = 5;
  ResumePlacementState placement_state = 6;
  string ds_pod_name = 7;
  string ds_instance_uid = 8;
  string hub_assignment_id = 9;
  uint32 ds_instance_epoch = 10;
  string allocation_id = 11;
  string release_track = 12;
  // Canonical matchmaker namespace (for example 5v5_ranked / pve_coop).
  // Cold-start clients must restore the matching route header before any
  // Cancel/Confirm/GetProgress mutation.
  string game_mode = 13;
  // [proto] 本局副本编号(g_关卡.xlsx 关卡 id,uint32 配置表 ID,CLAUDE.md §9.12),
  // 透传自 matchmaker ResolvePlayerMatchContext(权威 ticket/match 记录)。
  // BATTLE route 及持有活跃撮合 claim 的 HUB route 时按权威填;0 = 未指定/默认,
  // 客户端保留 DS 握手后按地图包名反查关卡表的兜底路径。
  uint32 map_id = 14;
}

message GetResumeContextRequest {
  string session_token = 1;
}

message GetResumeContextResponse {
  pandora.common.v1.ErrCode code = 1;
  ResumeContext context = 2;
}

message LogoutRequest {
  string session_token = 1;
}

message LogoutResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== DS 票据 =====

// DSTicket 是 JWT 的 payload(不直接传输,这里 message 描述结构以便 cpp/go 共享)。
message DSTicket {
  uint64 player_id      = 1;
  uint64 match_id       = 2;  // battle DS 才有,hub 为 0
  int64  issued_at_ms   = 3;
  int64  expires_at_ms  = 4;
  string ds_type        = 5;  // "hub" | "battle"
  string jti            = 6;  // JWT ID,防重放
  // [proto] 全服扩容三层化(docs/design/scale-cellular-20m.md §3.3):DS 票据绑定玩家路由落点,
  // 防 stale/伪造票据跨单元串号(把 A 单元玩家接进 B 单元 DS)。单 Cell/dev 为 0。
  // Go 侧 JWT claim 已落地(pkg/auth DSTicketClaims.region_id/cell_id);待 Codex regen 后
  // cpp 共享结构同步。uint32 拓扑维度(非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 region_id      = 7;
  uint32 cell_id        = 8;
  // 9 reserved
  reserved 9;
  // [proto] 选角权威化(2026-07-08):玩家已选角色签进 hub 票据(与 region_id/cell_id 同一
  // 套路:权威数据以 JWT claim 下发,DS 本地验签即得,不可伪造)。0 = 票据未携带(旧票兼容 /
  // battle 票走 match roster)。DS 侧 ResolveRoleIdForPlayer 优先取此值 spawn。
  // uint32 配置表 ID(CfgRole.Id,非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 role_id        = 10;
  // Model B hub 票据绑定。六项必须全有或全无；enforce 下 Hub DS 只接受完整绑定且与当前
  // Redis 玩家归属、目标 DS active credential 精确一致的票据。battle/legacy 票据均为零值。
  string ds_pod_name          = 11;
  string ds_instance_uid      = 12;
  uint32 ds_protocol_epoch    = 13;
  uint64 ds_credential_gen    = 14;
  string ds_credential_jti    = 15;
  string hub_assignment_id    = 16;
  uint32 ds_writer_epoch      = 17;
  // DSTicket v2(RS256/B1)稳定绑定。编号只做 additive 扩展，旧副本会保留 unknown。
  uint32 dst_ver              = 18;
  uint32 ds_instance_epoch    = 19;
  string allocation_id       = 20;
  string release_track       = 21;
  // 版本化 placement lease；Hub strict admission 必须与当前 placement/assignment 精确相等。
  uint64 placement_version   = 22;
  string placement_operation_id = 23;
  uint64 source_match_id     = 24;
}

message IssueDSTicketRequest {
  string session_token = 1;
  string ds_type       = 2;  // "hub" | "battle"
  // battle:目标 match_id；hub:从 Battle 返回时必须传 source_match_id，服务端仍会
  // 与 durable placement + 签名 terminal/leave proof 精确核对，不能把本字段当权威。
  // 已稳定在 Hub 的普通重签可传 0。
  uint64 target_id     = 3;
}

message IssueDSTicketResponse {
  pandora.common.v1.ErrCode code = 1;
  string ticket = 2;  // JWT 编码后的字符串
  // ds_type=hub 时由 hub_allocator.AssignHub 返回的"当前有效"大厅 DS 地址。
  // 客户端结算返回大厅时必须用此地址(而非登录时缓存的旧地址),以应对 Hub DS 被 Agones
  // 重建/换端口/换分片。ds_type=battle 时为空(battle 地址来自 matchmaker / match 进度)。
  string hub_ds_addr = 3;
}

message VerifyDSTicketRequest {
  string ticket       = 1;
  string ds_pod_name  = 2;
  // admission_id 由 UE DS 为一次 PreLoginAsync 准入尝试生成并在有界重试中复用。
  // Redis authority 模式下必填；login 把它与已核验 caller active credential 一起绑定到
  // ticket jti，使 SETNX 响应丢失后同一准入可幂等确认，不同准入/凭据仍按 replay 拒绝。
  string admission_id = 3;
}

message VerifyDSTicketResponse {
  pandora.common.v1.ErrCode code = 1;
  DSTicket claims = 2;
}

// ===== 选角(2026-07-08)=====

message SelectRoleRequest {
  // role_id: 玩家选中的角色配置 ID(CfgRole.Id)。必须 >0 且在服务端白名单
  // (login 配置 allowed_role_ids;白名单为空 = fail-closed 拒绝,
  //  仅 dev_allow_any_role=true 时放宽为只校验非 0,严禁上生产)。
  // player_id 不在请求体,取自 JWT sub(服务端从 ctx 读,同 TransferToLineRequest 纪律)。
  uint32 role_id = 1;
}

message SelectRoleResponse {
  pandora.common.v1.ErrCode code = 1;
  // hub_ds_addr / hub_ticket: 选角确认后进大厅的"当前有效"地址 + 全新一次性票据
  // (票据 claim 含 role_id;经 hub_allocator.AssignHub,幂等自愈,同 IssueDSTicketResponse.hub_ds_addr 语义)。
  string hub_ds_addr = 2;
  string hub_ticket  = 3;
}
