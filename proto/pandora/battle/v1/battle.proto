// Pandora BattleResultService 协议。
//
// 职责(docs/design/go-services.md §2.13):
//   - 消费 pandora.battle.result topic,幂等落库(unique key = match_id)
//   - 提供战绩查询 RPC
//
// 关键不变量(CLAUDE.md §9.2):同一 match_id 只能落库一次。
// MMR 计算在这里(DS 不可信)。

syntax = "proto3";

package pandora.battle.v1;

import "pandora/common/v1/errcode.proto";

service BattleResultService {
  rpc ReportResult(ReportResultRequest) returns (ReportResultResponse);
  rpc GetMatchResult(GetMatchResultRequest) returns (GetMatchResultResponse);
  rpc ListPlayerHistory(ListPlayerHistoryRequest) returns (ListPlayerHistoryResponse);
}

message PlayerStats {
  uint64 player_id    = 1;
  uint32 hero_id      = 2;
  int32 team          = 3;  // 0 or 1
  int32 kills         = 4;
  int32 deaths        = 5;
  int32 assists       = 6;
  int64 damage_dealt  = 7;
  int64 damage_taken  = 8;
  int64 healing       = 9;
  int64 gold          = 10;
  int32 mmr_delta     = 11;  // 段位变化(后端算,DS 不可信)
  // 12-19 reserved
  reserved 12 to 19;
  // 本局该玩家获得、需持久化落库的装备实例配置 ID(DS 上报的战斗掉落,W5 ④)。
  // ⚠️ DS 不可信:后端按 drop 白名单(drop_whitelist)过滤后才幂等发放(GrantInstances),
  // DS 只能触发白名单内装备落库,不能凭空发放任意道具 / 货币。每个元素发一件独立实例(未鉴定)。
  repeated uint32 dropped_item_config_ids = 20;
}

message BattleResult {
  uint64 match_id     = 1;
  int64  started_at_ms = 2;
  int64  ended_at_ms   = 3;
  int32  winner_team  = 4;  // 0=A win, 1=B win, 2=draw
  repeated PlayerStats stats = 5;
  string ds_pod_name  = 6;
  string game_mode    = 7;
  uint32 map_id       = 8;
  // 9 reserved
  reserved 9;
  BattleOutcome outcome = 10;  // 结算类型(正常 / DS 崩溃补偿)
}

// BattleOutcome 区分正常结算与 DS 崩溃补偿(不变量 §4)。
//
// ABANDONED:DS 心跳超时,battle_result 写补偿记录,mmr_delta 全 0,玩家不掉段。
enum BattleOutcome {
  BATTLE_OUTCOME_UNSPECIFIED = 0;
  BATTLE_OUTCOME_NORMAL      = 1;  // 正常结算
  BATTLE_OUTCOME_ABANDONED   = 2;  // DS 崩溃补偿,mmr_delta 全 0
}

// DS 通过 kafka envelope 上报,但本 RPC 也提供同步上报用法(测试 / 兼容)
message ReportResultRequest {
  BattleResult result = 1;
}

message ReportResultResponse {
  pandora.common.v1.ErrCode code = 1;
  bool already_recorded = 2;  // true = 幂等命中,本次跳过
}

message GetMatchResultRequest {
  uint64 match_id = 1;
}

message GetMatchResultResponse {
  pandora.common.v1.ErrCode code = 1;
  BattleResult result = 2;
}

message ListPlayerHistoryRequest {
  uint64 player_id = 1;
  int32 limit     = 2;
  int64 before_ms = 3;  // 分页游标:返回 ended_at_ms < before_ms 的记录
}

message ListPlayerHistoryResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated BattleResult results = 2;
}
