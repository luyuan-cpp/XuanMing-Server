// Pandora BattleResultService 协议。
//
// 职责(docs/design/go-services.md §2.13):
//   - 消费 pandora.battle.result topic,幂等落库(unique key = match_id)
//   - 提供战绩查询 RPC
//
// 关键不变量(CLAUDE.md §9.2):同一 match_id 只能落库一次。
// MMR 计算在这里(DS 不可信)。

syntax = "proto3";

package pandora.battle.v1;

import "pandora/common/v1/errcode.proto";

service BattleResultService {
  rpc ReportResult(ReportResultRequest) returns (ReportResultResponse);
  rpc GetMatchResult(GetMatchResultRequest) returns (GetMatchResultResponse);
  rpc ListPlayerHistory(ListPlayerHistoryRequest) returns (ListPlayerHistoryResponse);

  // ReportProgress 战斗中实时进度事实上报(实时成长通道,docs/design/realtime-progression.md)。
  //
  // 鉴权同 ReportResult:DS callback Guard(battle 令牌绑 match_id)+ Redis active 校验,
  // 玩家必须在权威 roster 内。DS 侧必须异步 fire-and-forget + 本地有界缓冲重试,
  // **绝不阻塞 UE 主 tick**(ds-arch §0.5 ③ 五条约束)。
  //
  // 幂等 / 顺序契约:
  //   - 事件 seq 每场从 1 单调递增;单飞行批 + 批内升序 + 失败原批重发。
  //   - 服务端按 battle_progress_stream 水位去重:seq <= last_applied_seq 的事件跳过,
  //     水位推进与 progress 出箱写入同一 MySQL 事务(at-least-once 重放零副作用)。
  //   - 响应 acked_seq = 服务端已应用水位,DS 据此清本地缓冲。
  //   - 对局已结算(正常 / ABANDONED)后本 RPC 一律拒(ERR_INVALID_STATE),
  //     DS 收到不可重试错误应丢弃该批并告警,不得无限重试。
  //
  // DS 不可信:DS 只报事实(杀了什么怪 / 拾了什么白名单物品),经验换算与发放全在后端。
  rpc ReportProgress(ReportProgressRequest) returns (ReportProgressResponse);
}

message PlayerStats {
  uint64 player_id    = 1;
  uint32 hero_id      = 2;
  int32 team          = 3;  // 0 or 1
  int32 kills         = 4;
  int32 deaths        = 5;
  int32 assists       = 6;
  int64 damage_dealt  = 7;
  int64 damage_taken  = 8;
  int64 healing       = 9;
  int64 gold          = 10;
  int32 mmr_delta     = 11;  // 段位变化(后端算,DS 不可信)
  // 12-19 reserved
  reserved 12 to 19;
  // 本局该玩家获得、需持久化落库的装备实例配置 ID(DS 上报的战斗掉落,W5 ④)。
  // ⚠️ DS 不可信:后端按 drop 白名单(drop_whitelist)过滤后才幂等发放(GrantInstances),
  // DS 只能触发白名单内装备落库,不能凭空发放任意道具 / 货币。每个元素发一件独立实例(未鉴定)。
  repeated uint32 dropped_item_config_ids = 20;
}

message BattleResult {
  uint64 match_id     = 1;
  int64  started_at_ms = 2;
  int64  ended_at_ms   = 3;
  int32  winner_team  = 4;  // 0=A win, 1=B win, 2=draw
  repeated PlayerStats stats = 5;
  string ds_pod_name  = 6;
  string game_mode    = 7;
  uint32 map_id       = 8;
  // 9 reserved
  reserved 9;
  BattleOutcome outcome = 10;  // 结算类型(正常 / DS 崩溃补偿)
}

// BattleOutcome 区分正常结算与 DS 崩溃补偿(不变量 §4)。
//
// ABANDONED:DS 心跳超时,battle_result 写补偿记录,mmr_delta 全 0,玩家不掉段。
enum BattleOutcome {
  BATTLE_OUTCOME_UNSPECIFIED = 0;
  BATTLE_OUTCOME_NORMAL      = 1;  // 正常结算
  BATTLE_OUTCOME_ABANDONED   = 2;  // DS 崩溃补偿,mmr_delta 全 0
}

// DS 通过 kafka envelope 上报,但本 RPC 也提供同步上报用法(测试 / 兼容)
message ReportResultRequest {
  BattleResult result = 1;

  // final_progress_seq 是 DS 本场经实时进度通道上报的最后一个事件 seq(对账用)。
  // 0 = 本场未走实时通道(旧 DS / 通道关闭)。服务端与 battle_progress_stream 水位比对,
  // 有缺口只告警(尾窗丢失,realtime-progression.md §9),不自动补。
  uint64 final_progress_seq = 2;
}

message ReportResultResponse {
  pandora.common.v1.ErrCode code = 1;
  bool already_recorded = 2;  // true = 幂等命中,本次跳过
}

message GetMatchResultRequest {
  uint64 match_id = 1;
}

message GetMatchResultResponse {
  pandora.common.v1.ErrCode code = 1;
  BattleResult result = 2;
}

message ListPlayerHistoryRequest {
  uint64 player_id = 1;
  int32 limit     = 2;
  int64 before_ms = 3;  // 分页游标:返回 ended_at_ms < before_ms 的记录
}

message ListPlayerHistoryResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated BattleResult results = 2;
}

// ===== 战斗中实时进度事实上报(实时成长通道)=====

// MonsterKillFact 击杀怪物事实:DS 只报"杀了哪种怪、几只",经验换算在后端
// (battle_result 怪物经验表,DS 不可信)。count 有单事件上限(服务端配置,超限拒)。
message MonsterKillFact {
  uint32 monster_config_id = 1;  // 怪物配置 ID(§12)
  uint32 count             = 2;  // 本事件击杀数(>0,通常为 1;服务端按配置上限校验)
}

// ItemPickupFact 拾取物品事实:DS 只报"拾了哪个配置物品、几件"。
// 服务端按掉落白名单过滤(与结算路径同一 drop_whitelist),每件发一件未鉴定实例
// (语义与 ReportResult 的 dropped_item_config_ids 一致,但即时入账)。
message ItemPickupFact {
  uint32 item_config_id = 1;  // 物品配置 ID(§12)
  uint32 count          = 2;  // 本事件拾取件数(>0;服务端按配置上限校验)
}

// BattleProgressEvent 一条战斗中进度事实事件。
// seq 每场单调递增(从 1 起),是幂等键 (match_id, seq) 的组成部分。
message BattleProgressEvent {
  uint64 seq       = 1;
  uint64 player_id = 2;  // 受益玩家(必须在本场权威 roster 内)
  oneof fact {
    MonsterKillFact monster_kill = 3;
    ItemPickupFact  item_pickup  = 4;
  }
  int64 ts_ms = 5;  // DS 侧事件发生时间(审计;权威时间以服务端为准)
}

// ReportProgressRequest 一批进度事件(批内 seq 升序;单飞行批,失败原批重发)。
message ReportProgressRequest {
  uint64 match_id = 1;
  repeated BattleProgressEvent events = 2;  // 非空;单批条数有服务端上限(超限拒)
}

message ReportProgressResponse {
  pandora.common.v1.ErrCode code = 1;
  // acked_seq 服务端已应用水位(含本批)。DS 清掉 <= acked_seq 的本地缓冲。
  // 整批都是旧事件(重放)时返回当前水位,同样安全可清。
  uint64 acked_seq = 2;
}
