// Pandora HubAllocatorService 协议。
//
// 职责(docs/design/go-services.md §2.12):大厅 DS 分片调度
//
// Hub DS Fleet 常驻 N 个 pod,每个 200~500 人上限。
// 玩家进 hub 时按 region + 队友所在 hub + 最空 hub 选;跨分片走 Transfer。
//
// ⚠️ Heartbeat 单向 unary(架构决策 2026-06-03,同 DSAllocator):
//   go-zero zrpc 不支持 server stream,改为 Hub DS 每 5s 主动调用。
//   控制指令通过 response 字段下发,延迟 ≤ 5s 可接受。

syntax = "proto3";

package pandora.hub.v1;

import "pandora/common/v1/errcode.proto";

service HubAllocatorService {
  rpc AssignHub(AssignHubRequest) returns (AssignHubResponse);
  rpc ReleaseHub(ReleaseHubRequest) returns (ReleaseHubResponse);
  rpc TransferHub(TransferHubRequest) returns (TransferHubResponse);
  rpc ListHubs(ListHubsRequest) returns (ListHubsResponse);
   rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);  // Hub DS 每 5s 主动调
}

message AssignHubRequest {
  uint64 player_id = 1;
  string region    = 2;
  uint64 team_id   = 3;  // 可选,优先选队友所在 hub
}

message AssignHubResponse {
  pandora.common.v1.ErrCode code = 1;
  string hub_ds_addr = 2;
  string hub_ticket  = 3;  // JWT
  string hub_pod_name = 4;
  uint32 shard_id    = 5;
}

message ReleaseHubRequest {
  uint64 player_id = 1;
}

message ReleaseHubResponse {
  pandora.common.v1.ErrCode code = 1;
}

message TransferHubRequest {
  uint64 player_id     = 1;
  uint64 target_hub_id = 2;  // 玩家点的传送点目标
}

message TransferHubResponse {
  pandora.common.v1.ErrCode code = 1;
  string new_hub_ds_addr = 2;
  string new_hub_ticket  = 3;
}

// ===== List =====

message HubInfo {
  string hub_pod_name = 1;
  string hub_addr     = 2;
  string region       = 3;
  int32  player_count = 4;
  int32  capacity     = 5;
  string state        = 6;  // "ready" | "draining"
}

message ListHubsRequest {
  string region = 1;  // 空 = 全部
}

message ListHubsResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated HubInfo hubs = 2;
}

// ===== Heartbeat(单向 unary,Hub DS 每 5s 调一次)=====

 message HeartbeatRequest {
  string hub_pod_name = 1;
  int32  player_count = 2;
  float  cpu_pct      = 3;
  float  mem_mb       = 4;
  string state        = 5;  // "ready" | "draining" | "stopping"
  int64  ts_ms        = 6;
  // 7-9 reserved
  reserved 7 to 9;
}

 message HeartbeatResponse {
  pandora.common.v1.ErrCode code = 1;
  string command = 2;  // "" | "drain" | "stop" | "reload_config"
  // grace_seconds: command=="drain"/"stop" 时下发的优雅迁移倒计时(秒)。
  // Hub DS 收到后向在场玩家弹「N 秒后切换大厅」UMG 提示;倒计时到点强制切到新分片。
  // command=="" 时为 0。
  int32 grace_seconds = 3;
  // 4-9 reserved
  reserved 4 to 9;
}

// ===== 服务端存储快照(CLAUDE.md §5.8)=====

// HubShardStorageRecord 是 hub_allocator 在 Redis 中维护的大厅 DS 分片镜像
// (key `pandora:hub:shard:{<hub_pod_name>}` proto bytes,hashtag 锁 cluster slot)。
//
// 注意:服务端内部存储结构,不外发客户端;客户端可见的分片信息走 HubInfo。
// player_count 是 hub_allocator 维护的「已分配人数」(AssignHub 自增 / ReleaseHub 自减,
// 容量判定以此为准);Hub DS Heartbeat 上报的真实在线数也会回写此字段做对账
// (漂移窗口 ≤ 一个心跳周期,W4 ⑤ Mock 期无真实 DS 时仅由分配计数维护)。
message HubShardStorageRecord {
  string hub_pod_name      = 1;
  string hub_addr          = 2;
  string region            = 3;
  uint32 shard_id          = 4;   // 配置/拓扑分片号(uint32,不变量 §12)
  int32  player_count      = 5;   // 已分配人数(容量判定基准)
  int32  capacity          = 6;   // 分片人数上限(默认 500)
  string state             = 7;   // "ready" | "draining" | "stopping"
  int64  last_heartbeat_ms = 8;   // 最近一次 Hub DS Heartbeat 时刻(0=从未心跳,Mock 种子)
  int64  created_at_ms     = 9;
  // draining_since_ms: 强制整合时被标记 draining 的时刻(0=未在缩容排空中)。
  // 缩容回收要等 now-draining_since_ms ≥ grace 且 player_count==0 才删分片,避免提前杀 pod。
  int64  draining_since_ms = 10;
}

// HubAssignmentStorageRecord 是 hub_allocator 在 Redis 中维护的「玩家→分片」归属镜像
// (key `pandora:hub:player:<player_id>` proto bytes,落不变量 §1 玩家在线只在一个 hub DS)。
message HubAssignmentStorageRecord {
  uint64 player_id      = 1;
  string hub_pod_name   = 2;
  string hub_addr       = 3;
  uint32 shard_id       = 4;
  string region         = 5;
  uint64 team_id        = 6;   // 0=无队伍
  int64  assigned_at_ms = 7;
}

// ===== 服务间事件(Kafka 推送,客户端可见 payload)=====

// HubMigrateEvent 是强制整合(缩容排空)时 hub_allocator 通过 Kafka topic
// `pandora.hub.migrate`(kafka key=player_id,保序)推给单个玩家的迁移通知。
//
// 双通道之一(另一通道是 Hub DS Heartbeat 下发的 command="drain"+grace_seconds):
//   - 后端已完成服务端权威搬迁(归属改到 to_hub_pod_name,旧分片计数已减),
//     本事件把「新分片地址 + 新 hub 票据 + 倒计时」直接送到客户端,
//     客户端在 grace_seconds 内提示玩家,倒计时到点用 to_hub_ticket 重连 to_hub_ds_addr。
//
// 客户端可见结构(CLAUDE.md §5.14):只含客户端重连所需最小字段,不外泄存储快照。
message HubMigrateEvent {
  uint64 player_id       = 1;
  string from_hub_pod    = 2;   // 原分片 pod(展示/日志用)
  string to_hub_ds_addr  = 3;   // 新分片 DS 地址
  string to_hub_ticket   = 4;   // 新分片 hub DSTicket(JWT,5min)
  string to_hub_pod_name = 5;
  uint32 to_shard_id     = 6;
  int32  grace_seconds   = 7;   // 倒计时(秒),到点强制切换
  string reason          = 8;   // "consolidation" | "maintenance"
  int64  ts_ms           = 9;
}
