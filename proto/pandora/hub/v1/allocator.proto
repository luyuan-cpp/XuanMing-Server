// Pandora HubAllocatorService 协议。
//
// 职责(docs/design/go-services.md §2.12):大厅 DS 分片调度
//
// Hub DS Fleet 常驻 N 个 pod,每个 200~500 人上限。
// 玩家进 hub 时按 region + 队友所在 hub + 最空 hub 选;跨分片走 Transfer。
//
// ⚠️ Heartbeat 单向 unary(架构决策 2026-06-03,同 DSAllocator):
//   go-zero zrpc 不支持 server stream,改为 Hub DS 每 5s 主动调用。
//   控制指令通过 response 字段下发,延迟 ≤ 5s 可接受。

syntax = "proto3";

package pandora.hub.v1;

import "pandora/common/v1/errcode.proto";

service HubAllocatorService {
  rpc AssignHub(AssignHubRequest) returns (AssignHubResponse);
  rpc ReleaseHub(ReleaseHubRequest) returns (ReleaseHubResponse);
  rpc TransferHub(TransferHubRequest) returns (TransferHubResponse);
  rpc ListHubs(ListHubsRequest) returns (ListHubsResponse);
   rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);  // Hub DS 每 5s 主动调

  // ===== 玩家侧(经 Envoy :8443 客户端面,jwt_authn 注入 x-pandora-player-id)=====
  // 这两个方法 player_id 一律取自 JWT sub(服务端从 ctx 读),不信请求体,
  // 请求里不含 player_id。其余方法是后端内部/DS 调用,不经客户端面路由。

  // ListHubLines 列出玩家当前 region 可切换的大厅线路(客户端可见视图,隐藏 pod 名/内部地址)。
  rpc ListHubLines(ListHubLinesRequest) returns (ListHubLinesResponse);
  // TransferToLine 玩家主动切换到指定线路(换实例,AB 互不可见)。带护栏:
  // 冷却 / 战斗匹配中禁切 / 目标线路满则拒。
  rpc TransferToLine(TransferToLineRequest) returns (TransferToLineResponse);
}

message AssignHubRequest {
  uint64 player_id = 1;
  string region    = 2;
  uint64 team_id   = 3;  // 可选,优先选队友所在 hub
  // role_id: 玩家已选角色(选角权威化,2026-07-08)。login 从 player_roles 表读出后透传;
  // hub_allocator 把它盖进自己签的 hub DSTicket 的 role_id claim(票据单一签发权威),
  // 并存进归属镜像(HubAssignmentStorageRecord.role_id) 供 Transfer 重签时取用。
  // >0 时覆盖已存归属的 role_id(换角色重进);0 = 调用方不知角色,保留已存值。
  // uint32 配置表 ID(CfgRole.Id,非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 role_id   = 4;
}

message AssignHubResponse {
  pandora.common.v1.ErrCode code = 1;
  string hub_ds_addr = 2;
  string hub_ticket  = 3;  // JWT
  string hub_pod_name = 4;
  uint32 shard_id    = 5;
}

message ReleaseHubRequest {
  uint64 player_id = 1;
}

message ReleaseHubResponse {
  pandora.common.v1.ErrCode code = 1;
}

message TransferHubRequest {
  uint64 player_id     = 1;
  uint64 target_hub_id = 2;  // 玩家点的传送点目标
}

message TransferHubResponse {
  pandora.common.v1.ErrCode code = 1;
  string new_hub_ds_addr = 2;
  string new_hub_ticket  = 3;
}

// ===== 玩家侧线路视图(客户端可见结构,CLAUDE.md §5.14)=====

// HubLine 是客户端可见的大厅线路视图:只给玩家渲染线路列表 + 选择切换所需最小字段,
// 隐藏 pod 名 / 内部 DS 地址等服务端存储快照(不变量 §14)。
message HubLine {
  // line_no: 展示用线路号(1-based,同 region 内按 shard_id 升序稳定编号,即"1线/2线/3线")。
  uint32 line_no      = 1;
  // shard_id: 切换选择器(TransferToLineRequest.target_shard_id 回传此值);
  // 配置/拓扑分片号(uint32,不变量 §12),非 pod 名,可安全外发(HubMigrateEvent 已外发 to_shard_id)。
  uint32 shard_id     = 2;
  int32  player_count = 3;   // 当前人数(展示拥挤度)
  int32  capacity     = 4;   // 人数上限
  bool   is_full      = 5;   // 已满(不可切入)
  bool   is_current   = 6;   // 玩家当前所在线路
}

message ListHubLinesRequest {
  // region 留空 = 用玩家当前所在线路的 region(服务端权威,不信客户端跨区申报)。
  string region = 1;
}

message ListHubLinesResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated HubLine lines = 2;
}

message TransferToLineRequest {
  // target_shard_id: 从 ListHubLines 拿到的目标线路 shard_id(玩家点的"N 线")。
  // player_id 不在请求体,取自 JWT sub(服务端从 ctx 读)。
  uint32 target_shard_id = 1;
}

message TransferToLineResponse {
  pandora.common.v1.ErrCode code = 1;
  string new_hub_ds_addr = 2;   // 新线路 DS 地址(客户端 NetDriver 重连)
  string new_hub_ticket  = 3;   // 新线路 hub 票据(JWT,5min)
  uint32 new_shard_id    = 4;
  uint32 line_no         = 5;   // 新线路展示号
}

// ===== List =====

message HubInfo {
  string hub_pod_name = 1;
  string hub_addr     = 2;
  string region       = 3;
  int32  player_count = 4;
  int32  capacity     = 5;
  string state        = 6;  // "ready" | "draining"
}

message ListHubsRequest {
  string region = 1;  // 空 = 全部
}

message ListHubsResponse {
  pandora.common.v1.ErrCode code = 1;
  repeated HubInfo hubs = 2;
}

// ===== Heartbeat(单向 unary,Hub DS 每 5s 调一次)=====

 message HeartbeatRequest {
  string hub_pod_name = 1;
  int32  player_count = 2;
  float  cpu_pct      = 3;
  float  mem_mb       = 4;
  string state        = 5;  // "ready" | "draining" | "stopping"
  int64  ts_ms        = 6;
  // 7-9 reserved
  reserved 7 to 9;
  // player_ids: 当前连着本 Hub DS 的可信玩家 id(InitNewPlayer 落的映射)。
  // hub_allocator 转发给 player_locator 做 HUB 位置 TTL 续期(在线保活);
  // DS 崩溃/玩家拔线 → 停报 → locator 30s 自然过期 = 好友视角离线。
  repeated uint64 player_ids = 10;
}

message HeartbeatResponse {
  pandora.common.v1.ErrCode code = 1;
  string command = 2;  // "" | "drain" | "stop" | "reload_config"
  // grace_seconds: command=="drain"/"stop" 时下发的优雅迁移倒计时(秒)。
  // Hub DS 收到后向在场玩家弹「N 秒后切换大厅」UMG 提示;倒计时到点强制切到新分片。
  // command=="" 时为 0。
  int32 grace_seconds = 3;
  // 4-9 reserved
  reserved 4 to 9;
  // accepted_token_gen: Model B 令牌激活确认(additive)。Hub DS 用 pending 令牌的
  // 首个合法心跳完成 pending→active 原子激活后,服务端回显被激活/被确认为当前 active 的
  // 令牌代际(gen)。DS 侧据此判定「本令牌已被服务端接纳为权威」,可停止用旧令牌重试。
  // 仅 ds_auth.mode=enforce + agones 下非 0;其余模式恒 0(旧 DS 忽略,双向兼容)。
  uint64 accepted_token_gen = 10;
  // Model B 激活 ACK 必须回显完整凭据身份,DS 只有在四元组
  // (instance_uid, protocol_epoch, gen, jti) 与本地 staged 凭据全部一致时才切 active。
  // 只比较 gen 会在计数器回退/同代重签时误接纳另一份令牌。
  string accepted_token_jti = 11;
  string accepted_instance_uid = 12;
  uint32 accepted_protocol_epoch = 13;
  uint32 accepted_writer_epoch = 14;
}

// ===== 服务端存储快照(CLAUDE.md §5.8)=====

// HubShardStorageRecord 是 hub_allocator 在 Redis 中维护的大厅 DS 分片镜像
// (key `pandora:hub:shard:{<hub_pod_name>}` proto bytes,hashtag 锁 cluster slot)。
//
// 注意:服务端内部存储结构,不外发客户端;客户端可见的分片信息走 HubInfo。
// player_count 是 hub_allocator 维护的「已分配人数」(AssignHub 自增 / ReleaseHub 自减,
// 容量判定以此为准);Hub DS Heartbeat 上报的真实在线数也会回写此字段做对账
// (漂移窗口 ≤ 一个心跳周期,W4 ⑤ Mock 期无真实 DS 时仅由分配计数维护)。
message HubShardStorageRecord {
  string hub_pod_name      = 1;
  string hub_addr          = 2;
  string region            = 3;
  uint32 shard_id          = 4;   // 配置/拓扑分片号(uint32,不变量 §12)
  int32  player_count      = 5;   // 已分配人数(容量判定基准)
  int32  capacity          = 6;   // 分片人数上限(默认 500)
  string state             = 7;   // "ready" | "draining" | "stopping"
  int64  last_heartbeat_ms = 8;   // 最近一次 Hub DS Heartbeat 时刻(0=从未心跳,Mock 种子)
  int64  created_at_ms     = 9;
  // draining_since_ms: 强制整合时被标记 draining 的时刻(0=未在缩容排空中)。
  // 缩容回收要等 now-draining_since_ms ≥ grace 且 player_count==0 才删分片,避免提前杀 pod。
  int64  draining_since_ms = 10;
  // current_token_exp_ms: 当前下发给该 Hub DS 的回调令牌 exp(unix ms)。
  // 仅 ds_auth.mode=enforce + agones 心跳门控下由拓扑对账写入(其余模式恒 0 = 不启用),
  // 【已弃用作代际标识,保留仅为兼容/调试,不再参与代际比较】。
  // 历史用途:曾以 exp 秒级粒度充当令牌代际,但 JWT exp 为秒精度,同一秒内两次重签得到相同 exp,
  // 旧令牌会被误判为当前代际(审核 P1-6 碰撞)。改用 current_token_gen(field 12)单调代际,
  // exp 仅继续供拓扑续期判定(annotation 侧),不再当代际。上线后不复用编号(不变量 §5/17)。
  uint64 current_token_exp_ms = 11;
  // current_token_gen: 当前下发给该 Hub DS 的回调令牌「代际」(Redis INCR 权威、独立、单调)。
  // 仅 ds_auth.mode=enforce + agones 心跳门控下由拓扑对账写入(其余模式恒 0 = 不启用)。
  // 每次重签(PATCH 新 annotation)由 hub_allocator 经 Redis INCR 领取一个严格递增的 gen 并签进令牌;
  // 拓扑对账把新 gen 写入本字段并把分片复位 warming,心跳侧只有携带 gen 与本值**精确相等**的
  // 已验签令牌才能把分片翻回 ready(所有状态都校验,不止 warming),挡住迟到的旧令牌心跳
  // (审核 P1-6/P1-8:替代秒级 exp 代际,消除同秒重签碰撞)。additive 新增编号,双向兼容
  // (旧副本忽略、默认 0),不停服滚动更新安全(不变量 §17)。
  uint64 current_token_gen = 12;
  // ─── Model B 权威投影(additive,decision-revisit-ds-callback-auth §7)───
  // 分片镜像不再是令牌授权权威,授权权威落 HubShardAuthStorageRecord(key
  // `pandora:hub:auth:{pod}`)。以下字段是 promote(DS 首个 pending 心跳原子激活)成功后
  // 由授权记录投影到分片镜像的只读快照,供 AssignHub 终态门(active 元组一致性)快速判定,
  // 免每次分配再读授权记录。仅 enforce+agones 下非 0,双向兼容(旧副本忽略、默认 0/空)。
  //
  // last_verified_gen: 已被 promote 接纳为 active 的令牌代际(= 授权记录 active.gen)。
  uint64 last_verified_gen = 13;
  // last_verified_jti: 已被 promote 接纳为 active 的令牌 jti(与 gen 联合唯一标识凭据)。
  string last_verified_jti = 14;
  // gameserver_uid: 绑定的 Hub DS 实例身份(Agones GameServer metadata.uid);
  // 代际计数器可能因 TTL 复位导致 gen 复用,故凭据身份用 (instance_uid, protocol_epoch, gen, jti)
  // 四元组而非单一 gen。uid 变化 = 换了 DS 实例,授权记录必须复位重新走 bootstrap。
  string gameserver_uid = 15;
  // auth_epoch: 协议纪元(protocol_epoch),配合 uid 抵御计数器复位后的 gen 复用重放。
  uint32 auth_epoch = 16;
  uint32 last_verified_writer_epoch = 17;
  // release_track 来自 GameServer metadata 的实际发布轨(stable/canary)。分配与迁移
  // 必须始终留在同一轨；空值只代表滚动升级前的旧记录，业务层迁移为 stable。
  string release_track = 18;
}

// ===== Model B DS 回调授权状态机(decision-revisit-ds-callback-auth §7)=====

// HubAuthPhase 是单个 Hub DS 授权记录的相位。Redis 是唯一授权权威,K8s annotation 只负责
// 投递;DS 用 pending 令牌的首个合法心跳在 Redis 单 slot 事务里完成 pending→active 原子激活。
enum HubAuthPhase {
  HUB_AUTH_PHASE_UNSPECIFIED = 0;  // 未知/旧记录:回退当前(dormant)行为
  HUB_AUTH_PHASE_BOOTSTRAP   = 1;  // 授权记录已建、尚无 active 凭据(等首个 pending 心跳激活)
  HUB_AUTH_PHASE_ACTIVE      = 2;  // 已有 active 凭据(稳态)
  HUB_AUTH_PHASE_ROTATING    = 3;  // active + pending 并存(轮换在途,等新 pending 被激活)
  HUB_AUTH_PHASE_QUARANTINED = 4;  // uid 不符/疑似冒名:一律拒,等运维/重建
  HUB_AUTH_PHASE_TERMINATING = 5;  // DS 退役中:不再接纳新凭据
}

// HubDSCredential 是一份 DS 回调令牌的身份指纹(存授权记录内,不外发客户端)。
// 身份 = (instance_uid, protocol_epoch, gen, jti) 四元组:gen 单独不安全(计数器 TTL 复位
// 可致 gen 复用),必须联合 uid+epoch+jti 才能唯一锚定一份凭据。
message HubDSCredential {
  uint64 gen            = 1;  // Redis INCR 单调代际
  string jti           = 2;  // JWT jti(RegisteredClaims.ID),防重放
  uint64 exp_ms        = 3;  // 令牌过期(unix ms)
  string kid           = 4;  // 签发密钥指纹(key fingerprint),轮换期定位密钥
  string instance_uid  = 5;  // 绑定 DS 实例身份(Agones GameServer uid)
  uint32 protocol_epoch = 6; // 协议纪元,抗计数器复位重放
  string token_sha256  = 7;  // 令牌串 SHA256(hex),完整性绑定(可选,空=不校验)
  // writer_epoch:二进制授权协议能力纪元，与 protocol_epoch(实例轮次)语义严格分离。
  uint32 writer_epoch  = 8;
}

// HubShardAuthStorageRecord 是 Model B 的**唯一授权权威**(key `pandora:hub:auth:{pod}`
// proto bytes,与分片镜像 / 代际计数器同 {pod} hashtag 保证同 slot 可事务)。
// 服务端内部存储快照,绝不外发客户端。read-modify-write 路径禁止 DiscardUnknown(不变量 §17)。
message HubShardAuthStorageRecord {
  string pod_name        = 1;
  string instance_uid    = 2;  // 当前绑定的 Hub DS 实例身份(Agones GameServer uid)
  uint32 protocol_epoch  = 3;  // 协议纪元
  HubAuthPhase phase     = 4;
  // active: 当前生效(权威)凭据。AssignHub / 心跳鉴权以此为准。空 = 尚无 active(bootstrap)。
  HubDSCredential active  = 5;
  // pending: 已 stage、等 DS 首个合法心跳激活的凭据。空 = 无在途轮换。
  HubDSCredential pending = 6;
  // high_water_gen: 见过的最大 gen(单调上界)。即便代际计数器因 TTL 复位回退,stage 也必须
  // 满足 pending.gen > high_water_gen,彻底杜绝 gen 复用/回退重放。
  uint64 high_water_gen  = 7;
  // pending_started_ms: pending 被 stage 的时刻(激活栅栏/超时告警用)。
  int64  pending_started_ms = 8;
  // delivered_rv: pending 令牌被 PATCH 投递到 K8s annotation 时的 GameServer resourceVersion,
  // 供投递侧条件 PATCH(uid+rv CAS)判定投递是否仍针对同一实例同一代。
  string delivered_rv    = 9;
  int64  updated_at_ms   = 10;
  // last_active_heartbeat_ms:仅由 Model B ActivateHeartbeat 在验证 active/pending 凭据后，
  // 与 pending->active、分片投影同一 Redis 事务写入的服务端接收时间。最终分配门以本字段
  // 判断心跳新鲜度，不再信任请求 ts_ms，也不信任旧 writer 可修改的 shard.last_heartbeat_ms。
  // 因而 activation 后旧副本即使仍写 legacy shard 镜像，也只能造成不可用，不能伪造新鲜心跳。
  int64 last_active_heartbeat_ms = 11;
  // required_writer_epoch:单个 DS 的机械激活栅栏。>0 后任何低于该纪元的凭据/legacy writer
  // 均在 Redis 记录读取时直接拒绝；只允许 Activation Job 单调推进，永不回退。
  uint32 required_writer_epoch = 12;
}

// HubAssignmentStorageRecord 是 hub_allocator 在 Redis 中维护的「玩家→分片」归属镜像
// (key `pandora:hub:player:<player_id>` proto bytes,落不变量 §1 玩家在线只在一个 hub DS)。
message HubAssignmentStorageRecord {
  uint64 player_id      = 1;
  string hub_pod_name   = 2;
  string hub_addr       = 3;
  uint32 shard_id       = 4;
  string region         = 5;
  uint64 team_id        = 6;   // 0=无队伍
  int64  assigned_at_ms = 7;
  // role_id: 玩家已选角色(AssignHubRequest.role_id 落库镜像,选角权威化 2026-07-08)。
  // Transfer/TransferToLine/强制整合重签 hub 票据时从这里取 role_id 盖进新票
  // (这些路径 login 不在环上,必须有本地镜像)。0 = 未选角/旧记录。
  uint32 role_id        = 8;
  // ─── Model B 授权快照绑定(additive,§7)───
  // 归属建立时把当时该分片的 active 授权身份钉进归属记录,供后续对账/审计判定
  // 「该玩家是被哪个 DS 实例哪一代授权时分配上来的」。仅 enforce+agones 下非 0,双向兼容。
  string hub_instance_uid = 9;  // 分配时分片绑定的 Hub DS 实例身份(uid)
  uint32 auth_epoch       = 10; // 分配时的协议纪元
  uint64 auth_gen         = 11; // 分配时分片 active 令牌代际
  string auth_jti         = 12; // 分配时分片 active 令牌 jti；与 uid/epoch/gen 联合唯一
  // assignment_id:每次归属所有权切换生成的新 UUID。玩家单键 CAS 的版本标识，同时盖进
  // hub DSTicket；Transfer/Release/同名 Pod 重建后旧票据因 assignment_id 不再匹配而失效。
  string assignment_id    = 13;
  uint32 auth_writer_epoch = 14; // 分配时 active 凭据的 writer epoch
  // 玩家首次分配时持久化实际命中的发布轨；后续重登/切线/整合保持粘性。
  string release_track = 15;
}

// ===== 服务间事件(Kafka 推送,客户端可见 payload)=====

// HubMigrateEvent 是强制整合(缩容排空)时 hub_allocator 通过 Kafka topic
// `pandora.hub.migrate`(kafka key=player_id,保序)推给单个玩家的迁移通知。
//
// 双通道之一(另一通道是 Hub DS Heartbeat 下发的 command="drain"+grace_seconds):
//   - 后端已完成服务端权威搬迁(归属改到 to_hub_pod_name,旧分片计数已减),
//     本事件把「新分片地址 + 新 hub 票据 + 倒计时」直接送到客户端,
//     客户端在 grace_seconds 内提示玩家,倒计时到点用 to_hub_ticket 重连 to_hub_ds_addr。
//
// 客户端可见结构(CLAUDE.md §5.14):只含客户端重连所需最小字段,不外泄存储快照。
message HubMigrateEvent {
  uint64 player_id       = 1;
  string from_hub_pod    = 2;   // 原分片 pod(展示/日志用)
  string to_hub_ds_addr  = 3;   // 新分片 DS 地址
  string to_hub_ticket   = 4;   // 新分片 hub DSTicket(JWT,5min)
  string to_hub_pod_name = 5;
  uint32 to_shard_id     = 6;
  int32  grace_seconds   = 7;   // 倒计时(秒),到点强制切换
  string reason          = 8;   // "consolidation" | "maintenance"
  int64  ts_ms           = 9;
}
