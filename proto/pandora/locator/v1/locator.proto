// Pandora PlayerLocator 协议。
//
// 职责(docs/design/go-services.md §2.6):
//   玩家当前在哪(hub_id / battle_id),
//   保证不变量"玩家同一时刻只能在一个 Location"(CLAUDE.md §9.1)

syntax = "proto3";

package pandora.locator.v1;

import "pandora/common/v1/errcode.proto";

service PlayerLocatorService {
  rpc SetLocation(SetLocationRequest) returns (SetLocationResponse);
  rpc GetLocation(GetLocationRequest) returns (GetLocationResponse);
  // BatchGetLocation 一次查多个玩家的位置(好友列表在线态批量拉,
  // 见 docs/design/friend-distributed-scaling.md §13.3 BatchGetPresence)。
  // 服务端用 Redis pipeline 一次往返,替代调用方逐个 GetLocation 的 N 次扇出。
  rpc BatchGetLocation(BatchGetLocationRequest) returns (BatchGetLocationResponse);
  // SubscribePresence / UnsubscribePresence 是好友在线态「订阅推送」入口
  // (docs/design/friend-distributed-scaling.md §13.4)。
  //   - 客户端打开好友面板 → SubscribePresence(自己 + 关注的好友 id 列表)
  //   - 关闭面板 → UnsubscribePresence
  // 好友上线/下线变更只推给「此刻正订阅(盯着这一行看)的人」,扇出从 N 降到个位数;
  // 服务端再叠加去抖(吸收抖动)+ 合并(攒批)+ 粗粒度降采样 + killswitch 洪峰降级。
  rpc SubscribePresence(SubscribePresenceRequest) returns (SubscribePresenceResponse);
  rpc UnsubscribePresence(UnsubscribePresenceRequest) returns (UnsubscribePresenceResponse);
  rpc ClearLocation(ClearLocationRequest) returns (ClearLocationResponse);
  // RefreshHubLocations 批量续期一批玩家的 HUB 位置 TTL(在线保活)。
  // 调用方:hub_allocator 收到 Hub DS Heartbeat(捎带在场 player_ids)后转发。
  // 服务端逐个校验「state==HUB 且 hub_pod 匹配」才 EXPIRE 续期;
  // MATCHING/BATTLE/其它 pod 的记录一律不动(不变量 §1,战斗态由战斗链路权威维护)。
  // 玩家掉线/拔线 → Hub DS 不再上报该 id → locator key 30s 自然过期 = OFFLINE。
  rpc RefreshHubLocations(RefreshHubLocationsRequest) returns (RefreshHubLocationsResponse);
  // ReportDisconnect 快速断线上报:Hub DS 在玩家 Logout / 连接超时断开时调用,
  // 把该玩家 HUB 位置的 TTL 缩短到 grace(~10s)——真退出的玩家 10s 内判离线,
  // 不用等满 30s 心跳 TTL。守卫:只缩「state==HUB 且 hub_pod 匹配」的记录;
  // MATCHING/BATTLE 不动(玩家 travel 去战斗也触发 Hub Logout,靠此守卫 + grace 免疫误判);
  // 只缩不涨(记录剩余 TTL 已小于 grace 时不动)。绝不立即置 OFFLINE:
  // grace 窗口内玩家重连 → PostLogin SetLocationHub 重写记录,状态自愈。
  rpc ReportDisconnect(ReportDisconnectRequest) returns (ReportDisconnectResponse);

  // GetPlacement 读取不随 presence TTL 消失的玩家 DS 权威归属。记录缺失返回
  // found=false（UNKNOWN），调用方不得把它解释成“已不在 Battle”。
  rpc GetPlacement(GetPlacementRequest) returns (GetPlacementResponse);
  // BeginPlacementTransition 以玩家 placement 单键为线性化点开始一次切换。
  // 当前只开放 BATTLE->HUB，且必须携带显式 terminal/leave proof。
  rpc BeginPlacementTransition(BeginPlacementTransitionRequest) returns (BeginPlacementTransitionResponse);
  // BindPlacementTarget 把 allocator 选出的唯一 DS/assignment 绑定到同一 version+operation。
  rpc BindPlacementTarget(BindPlacementTargetRequest) returns (BindPlacementTargetResponse);
  // RetargetPlacementTarget 只能在 Admission 前、旧 target 的权威不可用证明通过时，
  // 原子推进 version/operation 并把完整 old target 换为完整 new target。TTL 本身不是证明。
  rpc RetargetPlacementTarget(RetargetPlacementTargetRequest) returns (RetargetPlacementTargetResponse);
  // ConfirmPlacementSourceDeparture 把 source DS 的物理离场证明绑定到当前 exact PENDING
  // version/op/source。只有该确认完成，非 bootstrap Admission 才能提交。
  rpc ConfirmPlacementSourceDeparture(ConfirmPlacementSourceDepartureRequest) returns (ConfirmPlacementSourceDepartureResponse);
  // CommitPlacementAdmission 是 DS Admission 打开 spawn gate 前的最终 CAS。
  rpc CommitPlacementAdmission(CommitPlacementAdmissionRequest) returns (CommitPlacementAdmissionResponse);
  // BootstrapPlacement 只在权威账号创建证明通过时创建首条 HUB_PENDING；missing 本身
  // 永远不是 bootstrap 证明，已有记录则只能同 operation 幂等重放。
  rpc BootstrapPlacement(BootstrapPlacementRequest) returns (BootstrapPlacementResponse);
}

enum LocationState {
  LOCATION_STATE_UNSPECIFIED   = 0;
  LOCATION_STATE_OFFLINE       = 1;
  LOCATION_STATE_LOGIN_PENDING = 2;
  LOCATION_STATE_HUB           = 3;
  LOCATION_STATE_MATCHING      = 4;
  LOCATION_STATE_BATTLE        = 5;
}

message Location {
  LocationState state = 1;

  // 各 state 的附加字段(仅相关 state 时填):
  string hub_pod      = 2;  // HUB 时
  uint32 shard_id     = 3;  // HUB 时
  uint64 match_id     = 4;  // MATCHING / BATTLE 时
  string battle_pod   = 5;  // BATTLE 时
  int64  updated_at_ms = 6;
  // 7-9 reserved
  reserved 7 to 9;
}

message SetLocationRequest {
  uint64   player_id = 1;
  Location location  = 2;
}

message SetLocationResponse {
  pandora.common.v1.ErrCode code = 1;
}

message GetLocationRequest {
  uint64 player_id = 1;
}

message GetLocationResponse {
  pandora.common.v1.ErrCode code = 1;
  Location location = 2;
}

message BatchGetLocationRequest {
  repeated uint64 player_ids = 1;
}

message BatchGetLocationResponse {
  pandora.common.v1.ErrCode code = 1;
  // locations 只含查到的玩家;未在线 / key 已过期的 player_id 不出现在 map 里,
  // 等价 OFFLINE(调用方按缺席判离线,避免给每个请求 id 都回填占位)。
  map<uint64, Location> locations = 2;
}

message ClearLocationRequest {
  uint64 player_id = 1;
}

message ClearLocationResponse {
  pandora.common.v1.ErrCode code = 1;
}

message RefreshHubLocationsRequest {
  // hub_pod: 上报心跳的 Hub DS pod 名;只有 locator 记录里 hub_pod 一致才续期,
  // 防止跨分片迁移后旧 pod 的迟到心跳给新分片记录乱续。
  string hub_pod = 1;
  repeated uint64 player_ids = 2;
}

message RefreshHubLocationsResponse {
  pandora.common.v1.ErrCode code = 1;
  // refreshed: 实际续期成功的玩家数(state==HUB 且 hub_pod 匹配的条数);仅观测用。
  int32 refreshed = 2;
}

message ReportDisconnectRequest {
  // hub_pod: 上报断线的 Hub DS pod 名;只有 locator 记录里 hub_pod 一致才缩 TTL,
  // 防跨分片切线后旧 pod 的迟到断线报文误缩新分片记录。
  string hub_pod   = 1;
  uint64 player_id = 2;
}

message ReportDisconnectResponse {
  pandora.common.v1.ErrCode code = 1;
  // shrunk: 是否实际缩短了 TTL(false = 记录不存在 / 非 HUB 态 / pod 不匹配 /
  // 剩余 TTL 已更短,均属正常路径);仅观测用。
  bool shrunk = 2;
}

// PlacementRoute 是持久 placement 的逻辑路由；UNKNOWN 不是 HUB。
enum PlacementRoute {
  PLACEMENT_ROUTE_UNSPECIFIED = 0;
  PLACEMENT_ROUTE_HUB = 1;
  PLACEMENT_ROUTE_BATTLE = 2;
}

// PlacementTransitionState 区分已经提交的唯一归属与尚未 Admission 的切换。
enum PlacementTransitionState {
  PLACEMENT_TRANSITION_STATE_UNSPECIFIED = 0;
  PLACEMENT_TRANSITION_STATE_STABLE = 1;
  PLACEMENT_TRANSITION_STATE_PENDING = 2;
}

// PlacementProofType 是离开 Battle 的显式、可审计证明类型。
enum PlacementProofType {
  PLACEMENT_PROOF_TYPE_UNSPECIFIED = 0;
  PLACEMENT_PROOF_TYPE_MATCH_TERMINAL = 1;
  PLACEMENT_PROOF_TYPE_PLAYER_LEAVE = 2;
  PLACEMENT_PROOF_TYPE_ACCOUNT_BOOTSTRAP = 3;
  PLACEMENT_PROOF_TYPE_MATCH_START = 4;
  PLACEMENT_PROOF_TYPE_HUB_TRANSFER = 5;
}

enum PlacementTargetUnavailableReason {
  PLACEMENT_TARGET_UNAVAILABLE_REASON_UNSPECIFIED = 0;
  PLACEMENT_TARGET_UNAVAILABLE_REASON_INSTANCE_TERMINATED = 1;
  PLACEMENT_TARGET_UNAVAILABLE_REASON_RESERVATION_EXPIRED_UNUSED = 2;
  PLACEMENT_TARGET_UNAVAILABLE_REASON_ALLOCATION_REVOKED = 3;
}

// PlacementSourceDepartureProofType 与逻辑 transition proof 完全分域。
// 数值 101+ 也避免在共享 keyring 中与 PlacementProofType 发生类型碰撞。
enum PlacementSourceDepartureProofType {
  PLACEMENT_SOURCE_DEPARTURE_PROOF_TYPE_UNSPECIFIED = 0;
  PLACEMENT_SOURCE_DEPARTURE_PROOF_TYPE_HUB_DEPARTURE = 101;
  PLACEMENT_SOURCE_DEPARTURE_PROOF_TYPE_BATTLE_DEPARTURE = 102;
}

// PlayerPlacementStorageRecord 持久化在 Redis
// `pandora:placement:{<player_id>}` protobuf value 中，无 Redis TTL。
// read-modify-write 必须保留 unknown fields，version 只能通过 CAS 单调推进。
message PlayerPlacementStorageRecord {
  uint64 player_id = 1;
  PlacementRoute current_route = 2;
  PlacementRoute target_route = 3;
  PlacementTransitionState transition_state = 4;
  uint64 version = 5;
  string operation_id = 6;
  uint64 match_id = 7;
  uint64 source_match_id = 8;
  string ds_pod_name = 9;
  string ds_instance_uid = 10;
  string hub_assignment_id = 11;
  int64 updated_at_ms = 12;
  int64 lease_deadline_ms = 13;
  PlacementProofType proof_type = 14;
  string proof_id = 15;
  string admission_id = 16;
  uint64 target_match_id = 17;
  uint32 ds_instance_epoch = 18;
  string allocation_id = 19;
  string release_track = 20;
  uint32 retarget_count = 21;
  string last_retarget_proof_id = 22;
  PlacementTargetUnavailableReason last_retarget_reason = 23;
  // Exact physical source captured atomically by Begin before target fields
  // are cleared.  Departure coordinators bind both this immutable source and
  // the new PENDING version/op; old tickets are fenced before eviction waits.
  uint64 source_placement_version = 24;
  string source_operation_id = 25;
  string source_ds_pod_name = 26;
  string source_ds_instance_uid = 27;
  uint32 source_ds_instance_epoch = 28;
  string source_hub_assignment_id = 29;
  string source_allocation_id = 30;
  string source_release_track = 31;
  // Active confirmation is valid only for this record's current PENDING
  // version/operation and immutable source tuple. Begin/Retarget clear it.
  bool source_departure_confirmed = 32;
  PlacementSourceDepartureProofType source_departure_proof_type = 33;
  string source_departure_proof_id = 34;
  // Commit moves the active proof into audit-only fields before clearing the
  // source. A later transition must never treat these last_* fields as a gate.
  PlacementSourceDepartureProofType last_source_departure_proof_type = 35;
  string last_source_departure_proof_id = 36;
  uint64 last_source_departure_placement_version = 37;
  string last_source_departure_operation_id = 38;
}

message GetPlacementRequest {
  uint64 player_id = 1;
}

message GetPlacementResponse {
  pandora.common.v1.ErrCode code = 1;
  bool found = 2;
  PlayerPlacementStorageRecord placement = 3;
}

message BeginPlacementTransitionRequest {
  uint64 player_id = 1;
  uint64 expected_version = 2;
  PlacementRoute target_route = 3;
  string operation_id = 4;
  uint64 source_match_id = 5;
  PlacementProofType proof_type = 6;
  string proof_id = 7;
  int64 lease_deadline_ms = 8;
  uint64 target_match_id = 9;
  string proof_signature = 10;
}

message BeginPlacementTransitionResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerPlacementStorageRecord placement = 2;
}

message BindPlacementTargetRequest {
  uint64 player_id = 1;
  uint64 placement_version = 2;
  string operation_id = 3;
  PlacementRoute target_route = 4;
  string ds_pod_name = 5;
  string ds_instance_uid = 6;
  string hub_assignment_id = 7;
  uint64 target_match_id = 8;
  uint32 ds_instance_epoch = 9;
  string allocation_id = 10;
  string release_track = 11;
  // Exact target owner may monotonically renew a still-PENDING lease.  This is
  // never authority to change version/op/route/target; stale allocators lose
  // that full-tuple comparison before the deadline can be updated.
  int64 lease_deadline_ms = 12;
}

message BindPlacementTargetResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerPlacementStorageRecord placement = 2;
}

message PlacementTargetIdentity {
  string ds_pod_name = 1;
  string ds_instance_uid = 2;
  string hub_assignment_id = 3;
  uint32 ds_instance_epoch = 4;
  string allocation_id = 5;
  string release_track = 6;
}

message RetargetPlacementTargetRequest {
  uint64 player_id = 1;
  uint64 placement_version = 2;
  string operation_id = 3;
  PlacementRoute target_route = 4;
  uint64 target_match_id = 5;
  PlacementTargetIdentity expected_target = 6;
  uint64 replacement_version = 7;
  string replacement_operation_id = 8;
  PlacementTargetIdentity replacement_target = 9;
  PlacementProofType proof_type = 10;
  PlacementTargetUnavailableReason reason = 11;
  string proof_id = 12;
  string proof_signature = 13;
  int64 lease_deadline_ms = 14;
}

message RetargetPlacementTargetResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerPlacementStorageRecord placement = 2;
}

message ConfirmPlacementSourceDepartureRequest {
  uint64 player_id = 1;
  uint64 placement_version = 2;
  string operation_id = 3;
  PlacementRoute target_route = 4;
  uint64 target_match_id = 5;
  uint64 source_placement_version = 6;
  string source_operation_id = 7;
  PlacementRoute source_route = 8;
  uint64 source_match_id = 9;
  PlacementTargetIdentity source_target = 10;
  PlacementSourceDepartureProofType proof_type = 11;
  string proof_id = 12;
  string proof_signature = 13;
}

message ConfirmPlacementSourceDepartureResponse {
  pandora.common.v1.ErrCode code = 1;
  bool confirmed = 2;
  PlayerPlacementStorageRecord placement = 3;
}

message CommitPlacementAdmissionRequest {
  uint64 player_id = 1;
  uint64 placement_version = 2;
  string operation_id = 3;
  PlacementRoute target_route = 4;
  string ds_pod_name = 5;
  string ds_instance_uid = 6;
  string hub_assignment_id = 7;
  string admission_id = 8;
  uint64 target_match_id = 9;
  uint32 ds_instance_epoch = 10;
  string allocation_id = 11;
  string release_track = 12;
}

message CommitPlacementAdmissionResponse {
  pandora.common.v1.ErrCode code = 1;
  bool committed = 2;
  PlayerPlacementStorageRecord placement = 3;
}

message BootstrapPlacementRequest {
  uint64 player_id = 1;
  string operation_id = 2;
  string proof_id = 3;
  string proof_signature = 4;
  int64 lease_deadline_ms = 5;
}

message BootstrapPlacementResponse {
  pandora.common.v1.ErrCode code = 1;
  PlayerPlacementStorageRecord placement = 2;
}

// PresenceStatus 是好友在线态的「粗粒度降采样」状态(§13.4.4)。
// 只同步在线/离线/游戏中三档,不外露 hub_pod / shard_id / match_id 等高频细节;
// 细节由客户端点进详情再单独拉(BatchGetLocation)。
enum PresenceStatus {
  PRESENCE_STATUS_UNSPECIFIED = 0;
  PRESENCE_STATUS_OFFLINE     = 1;  // 不在线
  PRESENCE_STATUS_ONLINE      = 2;  // 在线(大厅 / 登录确认期)
  PRESENCE_STATUS_IN_GAME     = 3;  // 游戏中(撮合 / 战斗)
}

// SubscribePresenceRequest 订阅一批好友的在线态变更。
// 每次打开 / 刷新好友面板都发全量 watched_player_ids,服务端按「替换」语义覆盖旧订阅。
message SubscribePresenceRequest {
  uint64 subscriber_id = 1;            // 订阅者(看面板的玩家)本人
  repeated uint64 watched_player_ids = 2;  // 关注的好友 id 列表
}

message SubscribePresenceResponse {
  pandora.common.v1.ErrCode code = 1;
}

// UnsubscribePresenceRequest 关闭面板时退订该订阅者的全部关注。
message UnsubscribePresenceRequest {
  uint64 subscriber_id = 1;
}

message UnsubscribePresenceResponse {
  pandora.common.v1.ErrCode code = 1;
}

// PresenceChange 是单个好友的一条粗粒度在线态变更。
message PresenceChange {
  uint64 player_id = 1;
  PresenceStatus status = 2;
  int64 ts_ms = 3;
}

// PresenceBatchEvent 是推给订阅者的「合并后」事件:1s 窗口内多个好友的变更攒一条
// (§13.4.3)。作为 push topic pandora.presence.update 的 payload(key=subscriber_id)。
message PresenceBatchEvent {
  repeated PresenceChange changes = 1;
}
