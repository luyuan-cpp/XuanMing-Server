# Pandora Proto C++ 生成配置(UE 仓库 Pandora-Client 使用)
#
# 用法:
#   cd proto && buf generate --template buf.gen.cpp.yaml
#
# 产物路径:proto/gen/cpp/**/*.pb.{h,cc}(只生成消息 pb,不生成 *.grpc.pb.*)
#
# 决策(2026-06-09,见 docs/design/decision-revisit-ue-proto-codec.md):
#   - UE 客户端/DS 使用生成的 protobuf pb 编解码,废弃手写 wire codec。
#   - 只链 libprotobuf(v35.0,源码随 UBT 构建),不链 grpc-cpp。
#   - gencode 版本必须与 UE ThirdParty protobuf 运行时版本一致。
#
# 生成后把 proto/gen/cpp/ 内容同步到 UE 工程的 Source/Pandora/Generated/Proto/(PandoraProto module)。

version: v2

# proto2mysql 的 option 定义仅供后端建表使用,与 UE 客户端无关。
# 但 data_service.proto `import "proto2mysql/proto2mysql_option.proto"`,C++ 代码生成会在
# data_service.pb.h 里发出 `#include "proto2mysql/proto2mysql_option.pb.h"`——若把 proto2mysql
# 排除在生成之外,该头文件缺失会导致 UE 编译直接失败。因此必须一并生成 proto2mysql option 头
# (只是扩展定义,UE 侧无害),不能 exclude_paths。
inputs:
  - directory: .

plugins:
  - remote: buf.build/protocolbuffers/cpp:v35.0
    out: gen/cpp
