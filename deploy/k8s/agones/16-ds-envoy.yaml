# in-cluster Envoy「DS 面」网关(线上同款拓扑,本地 minikube 用)
#
# 背景:DS(UE Linux Pod)用 grpc-web(FHttpModule)回连后端,必须经 Envoy 做
# grpc-web→gRPC 转换,不能直连裸 gRPC 端口。线上真集群自带边缘 Envoy
# (pandora-envoy.pandora.svc:8444);本地 minikube 没有边缘 Envoy,且 Pod 解析不了
# host.docker.internal(那是 docker-desktop 内置 k8s 专属域名),导致 DS 心跳 DNS 失败
# → ds_allocator ready 等待超时 5002 → matchmaker 置 failed → 客户端 GetMatchProgress 4001。
#
# 本文件在集群内起一个等价的 Envoy「DS 面」网关:
#   DS(Pod) → pandora-envoy.pandora.svc.cluster.local:8444(标准 k8s Service DNS,必然可解析)
#           → 本 Envoy(grpc-web→gRPC) → ds-allocator.pandora.svc:50020 等集群内后端
# Fleet(20-fleet-battle / 30-fleet-hub)的 PANDORA_*_ADDR 与线上一字不差,切真集群时
# 删掉本文件即可(线上用边缘网关自带的 pandora-envoy Service)。
#
# 上游是原生 gRPC(h2c),每个 cluster 必须带 http2_protocol_options,否则 Envoy 用
# HTTP/1.1 调后端会 gRPC 415。DS 走明文 http://(PANDORA_DS_ALLOCATOR_TLS=0),
# 故 :8444 监听器不挂 TLS。
apiVersion: v1
kind: ConfigMap
metadata:
  name: pandora-ds-envoy-config
  namespace: pandora
  labels:
    app.kubernetes.io/name: pandora-envoy
data:
  envoy.yaml: |
    # ⚠️ admin 只绑 Pod 内回环(2026-07-10 收紧,回应审核 P1:admin 未鉴权,可 config_dump 泄露
    # 配置 / POST 改运行时把网关打挂;绑 0.0.0.0 时 allow-app-mesh 的宽泛选择器会放行同命名空间
    # 业务 Pod 直连 admin)。kubelet 探活走下面独立的 :9902 只读健康监听器(仅转发 /ready 到 admin)。
    # 调试需要 admin 时，用临时 debug container 进入同 Pod 网络命名空间访问 127.0.0.1:9901；
    # 官方 Envoy 镜像不含 wget/curl，勿在主容器里直接调用这些命令。
    admin:
      address:
        socket_address: { address: 127.0.0.1, port_value: 9901 }
    static_resources:
      listeners:
      # 只读健康监听器:kubelet readinessProbe 打 :9902/ready,经本监听器转发到回环 admin 的
      # /ready;除 /ready 外一律 404,不暴露 config_dump / stats / POST 管理面。
      - name: pandora_admin_health_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: 9902 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: pandora_admin_health_hcm
              codec_type: AUTO
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: pandora_admin_health_routes
                virtual_hosts:
                - name: pandora_admin_health_vh
                  domains: [ "*" ]
                  routes:
                  - match: { path: "/ready" }
                    route: { cluster: local_admin_cluster, timeout: 2s }
      - name: pandora_ds_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: 8444 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: pandora_ds_hcm
              codec_type: AUTO
              stream_idle_timeout: 0s
              request_timeout: 0s
              common_http_protocol_options: { idle_timeout: 0s }
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
              http_filters:
              - name: envoy.filters.http.grpc_web
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
              - name: envoy.filters.http.header_mutation
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                  mutations:
                    request_mutations:
                    - remove: "x-pandora-player-id"
                    - remove: "x-pandora-jwt-payload"
                    # 入站先剥离网关标记头(防外部伪造),再由下方 vh 统一盖回 "1":
                    # 后端 DSCallbackGuard 凭此头区分「DS 面流量(须验令牌)」与「内部东西向直连」。
                    - remove: "x-pandora-ds-gateway"
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: pandora_ds_routes
                virtual_hosts:
                - name: pandora_ds_vh
                  domains: [ "*" ]
                  # DS 网关标记头(审核 P1 #1):经 :8444 进后端的请求一律盖上 x-pandora-ds-gateway: "1"
                  # (入站已先剥离,不可伪造)。后端 ds_auth.mode=permissive/enforce 时,凭此头要求
                  # DS 必须带 Bearer 服务令牌;内部东西向直连无此头,不受影响。
                  request_headers_to_add:
                  - header: { key: "x-pandora-ds-gateway", value: "1" }
                    append_action: OVERWRITE_IF_EXISTS_OR_ADD
                  # ⚠️ DS 面双层防护(2026-07-10,回应审核 P1;§5 五轮更新):
                  #  1) 方法白名单::8444 无 jwt_authn(边缘客户端面 :8443 才做 JWT),配 header_mutation
                  #     剥离/重盖 x-pandora-* 身份头,故只放行 DS / Hub DS **文档明确会回调**的方法,
                  #     用 path 精确匹配;deny-by-default:未匹配请求 Envoy 直接 404。
                  #   - 控制面(AllocateBattle / ReleaseBattle / ListBattles / AssignHub / ReleaseHub /
                  #     TransferHub / ListHubs):matchmaker 等后端在集群内直连,不经 DS 面。
                  #   - 客户端面(ListHubLines / TransferToLine / GetLocation / BatchGetLocation /
                  #     SubscribePresence / UnsubscribePresence):走 :8443 客户端网关(带 jwt_authn)。
                  #   - ClearLocation / RefreshHubLocations:后端内部(hub_allocator 等)直连 locator 调,
                  #     不属 DS 面。
                  #  2) DS 服务令牌:后端 ds_auth.mode=enforce 时,白名单放行的方法仍要求 DS 带 Bearer
                  #     服务令牌(hub 令牌绑 pod / battle 令牌绑 match_id)才通过——不再是「仅靠网络信任」,
                  #     SetLocation/ReportResult/Heartbeat 均经令牌鉴权。
                  # 若某 DS 确需新增方法,必须在此显式加一行(保持 deny-by-default)并确认后端已纳入 ds_auth 校验。
                  routes:
                  # Hub/Battle DS 在线验玩家入场票；login 在消费 ticket jti 前校验调用 DS active。
                  - match: { path: "/pandora.login.v1.LoginService/VerifyDSTicket" }
                    route: { cluster: login_cluster, timeout: 15s, idle_timeout: 60s }
                  # Hub DS 心跳(Hub DS 每 5s 主动调)
                  - match: { path: "/pandora.hub.v1.HubAllocatorService/Heartbeat" }
                    route: { cluster: hub_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  - match: { path: "/pandora.hub.v1.HubAllocatorService/AcknowledgeAdmission" }
                    route: { cluster: hub_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  - match: { path: "/pandora.hub.v1.HubAllocatorService/AcknowledgeDeparture" }
                    route: { cluster: hub_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  # 战斗 DS 心跳(战斗 DS 每 5s 主动调)
                  - match: { path: "/pandora.ds.v1.DSAllocatorService/Heartbeat" }
                    route: { cluster: ds_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  # GM 指令拉取 / 回执(DS 复用心跳节奏轮询;GmService 与 ds_allocator 同进程)
                  - match: { path: "/pandora.gm.v1.GmService/PollCommands" }
                    route: { cluster: ds_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  - match: { path: "/pandora.gm.v1.GmService/AckCommand" }
                    route: { cluster: ds_allocator_cluster, timeout: 15s, idle_timeout: 60s }
                  # Hub DS 上报 HUB 位置；MATCHING/BATTLE 由 matchmaker 写(见 agones-dev.md §4)
                  - match: { path: "/pandora.locator.v1.PlayerLocatorService/SetLocation" }
                    route: { cluster: locator_cluster, timeout: 15s, idle_timeout: 60s }
                  # Hub DS 玩家断线快速上报(缩短 HUB 位置 TTL,见 locator.proto ReportDisconnect)
                  - match: { path: "/pandora.locator.v1.PlayerLocatorService/ReportDisconnect" }
                    route: { cluster: locator_cluster, timeout: 15s, idle_timeout: 60s }
                  # 战斗 DS 结算同步上报(match_id 幂等)
                  - match: { path: "/pandora.battle.v1.BattleResultService/ReportResult" }
                    route: { cluster: battle_result_cluster, timeout: 15s, idle_timeout: 60s }
      clusters:
      # 回环 admin(仅供 :9902 健康监听器转发 /ready,不对 Pod 外暴露)
      - name: local_admin_cluster
        type: STATIC
        connect_timeout: 1s
        load_assignment:
          cluster_name: local_admin_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: 127.0.0.1, port_value: 9901 }
      - name: login_cluster
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: login_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: login.pandora.svc.cluster.local, port_value: 50001 }
      - name: ds_allocator_cluster
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: ds_allocator_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: ds-allocator.pandora.svc.cluster.local, port_value: 50020 }
      - name: hub_allocator_cluster
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: hub_allocator_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: hub-allocator.pandora.svc.cluster.local, port_value: 50021 }
      - name: locator_cluster
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: locator_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: player-locator.pandora.svc.cluster.local, port_value: 50006 }
      - name: battle_result_cluster
        type: STRICT_DNS
        dns_lookup_family: V4_ONLY
        connect_timeout: 1s
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config: { http2_protocol_options: {} }
        load_assignment:
          cluster_name: battle_result_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: battle-result.pandora.svc.cluster.local, port_value: 50022 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pandora-envoy
  namespace: pandora
  labels:
    app.kubernetes.io/name: pandora-envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pandora-envoy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pandora-envoy
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.38-latest
        imagePullPolicy: IfNotPresent
        args: [ "-c", "/etc/envoy/envoy.yaml", "--service-cluster", "pandora-ds-envoy" ]
        ports:
        - { name: ds-face, containerPort: 8444 }
        # admin(9901)只绑 Pod 内回环,不声明 containerPort、不对外;探活走 :9902 只读健康监听器。
        - { name: health, containerPort: 9902 }
        readinessProbe:
          httpGet: { path: /ready, port: 9902 }
          initialDelaySeconds: 3
          periodSeconds: 5
        volumeMounts:
        - { name: config, mountPath: /etc/envoy, readOnly: true }
        resources:
          requests: { cpu: "50m", memory: 64Mi }
          limits: { cpu: "500m", memory: 256Mi }
      volumes:
      - name: config
        configMap:
          name: pandora-ds-envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: pandora-envoy
  namespace: pandora
  labels:
    app.kubernetes.io/name: pandora-envoy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pandora-envoy
  ports:
  - { name: ds-face, port: 8444, targetPort: 8444, protocol: TCP }
