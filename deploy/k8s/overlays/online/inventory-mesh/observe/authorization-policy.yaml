apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: pandora-inventory-exact-allow
  namespace: pandora
  annotations:
    istio.io/dry-run: "true"
    pandora.dev/migration-phase: observe
spec:
  selector:
    matchLabels:
      app: inventory
  action: ALLOW
  rules:
    - from: [{ source: { principals: ["cluster.local/ns/pandora/sa/pandora-auction"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/FreezeForOrder", "/pandora.inventory.v1.InventoryService/EnsureAuctionEscrow", "/pandora.inventory.v1.InventoryService/SettleAuctionMatch", "/pandora.inventory.v1.InventoryService/ReleaseEscrow"] } }]
    - from: [{ source: { principals: ["cluster.local/ns/pandora/sa/pandora-trade"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/SettlePlayerTrade"] } }]
    - from: [{ source: { principals: ["cluster.local/ns/pandora/sa/pandora-mail"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/GrantItems", "/pandora.inventory.v1.InventoryService/GrantInstances"] } }]
    - from: [{ source: { principals: ["cluster.local/ns/pandora/sa/pandora-leaderboard"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/GrantItems"] } }]
    - from: [{ source: { principals: ["cluster.local/ns/pandora/sa/pandora-battle-result"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/GrantInstances"] } }]
    - from: [{ source: { principals: ["cluster.local/ns/pandora-ingress/sa/pandora-edge-envoy"] } }]
      to: [{ operation: { methods: ["POST"], paths: ["/pandora.inventory.v1.InventoryService/GetInventory", "/pandora.inventory.v1.InventoryService/UseItem", "/pandora.inventory.v1.InventoryService/SellItem", "/pandora.inventory.v1.InventoryService/IdentifyItem", "/pandora.inventory.v1.InventoryService/DiscardInstance", "/pandora.inventory.v1.InventoryService/MoveInstance"] } }]
