# Pandora 20 个业务 Deployment + Service（19 个 Go 服务类型，matchmaker 含 PVP/PVE 双实例）
#
# 镜像:pandora/<svc>:dev(k8s 模式由 start.ps1 docker build 后 `minikube image load`;
#       online 模式先回读 registry，再由 runtime overlay 固定为 repo@sha256:digest)。
# 配置:secret pandora-config(launcher 用 run/cluster/etc 现场生成,含 HS256 密钥故用 Secret 承载),
#       按 subPath 把 <svc>.yaml 挂成 /app/etc/cluster.yaml。
#
# Service 短名 = 服务名,同 namespace 内 <svc>:<port> 直连(与 docker/compose 对齐)。
#
# readinessProbe(2026-07-08,zero-downtime-update.md §6.5):原生 gRPC probe(k8s ≥1.24),
# 打服务自身端口的 grpc_health_v1(Kratos 默认注册,Stop 时自动转 NOT_SERVING)。
# 新 Pod 必须 health SERVING 才进 Service Endpoints 接流量;滚动更新时旧 Pod 摘除即不再接新请求。
#
# 这个文件很长但全是同构片段;新增服务照抄一段、改 5 处(name/image/configKey/port/probe port)即可。
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: login, namespace: pandora, labels: { app: login } }
spec:
  replicas: 1
  selector: { matchLabels: { app: login } }
  template:
    metadata: { labels: { app: login, pandora.dev/ds-auth-writer-epoch: "2" } }
    spec:
      # 四个 DSTicket 签发方以固定非 root 身份运行；fsGroup 只为 Secret 投影提供组读权限。
      # 私钥文件模式 0440(root:10001)，容器可读但不可写，其他 UID/GID 不可读。
      securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, fsGroupChangePolicy: OnRootMismatch }
      containers:
        - name: login
          image: pandora/login:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: PANDORA_POD_UID, valueFrom: { fieldRef: { fieldPath: metadata.uid } } }
            - { name: PANDORA_IMAGE_DIGEST, valueFrom: { fieldRef: { fieldPath: "metadata.annotations['pandora.dev/image-digest']" } } }
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50001 } ]
          readinessProbe: { grpc: { port: 50001 }, initialDelaySeconds: 2, periodSeconds: 5, failureThreshold: 3 }
          volumeMounts:
            - { name: conf, mountPath: /app/etc/cluster.yaml, subPath: login.yaml, readOnly: true }
            # DSTicket v2(方案 B)RSA 签发私钥(仅 login/matchmaker/matchmaker-pve/hub-allocator 四个签发方挂载,
            # 决策文档 §7.2 私钥暴露面;Fleet/DS 绝不挂载,只拿公钥 JWKS ConfigMap)。
            - { name: dsticket, mountPath: /run/secrets/pandora-dsticket, readOnly: true }
            # Login VerifyDSTicket 诊断/兼容路径只读与 DS 同内容的 overlap JWKS；不从私钥
            # 派生单 key，不依赖 keys[0]。ConfigMap 在 pandora namespace 内是 immutable 副本。
            - { name: dsticket-jwks, mountPath: /run/config/pandora-dsticket, readOnly: true }
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes:
        - { name: conf, secret: { secretName: pandora-config } }
        - { name: dsticket, secret: { secretName: pandora-dsticket-signer-r1, defaultMode: 0440 } }
        - { name: dsticket-jwks, configMap: { name: pandora-dsticket-jwks-r1, defaultMode: 0444 } }
---
apiVersion: v1
kind: Service
metadata: { name: login, namespace: pandora }
spec: { selector: { app: login }, ports: [ { port: 50001, targetPort: 50001 } ] }
