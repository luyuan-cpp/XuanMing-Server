kind: Service
metadata: { name: ds-allocator, namespace: pandora }
spec: { selector: { app: ds-allocator }, ports: [ { name: grpc, appProtocol: grpc, port: 50020, targetPort: 50020 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: hub-allocator, namespace: pandora, labels: { app: hub-allocator } }
spec:
  replicas: 1
  # hub-allocator is the sole writer of the assignment/capacity ledger.  A
  # RollingUpdate briefly runs old+new binaries even at replicas=1; old writers
  # do not understand successor leases and can reopen the reconnect race.
  strategy: { type: Recreate }
  selector: { matchLabels: { app: hub-allocator } }
  template:
    metadata: { labels: { app: hub-allocator, pandora.dev/ds-auth-writer-epoch: "2" } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, fsGroupChangePolicy: OnRootMismatch }
      serviceAccountName: pandora-allocator   # Agones API 权限(agones 模式下需要;mock 不用但无害)
      containers:
        - name: hub-allocator
          image: pandora/hub-allocator:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: PANDORA_POD_UID, valueFrom: { fieldRef: { fieldPath: metadata.uid } } }
            - { name: PANDORA_IMAGE_DIGEST, valueFrom: { fieldRef: { fieldPath: "metadata.annotations['pandora.dev/image-digest']" } } }
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50021 } ]
          readinessProbe: { grpc: { port: 50021 }, initialDelaySeconds: 2, periodSeconds: 5, failureThreshold: 3 }
          volumeMounts:
            - { name: conf, mountPath: /app/etc/cluster.yaml, subPath: hub-allocator.yaml, readOnly: true }
            # DSTicket v2(方案 B)RSA 签发私钥(签发方专属,见 login 注释)。
            - { name: dsticket, mountPath: /run/secrets/pandora-dsticket, readOnly: true }
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes:
        - { name: conf, secret: { secretName: pandora-config } }
        - { name: dsticket, secret: { secretName: pandora-dsticket-signer-r1, defaultMode: 0440 } }
---
apiVersion: v1
kind: Service
metadata: { name: hub-allocator, namespace: pandora }
spec: { selector: { app: hub-allocator }, ports: [ { port: 50021, targetPort: 50021 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: battle-result, namespace: pandora, labels: { app: battle-result } }
spec:
  replicas: 1
  selector: { matchLabels: { app: battle-result } }
  template:
    metadata: { labels: { app: battle-result, pandora.dev/ds-auth-writer-epoch: "2" } }
    spec:
      containers:
        - name: battle-result
          image: pandora/battle-result:dev
          imagePullPolicy: IfNotPresent
          env:
            - { name: PANDORA_POD_UID, valueFrom: { fieldRef: { fieldPath: metadata.uid } } }
            - { name: PANDORA_IMAGE_DIGEST, valueFrom: { fieldRef: { fieldPath: "metadata.annotations['pandora.dev/image-digest']" } } }
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50022 } ]
          readinessProbe: { grpc: { port: 50022 }, initialDelaySeconds: 2, periodSeconds: 5, failureThreshold: 3 }
          volumeMounts: [ { name: conf, mountPath: /app/etc/cluster.yaml, subPath: battle-result.yaml, readOnly: true } ]
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes: [ { name: conf, secret: { secretName: pandora-config } } ]
---
apiVersion: v1
kind: Service
metadata: { name: battle-result, namespace: pandora }
spec: { selector: { app: battle-result }, ports: [ { port: 50022, targetPort: 50022 } ] }
