apiVersion: apps/v1
kind: Deployment
metadata: { name: matchmaker, namespace: pandora, labels: { app: matchmaker } }
spec:
  # ⚠️ 扩到 >1 副本前必须在 matchmaker.yaml 开 match.leader.enabled=true(etcd 选举单写者),
  # 否则每个副本都跑撮合循环 → 重复成局(见 docs/design/decision-revisit-matchmaker-single-writer.md)
  replicas: 1
  selector: { matchLabels: { app: matchmaker } }
  template:
    metadata: { labels: { app: matchmaker } }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 10001, runAsGroup: 10001, fsGroup: 10001, fsGroupChangePolicy: OnRootMismatch }
      containers:
        - name: matchmaker
          image: pandora/matchmaker:dev
          imagePullPolicy: IfNotPresent
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50011 } ]
          readinessProbe: { grpc: { port: 50011 }, initialDelaySeconds: 2, periodSeconds: 5, failureThreshold: 3 }
          volumeMounts:
            - { name: conf, mountPath: /app/etc/cluster.yaml, subPath: matchmaker.yaml, readOnly: true }
            # DSTicket v2(方案 B)RSA 签发私钥(签发方专属,见 login 注释)。
            - { name: dsticket, mountPath: /run/secrets/pandora-dsticket, readOnly: true }
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes:
        - { name: conf, secret: { secretName: pandora-config } }
        - { name: dsticket, secret: { secretName: pandora-dsticket-signer-r1, defaultMode: 0440 } }
---
apiVersion: v1
kind: Service
metadata: { name: matchmaker, namespace: pandora }
spec: { selector: { app: matchmaker }, ports: [ { port: 50011, targetPort: 50011 } ] }
---
apiVersion: apps/v1
