apiVersion: apps/v1
kind: Deployment
metadata: { name: team, namespace: pandora, labels: { app: team } }
spec:
  replicas: 1
  # 邀请推送的 Kafka producer 是启动强依赖；新 Pod 未 Ready/反复退出时必须保留旧 Pod 接流量。
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app: team } }
  template:
    metadata: { labels: { app: team } }
    spec:
      containers:
        - name: team
          image: pandora/team:dev
          imagePullPolicy: IfNotPresent
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50010 } ]
          readinessProbe: { grpc: { port: 50010 }, initialDelaySeconds: 2, periodSeconds: 5, failureThreshold: 3 }
          volumeMounts: [ { name: conf, mountPath: /app/etc/cluster.yaml, subPath: team.yaml, readOnly: true } ]
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes: [ { name: conf, secret: { secretName: pandora-config } } ]
---
apiVersion: v1
