# Pandora 全业务服务容器编排(docker 模式)
#
# 这是「整套后端跑在容器里」的编排：21 个 go 服务各一个容器，全部接到基础设施所在的
# 外部网络 pandora-net(由 deploy/docker-compose.dev.yml 创建)。
#
# 用法(推荐用一键脚本,自动先拉基础设施再起服务):
#   pwsh tools/scripts/start.ps1 -Mode docker
#
# 手动用法:
#   pwsh tools/scripts/dev_up.ps1                              # 1) 先起基础设施(建 pandora-net)
#   pwsh tools/scripts/gen_cluster_config.ps1                 # 2) 生成集群版配置 run/cluster/etc
#   docker compose -f deploy/docker-compose.services.yml up -d --build   # 3) 起服务
#
# 注意:docker 模式与 local 模式(宿主 go 进程)会抢同一批端口,二选一,别同时开。
#
# 配置覆盖:每个容器把 run/cluster/etc/<svc>.yaml 挂成 /app/etc/cluster.yaml,
# 容器入口 `-conf etc/cluster.yaml`(地址已是容器服务名,见 gen_cluster_config.ps1)。
# 宿主发布端口默认只绑 127.0.0.1，避免内网客户端绕过 Envoy 直连内部 gRPC。Docker Desktop
# 容器仍可经 host.docker.internal 访问这些映射；特殊 Linux 环境若确认 loopback 映射不可达，
# 仅可在可信开发网显式设 PANDORA_SERVICE_BIND_HOST=0.0.0.0，并用主机防火墙收敛。

x-svc-base: &svc-base
  # "no":业务容器不随 Docker Desktop 开机自启。unless-stopped 会在重启电脑后把上次
  # running 的业务容器全部复活、重新抢占 0.0.0.0:500xx,与 k8s port-forward / local 宿主
  # 进程打架(Envoy host.docker.internal 流量被旧容器截走)。业务容器的生命周期一律由
  # 一键脚本显式管理;基础设施(dev.yml 的 mysql/redis 等)保留 unless-stopped 不受影响。
  restart: "no"
  networks: [pandora-net]
  command: ["-conf", "etc/cluster.yaml"]

x-build-base: &build-base
  context: ..
  dockerfile: deploy/services/Dockerfile

services:
  login:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/account/login, CMD_NAME: login }
    image: pandora/login:dev
    container_name: pandora-login
    volumes: [ "../run/cluster/etc/login.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50001:50001" ]
    # 含战斗混合模式:hub_allocator 跑宿主,login 经 host.docker.internal:50021 回连(Linux/WSL 需显式映射)。
    # 纯 docker 模式下 login 配置用 docker 服务名解析 hub-allocator,不触发此映射,无害。
    extra_hosts:
      - "host.docker.internal:host-gateway"

  player:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/account/player, CMD_NAME: player }
    image: pandora/player:dev
    container_name: pandora-player
    volumes:
      - "../run/cluster/etc/player.yaml:/app/etc/cluster.yaml:ro"
      - "../configtable/dist:/app/configtable/active:ro"
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50002:50002" ]

  data-service:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/data/data_service, CMD_NAME: data_service }
    image: pandora/data-service:dev
    container_name: pandora-data-service
    volumes: [ "../run/cluster/etc/data-service.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50003:50003" ]

  friend:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/social/friend, CMD_NAME: friend }
    image: pandora/friend:dev
    container_name: pandora-friend
    volumes: [ "../run/cluster/etc/friend.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50004:50004" ]

  chat:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/social/chat, CMD_NAME: chat }
    image: pandora/chat:dev
    container_name: pandora-chat
    volumes: [ "../run/cluster/etc/chat.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50005:50005" ]

  guild:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/social/guild, CMD_NAME: guild }
    image: pandora/guild:dev
    container_name: pandora-guild
    volumes: [ "../run/cluster/etc/guild.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50008:50008" ]

  mail:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/social/mail, CMD_NAME: mail }
    image: pandora/mail:dev
    container_name: pandora-mail
    volumes: [ "../run/cluster/etc/mail.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50009:50009" ]

  player-locator:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/runtime/player_locator, CMD_NAME: locator }
    image: pandora/player-locator:dev
    container_name: pandora-player-locator
    volumes: [ "../run/cluster/etc/player-locator.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50006:50006" ]

  team:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/matchmaking/team, CMD_NAME: team }
    image: pandora/team:dev
    container_name: pandora-team
    volumes: [ "../run/cluster/etc/team.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50010:50010" ]

  matchmaker:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/matchmaking/matchmaker, CMD_NAME: matchmaker }
    image: pandora/matchmaker:dev
    container_name: pandora-matchmaker
    volumes: [ "../run/cluster/etc/matchmaker.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50011:50011" ]
    # 含战斗混合模式:ds_allocator 跑宿主,matchmaker 经 host.docker.internal:50020 回连(Linux/WSL 需显式映射)。
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # PVE 直进匹配实例:与 matchmaker 同一份源码/同构建参数(镜像层全缓存),仅配置不同——
  # game_mode=pve_coop + enable_solo_match=true(单人/整队直进副本,不排队)。
  # Envoy 按 header `x-pandora-game-mode: pve` 分流到本实例(host.docker.internal:50018)。
  matchmaker-pve:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/matchmaking/matchmaker, CMD_NAME: matchmaker }
    image: pandora/matchmaker-pve:dev
    container_name: pandora-matchmaker-pve
    volumes: [ "../run/cluster/etc/matchmaker-pve.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50018:50018" ]
    # 含战斗混合模式:同 matchmaker,经 host.docker.internal:50020 回连宿主 ds_allocator。
    extra_hosts:
      - "host.docker.internal:host-gateway"

  trade:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/economy/trade, CMD_NAME: trade }
    image: pandora/trade:dev
    container_name: pandora-trade
    volumes: [ "../run/cluster/etc/trade.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50012:50012" ]

  dialogue:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/social/dialogue, CMD_NAME: dialogue }
    image: pandora/dialogue:dev
    container_name: pandora-dialogue
    volumes: [ "../run/cluster/etc/dialogue.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50013:50013" ]

  push:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/runtime/push, CMD_NAME: push }
    image: pandora/push:dev
    container_name: pandora-push
    volumes: [ "../run/cluster/etc/push.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50014:50014" ]

  leaderboard:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/runtime/leaderboard, CMD_NAME: leaderboard }
    image: pandora/leaderboard:dev
    container_name: pandora-leaderboard
    volumes: [ "../run/cluster/etc/leaderboard.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50007:50007" ]

  # owner:每玩家 owner 权威(§9.22,owner-authority.md;dev 连单机 MySQL pandora_owner,
  # 生产必须 TiDB)。调用方 = login / allocator(owner_addr 指向本服务)。
  owner:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/runtime/owner, CMD_NAME: owner }
    image: pandora/owner:dev
    container_name: pandora-owner
    volumes: [ "../run/cluster/etc/owner.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50017:50017" ]

  inventory:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/economy/inventory, CMD_NAME: inventory }
    image: pandora/inventory:dev
    container_name: pandora-inventory
    volumes: [ "../run/cluster/etc/inventory.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50015:50015" ]

  auction:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/economy/auction, CMD_NAME: auction }
    image: pandora/auction:dev
    container_name: pandora-auction
    volumes: [ "../run/cluster/etc/auction.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50016:50016" ]

  ds-allocator:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/battle/ds_allocator, CMD_NAME: ds_allocator }
    image: pandora/ds-allocator:dev
    container_name: pandora-ds-allocator
    volumes: [ "../run/cluster/etc/ds-allocator.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50020:50020" ]

  hub-allocator:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/battle/hub_allocator, CMD_NAME: hub_allocator }
    image: pandora/hub-allocator:dev
    container_name: pandora-hub-allocator
    volumes: [ "../run/cluster/etc/hub-allocator.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50021:50021" ]

  battle-result:
    <<: *svc-base
    build:
      <<: *build-base
      args: { SERVICE_DIR: services/battle/battle_result, CMD_NAME: battle_result }
    image: pandora/battle-result:dev
    container_name: pandora-battle-result
    volumes: [ "../run/cluster/etc/battle-result.yaml:/app/etc/cluster.yaml:ro" ]
    ports: [ "${PANDORA_SERVICE_BIND_HOST:-127.0.0.1}:50022:50022" ]
    # 含战斗混合模式:ds_allocator 跑宿主,battle_result 经 host.docker.internal:50020 回连(Linux/WSL 需显式映射)。
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  pandora-net:
    name: pandora-net
    external: true
