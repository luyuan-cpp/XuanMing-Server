# Pandora 开发环境基础设施
#
# 端口规划严格对齐 docs/design/infra.md §6.1。
#
# 用法:
#   pwsh tools/scripts/dev_up.ps1
#   pwsh tools/scripts/dev_down.ps1
#
# 数据卷默认保留(开发期重启不丢数据);彻底清理用 dev_down.ps1 -Volumes

services:
  # ===== MySQL 8.4 =====
  mysql:
    image: mysql:8.4
    container_name: pandora-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pandora_dev_root}
      MYSQL_USER: ${MYSQL_USER:-pandora}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pandora_dev_pwd}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --max_connections=500
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-pandora_dev_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [pandora-net]

  # ===== Redis 8.8 =====
  redis:
    image: redis:8.8.0-alpine
    container_name: pandora-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "1gb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [pandora-net]

  # ===== Zookeeper(给 Kafka 用)=====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.7
    container_name: pandora-zookeeper
    restart: unless-stopped
    ports:
      - "127.0.0.1:2182:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [pandora-net]

  # ===== Kafka(Zookeeper 模式,Confluent Platform 7.9.x 兼容线)=====
  kafka:
    image: confluentinc/cp-kafka:7.9.7
    container_name: pandora-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 9092 docker 内部网络互访;9093 暴露给 host(go 服务连这个)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [pandora-net]

  # ===== etcd 3.6 =====
  etcd:
    image: quay.io/coreos/etcd:v3.6.12
    container_name: pandora-etcd
    restart: unless-stopped
    ports:
      - "127.0.0.1:2380:2379"  # client
      - "127.0.0.1:2381:2380"  # peer
    command:
      - /usr/local/bin/etcd
      - --name=pandora-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=pandora-etcd=http://etcd:2380
      - --initial-cluster-token=pandora-etcd-cluster
      - --initial-cluster-state=new
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [pandora-net]

  # ===== Prometheus 2.55 =====
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: pandora-prometheus
    restart: unless-stopped
    ports:
      # 监控面默认只供本机；确需局域网共享看板时单独显式设置该变量。
      - "${PANDORA_OBSERVABILITY_BIND_HOST:-127.0.0.1}:9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks: [pandora-net]

  # ===== Grafana 11 =====
  grafana:
    image: grafana/grafana:11.3.1
    container_name: pandora-grafana
    restart: unless-stopped
    ports:
      - "${PANDORA_OBSERVABILITY_BIND_HOST:-127.0.0.1}:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-pandora_dev_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # 告警联系点 webhook(飞书/企微群 + ntfy 个人推送)。
      # secret 不入 git:实际值在本机 dev.env 或部署环境注入(见 docs/design/alerting.md)。
      # 群 webhook 留空时不生成该 receiver，避免 Grafana 因空 URL 拒绝整套 provisioning。
      PANDORA_ALERT_WECOM_URL: ${PANDORA_ALERT_WECOM_URL:-}
      PANDORA_ALERT_FEISHU_WEBHOOK: ${PANDORA_ALERT_FEISHU_WEBHOOK:-}
      # ntfy v2.11 用 inline template 把 Grafana webhook JSON 提取成可读标题/正文。
      PANDORA_ALERT_NTFY_URL: "${PANDORA_ALERT_NTFY_URL:-http://ntfy:80/pandora-alerts?tpl=1&t=%7B%7B.title%7D%7D&m=%7B%7B.message%7D%7D}"
      # entrypoint 先在 /tmp 生成只包含已配置渠道的 provisioning。
      GF_PATHS_PROVISIONING: /tmp/pandora-grafana-provisioning
    entrypoint:
      - /bin/sh
      - /etc/grafana/pandora-entrypoint.sh
    volumes:
      - grafana-data:/var/lib/grafana
      # 数据源自动注入(Prometheus / Loki / Loki-k8s),不用手动在 UI 里加
      - ./grafana/provisioning:/etc/grafana/provisioning-source:ro
      - ./grafana/entrypoint.sh:/etc/grafana/pandora-entrypoint.sh:ro
    extra_hosts:
      # 让 "Loki (k8s)" 数据源能通过 host.docker.internal 访宿主的 kubectl port-forward
      - "host.docker.internal:host-gateway"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      # ntfy 是可选的个人推送出口:它不健康/起不来也绝不能连带拖垮仪表盘与告警引擎。
      # service_started 只等容器启动(不等 healthcheck),required:false 让 ntfy 失败时 Grafana 照常启动。
      # 群 webhook / Prometheus / Loki 告警链路与 ntfy 相互独立,ntfy 挂了其余渠道仍可用。
      ntfy:
        condition: service_started
        required: false
    networks: [pandora-net]

  # ===== Loki 3.x 日志存储(infra.md §11.2)=====
  # 全部服务 JSON stdout 经 Alloy 采集入 Loki,Grafana Explore 用 LogQL 查。
  loki:
    image: grafana/loki:3.4.1
    container_name: pandora-loki
    restart: unless-stopped
    ports:
      - "${PANDORA_OBSERVABILITY_BIND_HOST:-127.0.0.1}:3100:3100"   # 宿主直查 API(logcli / curl);Grafana 走内网 loki:3100
    command:
      - -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks: [pandora-net]

  # ===== Alloy 日志采集(docker 容器 stdout + 宿主 run/logs 文件)=====
  # docker/battle 模式:采 pandora-* 容器;local/battle 模式:采 run/logs/*.log 宿主进程日志。
  alloy:
    image: grafana/alloy:v1.7.1
    container_name: pandora-alloy
    restart: unless-stopped
    user: root   # 读 docker.sock 需要
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../run/logs:/hostlogs:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    networks: [pandora-net]

  # ===== Envoy v1.38 边缘网关(W2 ④,2026-06-05)=====
  # 详见 deploy/envoy/README.md。
  #
  # 上游业务服跑在宿主(go run),通过 host.docker.internal 访问:
  #   - Windows / macOS Docker Desktop:自动解析
  #   - Linux:extra_hosts 用 host-gateway 显式映射
  #
  # 证书(cert.pem / key.pem)由 mkcert 在 deploy/envoy/ 下本机生成(不入库)。
  envoy:
    image: envoyproxy/envoy:v1.38-latest
    container_name: pandora-envoy
    restart: unless-stopped
    ports:
      # 默认只绑本机回环(仅本机可连);内网多机联调由 start.ps1 的 intranet/battle/k8s 局域网路径
      # 显式导出 PANDORA_EDGE_BIND_HOST=0.0.0.0 才把【客户端面 8443】对局域网开放。
      # DS 面 8444 未鉴权,单独用 PANDORA_DS_EDGE_BIND_HOST 控制,默认恒绑本机 —— 即使客户端面已开到
      # 局域网,未鉴权的 DS 面也不会跟着暴露;只有真有异机 DS 需回连时(start.ps1 -ExposeDsFace)才开放。
      - "${PANDORA_EDGE_BIND_HOST:-127.0.0.1}:8443:8443"   # 客户端 HTTPS / gRPC-Web 入口
      - "${PANDORA_DS_EDGE_BIND_HOST:-127.0.0.1}:8444:8444"   # DS 面 HTTP / gRPC-Web 入口(UE Hub/Battle DS → 内部服务,agones-dev.md §5.1;默认只绑本机)
      - "127.0.0.1:9901:9901"   # admin:未鉴权,永远只绑本机回环,绝不对外(生产关闭)
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/cert.pem:/etc/envoy/cert.pem:ro
      - ./envoy/key.pem:/etc/envoy/key.pem:ro
    extra_hosts:
      # Linux / WSL 兼容:让 envoy 容器能通过 host.docker.internal 访问宿主
      # Windows / macOS Docker Desktop 上写不写都行(默认已有)
      - "host.docker.internal:host-gateway"
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --service-cluster
      - pandora-edge
      - --service-node
      - dev-local
    networks: [pandora-net]

  # ===== ntfy 通知服务(个人手机 / 桌面推送,https://github.com/binwiederhier/ntfy)=====
  # Grafana 统一告警的「个人推送」出口:Grafana Alerting 命中 critical 规则 → POST 到
  # http://ntfy:80/pandora-alerts(见 grafana/provisioning/alerting/)。手机 / 桌面订阅该 topic
  # 即可收推送。飞书 / 企微「群通知」不经 ntfy,直接走 Grafana 原生联系点(见 docs/design/alerting.md)。
  #
  # dev 默认无鉴权(本机回环 + 私密 topic 名即可);公网部署务必开 auth(NTFY_ENABLE_LOGIN=true +
  # access-control)或改用 ntfy.sh 私密 topic,避免任何人往你的 topic 推消息。
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    container_name: pandora-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: ${PANDORA_NTFY_BASE_URL:-http://127.0.0.1:8080}
      NTFY_LISTEN_HTTP: ":80"
      # ntfy 默认只做内存缓存；显式指向持久卷，重启后才能回放离线告警。
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
    ports:
      # 独立绑定变量，手机联调时只开 ntfy，不跟着暴露 Grafana/Prometheus/Loki。
      - "${PANDORA_NTFY_BIND_HOST:-127.0.0.1}:8080:80"
    volumes:
      - ntfy-data:/var/lib/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/v1/health | grep -q '\"healthy\":true'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [pandora-net]

networks:
  pandora-net:
    name: pandora-net
    driver: bridge

volumes:
  mysql-data: { name: pandora-mysql-data }
  redis-data: { name: pandora-redis-data }
  zk-data:    { name: pandora-zk-data }
  zk-log:     { name: pandora-zk-log }
  kafka-data: { name: pandora-kafka-data }
  etcd-data:  { name: pandora-etcd-data }
  prom-data:  { name: pandora-prom-data }
  grafana-data: { name: pandora-grafana-data }
  loki-data:  { name: pandora-loki-data }
  alloy-data: { name: pandora-alloy-data }
  ntfy-data:  { name: pandora-ntfy-data }
