# Pandora player 服务开发期配置(W4 ④,2026-06-06)。
#
# - gRPC :50002 / HTTP :51002(仅 /metrics)
# - MySQL 强依赖(pandora_player 库:players + player_heroes + mmr_history,幂等 UpdateMMR 不变量 §2)
# - Kafka 强依赖(消费 pandora.player.update,battle_result 结算后发)
# - duration 字段用 pkg/config.Duration,yaml 可直接写 "3s"
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50002"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51002"

node:
  node_id: 1
  # MySQL:dev 连本机 docker mysql 的 pandora_player 库(强依赖,DSN 必填)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_player?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"

kafka:
  brokers: ["127.0.0.1:9093"]
  group_id: "pandora-player"
  partition_cnt: 4

player:
  # base_mmr: 新玩家缺省 MMR(与 battle_result base_mmr 对齐)
  base_mmr: 1500
  # mmr_floor: MMR 下限(UpdateMMR 后 clamp)
  mmr_floor: 0
  # default_nickname_prefix: 默认昵称前缀(EnsureProfile 建档 nickname=prefix+player_id)
  default_nickname_prefix: "Player_"
  # max_nickname_len: 昵称最大长度
  max_nickname_len: 32
  # hero_selection_enabled: 出战英雄选择开关(demo 阶段默认 false 跳过选英雄;联调养成时置 true)
  hero_selection_enabled: false
  # loadout_customize_enabled: 出战装备预设 / 天赋树自定义开关(demo 阶段默认 false;联调养成时置 true)
  loadout_customize_enabled: false
  # consume_topics: 订阅 topic(留空走默认 [pandora.player.update])
  consume_topics:
    - "pandora.player.update"

  # ── 玩家等级经验(实时成长,realtime-progression.md)──
  # exp_curve: 第 i 项 = 从 Lv(i+1) 升到 Lv(i+2) 所需级内经验;最高等级 = 项数+1。
  # 14 项 → Lv15 封顶。数值与客户端 Table/角色/j_玩家等级经验.xlsx 同源
  # (当前为联调占位曲线,步进 800,累计 86800;正式数值待策划确认后两侧同步改)。
  # 置空 = 经验功能关闭(AddExperience 拒,行为与历史一致)。
  exp_curve: [1000, 1800, 2600, 3400, 4200, 5000, 5800, 6600, 7400, 8200, 9000, 9800, 10600, 11400]
  # max_exp_per_grant: 单次 AddExperience 入账上限(防异常调用方一次灌满;缺省 1000000)
  max_exp_per_grant: 1000000
  # push_outbox_interval / push_outbox_batch: 经验推送出箱发布节奏(缺省 1s / 128)
  push_outbox_interval: "1s"
  push_outbox_batch: 128
