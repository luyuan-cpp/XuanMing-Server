# Pandora guild 服务开发期配置(2026-06-27)。
#
# - gRPC :50008 / HTTP :51008(仅 /metrics)
# - 公会(GuildService)+ 临时群(GroupService)同进程
# - MySQL 强依赖(pandora_social 库:guilds + guild_members + guild_join_requests + chat_groups + chat_group_members)
# - Redis 弱依赖(公会资料读缓存 cache-aside;Ping 失败降级直连 MySQL,不阻塞启动)
# - Kafka 弱依赖(生产 pandora.guild.event → push 推送公会成员变更通知)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50008"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51008"

node:
  node_id: 1
  # MySQL:dev 连本机 docker mysql 的 pandora_social 库(强依赖,DSN 必填)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_social?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"
  # Redis:公会资料读缓存(cache-aside,弱依赖)。单实例填 host;Cluster/Sentinel 填 addrs。
  # 留空(host 与 addrs 皆空)则禁用缓存降级直连 MySQL。dev 复用本机 docker redis :6380。
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

kafka:
  brokers: ["127.0.0.1:9093"]
  group_id: "pandora-guild"
  partition_cnt: 4

guild:
  # max_guild_members: 单公会成员上限(默认 100)
  max_guild_members: 100
  # max_group_members: 单临时群成员上限(默认 50)
  max_group_members: 50
  # max_name_len: 公会 / 群名最大长度(utf8 rune,默认 24)
  max_name_len: 24
  # cache_ttl: 公会资料读缓存条目 TTL(默认 60s);写后删 + 短 TTL 兜底(read-cache-strategy.md §4)
  cache_ttl: "60s"

# 会话现行性门(R5 复审 P0-1,INC-20260722-004):校验客户端面请求 jti == login 会话权威
# (pandora:sess,node.redis_client 指向的共享 Redis)当前一代,顶号后旧 JWT 立即失效。
# dev 宽松档 require=false(gate 已装配时顶号/登出照常拒;仅漏配端点时跳过判定);
# -Prod 产物由 gen_cluster_config.ps1 机械置 true(漏配端点拒启)。
session_gate:
  require: false
