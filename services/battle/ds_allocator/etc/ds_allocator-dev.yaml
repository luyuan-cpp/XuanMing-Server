# Pandora ds_allocator 服务开发期配置(W4 ②,2026-06-06)。
#
# - gRPC :50020 / HTTP :51020(仅 /metrics)
# - Redis 强依赖(DS 战斗实例镜像 + 心跳超时 ZSET 扫描)
# - W4 ② 用 MockGameServerAllocator(返回假 pod/addr);W4 ⑫ 接真 Agones(agones.enabled=true 启用)
# - duration 字段用 pkg/config.Duration,yaml 可直接写 "15s"
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50020"
    timeout: "60s"              # AllocateBattle 阻塞等 allocate(5s)+ready_wait(45s)+余量;勿低于 55s
    enable_reflection: true     # dev 开;prod 关(零值=false)
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
    max_conn_age_grace: "90s"   # AllocateBattle 同步等 DS ready 最长 ~60s,宽限须盖过它(默认 30s 会砍断在途分配)
  http:
    network: tcp
    addr: ":51020"

node:
  node_id: 1
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

# ── DS 启动后端模式(标准两模式开关)─────────────────────────────────────────
# mode 单一开关决定战斗 DS 怎么起,与 hub_allocator.mode 对齐:
#   "local"  → 本机直接 exec 打包好的 Windows DS 进程(Windows 单机自测,见下方 local_ds)
#   "agones" → k8s Agones GameServerAllocation(Linux 线上,见下方 agones)
#   "mock"   → 确定性假地址(无真实 DS,离线联调)
# mode 为权威开关;留空时才回退按 agones.enabled / local_ds.enabled 推导(向后兼容旧配置)。
# dev 默认 local:下载/打包好 Windows DS 后开客户端即可端到端自测(匹配成局→后端 exec 战斗 DS→连入)。
# 上线切 "agones"。
mode: "local"

# W4 ③:ds.lifecycle producer(弱依赖)。心跳超时 abandoned → 发 DSLifecycleEvent 给
# battle_result 做玩家段位回滚补偿(不变量 §4)。brokers 留空则不发(abandoned 镜像仍落 Redis)。
kafka:
  brokers: ["127.0.0.1:9093"]
  group_id: "pandora-ds-allocator"
  partition_cnt: 4

# player_locator gRPC 地址(断线重连:心跳时续期玩家 BATTLE 位置 TTL,docs/design/battle-reconnect.md §2.2)。
# 留空 → 不续期(弱依赖,不影响心跳/对局,但长对局中途掉线重登可能退化为回大厅)。
locator_addr: "127.0.0.1:50006"

allocator:
  # ready_wait_timeout: AllocateBattle 等 DS 心跳 ready 的最长时间(代码默认 10s)。
  # k8s/minikube 真 Linux DS 冷启动 = Loader GameMode 等 Agones Allocated label → ServerTravel
  # 加载目标地图(松林镇等大图可远超 10s)→ BattleGameMode BeginPlay 才发 ready 心跳,
  # 10s 必超时;调到 45s 覆盖冷加载。配套:上方 server.grpc.timeout=60s、
  # matchmaker ds_allocate_timeout=60s、matchmaker server.grpc.timeout=60s,四处一起改。
  ready_wait_timeout: "45s"
  # heartbeat_timeout: DS 心跳超时阈值(不变量 §4),超过没收到 Heartbeat → abandoned
  heartbeat_timeout: "15s"
  # sweep_interval: 后台心跳超时扫描间隔
  sweep_interval: "5s"
  # battle_ttl: 战斗 DS 镜像 Redis key TTL(防僵尸镜像)
  battle_ttl: "2h"
  # empty_battle_timeout: 空场超时兜底(默认 5m)。对局活跃(ready/running)但 DS 上报
  # player_count==0 持续超过此时长 → 判 abandoned + 回收(全员掉线未归/客户端从未连入,
  # DS 空转烧资源)。主路径是 DS 侧空场计时器自结算(agones-dev.md §2.4),此阈值应大于
  # DS 侧计时器,且必须远大于战斗断线重连窗口(~30s)。设负值禁用。
  empty_battle_timeout: "5m"
  # mock_ds_addr_host: W4 ② MockGameServerAllocator 返回的假 DS host
  mock_ds_addr_host: "127.0.0.1"
  # mock_ds_port_base: Mock 端口基址(每场 port = base + match_id % range)
  mock_ds_port_base: 30000
  # mock_ds_port_range: Mock 端口取模范围
  mock_ds_port_range: 1000

# W4 ⑫: 真 Agones GameServerAllocation 配置。
# dev 默认 enabled=false 走 Mock(本机无 k8s/Agones 也能跑 ds_allocator)。
# 上集群时置 enabled=true + fleet_name;in-cluster 下 api_server/token_path/ca_path 可留空用默认。
#
# ⚠️ 本机 minikube + Agones 联调时,api_server / token_path 是「每台机各异的临时值」
#    (kubectl proxy 端口、临时 token 文件路径都随机),**不要提交进仓库**。
#    本机联调请改本地 ignored 配置或临时覆盖,示例见 deploy/k8s/agones/README.md。
agones:
  enabled: false
  api_server: "https://kubernetes.default.svc"  # in-cluster 默认;本机 minikube 外联临时改本地,勿提交
  namespace: "default"
  fleet_name: "pandora-battle"
  token_path: "/var/run/secrets/kubernetes.io/serviceaccount/token"  # in-cluster 默认;本机临时值勿提交
  ca_path: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"     # in-cluster 默认
  insecure_skip_tls_verify: false  # in-cluster=false;minikube 外联自签时本地临时置 true,勿提交
  allocate_timeout: "5s"
  # map_fleets(可选,标准混合形态):按 map_id 路由到「专属预热 Fleet」——该 Fleet 的 env
  # 烤死目标 umap + 战斗 GameMode,Pod 预热时已加载好图,分配即可玩(零 ServerTravel 延迟)。
  # 分配请求生成有序 selectors:[专属 Fleet, 上面的 fleet_name],Agones 按序尝试:
  # 专属池无空闲自动回落通用 Loader 池(同一次 allocation,无额外 RTT)。
  # 适合热门图;长尾/新副本不配,走通用池填表即用。专属 Fleet 需另建(克隆 20-fleet-battle.yaml,
  # 改 metadata.name + PANDORA_DS_MAP/PANDORA_DS_GAMEMODE 为目标图直启)。
  # map_fleets:
  #   - map_id: 7                       # SonglinTown(g_关卡.xlsx Id=7)
  #     fleet_name: "pandora-battle-songlin"

# 本机拉起 Windows Dedicated Server 调试模式(mode=local 时生效)。
# 匹配成局后 ds_allocator 直接 exec 打包好的 UE Windows DS,分配本机端口返回真实地址。
# 本机调试步骤:① UE 打包 Windows Server 版(产出 PandoraServer.exe)
#              ② executable_path 指向该 PandoraServer.exe
#              ③ 顶部 mode 置 "local"
# 跨机器移植:下面写死的是本开发机路径;换机器/换盘符无需手改——只要把客户端 Client 仓库放到
# 与本服务器仓库平级的目录,play.ps1 -Battle 会自动探测 Packages\Server_Win64_*\WindowsServer\
# PandoraServer.exe 并经 PANDORA_DS_EXE / PANDORA_DS_DIR 注入;此处路径在本机不存在时自动回退到注入值。
local_ds:
  enabled: true
  # 策划机可改用 ${PANDORA_DS_ROOT} 拼接(play.ps1 -Battle 启动时自动探测平级 Client 仓并设该变量,策划零操作):
  #   executable_path: "${PANDORA_DS_ROOT}/Packages/Server_Win64_Shipping/WindowsServer/PandoraServer.exe"
  # 路径分隔符正斜杠 / 反斜杠都行(go 侧 filepath.FromSlash 归一化);下面是本开发机绝对路径。
  executable_path: "F:\\work\\Pandora-Client-SVN\\Packages\\Server_Win64_Development\\WindowsServer\\PandoraServer.exe"
  map_name: "/Game/Test/Level/MobaLevel?game=/Script/Pandora.PandoraBattleGameMode" # 默认/兜底关卡:map_id 未在下方 maps 命中时用它(留空则用 DS 默认关卡)
  # loader_map:填了它就切到「填表即用」权威路径——DS 统一启到这张加载/分发关卡,不再直接启到目标图;
  # 目标副本由 UE 侧 Loader GameMode 在 BeginPlay 读 PANDORA_MAP_ID(已注入)→ 查 g_关卡.xlsx → ServerTravel。
  # 之后策划新增副本只改表 + 重打 DS 内容,本 yaml 的 maps 桥可退休。Loader 复用已在包内的空入口图
  # Lvl_Server_Entry(无需新建 Lvl_DS_Loader 资产),GameMode 由 ?game= 覆盖。启用前提:DS 包含
  # APandoraDSLoaderGameMode + 关卡上下文修复(2026-07-07)的重新编译产物。留空(默认)= 走下面 maps 直接启到目标图的 dev 桥。
  # loader_map: "/Game/Entry/Level/Lvl_Server_Entry?game=/Script/Pandora.PandoraDSLoaderGameMode"
  # 选副本表:客户端选择的 map_id 经 matchmaker 透传到 AllocateBattle,命中则起对应关卡,
  # 未命中回退上面的 map_name。同一个 ds_allocator 进程凭 map_id 起不同副本(PVP / PVE 共存)。
  # map_id 对齐策划 g_关卡.xlsx 的关卡 id(权威:6=MobaLevel MOBA战斗,7=SonglinTown 松林镇副本)。
  maps:
    - map_id: 6                                # PVP 5v5(MobaLevel,对齐 g_关卡.xlsx Id=6)
      map_name: "/Game/Test/Level/MobaLevel?game=/Script/Pandora.PandoraBattleGameMode"
    - map_id: 7                                # PVE 副本(松林镇 SonglinTown,对齐 g_关卡.xlsx Id=7)
      map_name: "/Game/Test/Level/SonglinTown?game=/Script/Pandora.PandoraPveGameMode"

  # advertise_host:返回给客户端 NetDriver 连接的 host。本机自测用 127.0.0.1;
  # 内网测试服(play.ps1 -Battle -Intranet)会自动探测本机内网 IPv4 并经环境变量
  # PANDORA_DS_ADVERTISE_HOST 覆盖此值(优先级高于这里的写死值,策划零操作,无需改本文件)。
  advertise_host: "127.0.0.1"
  port_base: 7800                              # 战斗 DS 端口池基址(与 hub 7777 错开)
  port_range: 100                              # 端口池大小,实际端口在 [base, base+range) 取空闲
  working_dir: "F:\\work\\Pandora-Client-SVN\\Packages\\Server_Win64_Development\\WindowsServer" # DS 进程工作目录(staged 根目录)
  log_dir: "run/dev/logs/ds"                   # 每个 DS 进程 stdout/stderr 落 <pod>.log
  # extra_args: ["-PANDORA_BACKEND=https://127.0.0.1:8444"]  # 追加 UE DS 命令行参数
  extra_env:                                   # 注入 DS 进程额外环境变量
    PANDORA_DS_ALLOCATOR_ADDR: "127.0.0.1:8444"
    PANDORA_PLAYER_LOCATOR_ADDR: "127.0.0.1:8444"
    PANDORA_BATTLE_RESULT_ADDR: "127.0.0.1:8444"
    # 本地 dev 的 Envoy DS 面 :8444 是明文 grpc-web(见 deploy/envoy/envoy.yaml pandora_ds_listener)。
    PANDORA_DS_ALLOCATOR_TLS: "0"
