# Pandora battle_result 服务开发期配置(W4 ③,2026-06-06)。
#
# - gRPC :50022 / HTTP :51022(仅 /metrics)
# - MySQL 强依赖(pandora_battle 库:battles + battle_player_stats,幂等落库 不变量 §2)
# - Kafka 强依赖(消费 pandora.battle.result / pandora.ds.lifecycle)
# - player.update 事务出箱发布(W4 ⑨ at-least-once 可靠补偿,不变量 §4;player 服务幂等 UpdateMMR)
# - W4 ④ player 服务已上线 → player_addr 指向 player gRPC,GrpcMMRReader 读真实当前 MMR
# - duration 字段用 pkg/config.Duration,yaml 可直接写 "3s"
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50022"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51022"

node:
  node_id: 1
  # MySQL:dev 连本机 docker mysql 的 pandora_battle 库(强依赖,DSN 必填)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_battle?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

kafka:
  brokers: ["127.0.0.1:9093"]
  group_id: "pandora-battle-result"
  partition_cnt: 4

battle:
  # elo_k_factor: Elo K 系数(胜负 MMR 变化幅度上限 ≈ K)
  elo_k_factor: 32
  # base_mmr: 玩家缺省 MMR(W4 ③ player 未上线 → StaticMMRReader 全返此值)
  base_mmr: 1500
  # consume_topics: 订阅 topic(留空走默认 [pandora.battle.result, pandora.ds.lifecycle])
  consume_topics:
    - "pandora.battle.result"
    - "pandora.ds.lifecycle"
  # authority_mode=redis 激活时必须删除 pandora.battle.result，只保留 ds.lifecycle；旧 topic
  # 不携带可核验 Model-B 凭据，服务会在连接 MySQL/Kafka 前启动失败，禁止绕过同步 ReportResult。
  # player_addr: player 服务 gRPC 地址(W4 ④ player 已上线 → 接真实当前 MMR;
  # 弱依赖:gRPC 懒连接,player 未起时调用失败由 biz 回退 base_mmr,不阻断落库)
  player_addr: "127.0.0.1:50002"
  # matchmaker_addr: matchmaker 服务 gRPC 地址。结算/废弃落库后调 matchmaker.ReleaseMatch
  # 释放残留撮合状态(player→ticket claim + 票据 + match 镜像),修复"结算返回 Hub 后
  # 玩家无法再次匹配(StartMatch 4002)"。弱依赖:懒连接,matchmaker 未起时仅 Warn 不阻断落库。
  matchmaker_addr: "127.0.0.1:50011"
  # 注:battle_result 不配 ds_allocator_addr —— 不主动回收战斗 DS。DS 生命周期归 ds_allocator +
  # DS 自身:DS 收到结算 OK 后 ended 心跳 → 通知客户端回大厅 → 自停,ds_allocator 凭 ended 心跳
  # (本地 taskkill / Agones 自停)+ 15s 心跳超时 sweep 兜底回收。历史教训(2026-07-03):battle_result
  # 在结算响应路径同步 taskkill DS 会抢在通知客户端回大厅之前杀掉 DS → 客户端卡战斗态。
  # W4 ⑨ player.update 事务出箱发布器:落库同事务写出箱 → 后台轮询投递 Kafka(at-least-once 不变量 §4)
  outbox_publish_interval: "2s"
  outbox_batch_size: 128

# ── DS 回调服务令牌校验(审核 P1 #1)────────────────────────────────────────────
# battle_result 只校验不签发:Battle DS 经 Envoy :8444 调 ReportResult 须带 battle 令牌
# (ds_allocator 分配时签发,绑 match_id,防拿 A 局令牌伪造 B 局结算)。
# mode: off(默认;UE DS 未带令牌前必须 off)→ permissive(灰度观察)→ enforce(强制)。
# secret 必须与 ds_allocator ds_auth.secret 一致。
ds_auth:
  mode: "off"
  authority_mode: "legacy"
  active_heartbeat_max_age: "30s"
  secret: "pandora-dev-jwt-secret-change-me-32!"
  # authority_mode=redis 时 fence 必填；dev/legacy 不连接 etcd。
  # fence:
  #   etcd_endpoints: ["127.0.0.1:2380"]
  #   etcd_prefix: "/pandora/ds-auth/"
  #   etcd_lease_ttl_sec: 15
  #   etcd_dial_timeout: "5s"
  #   keyset_revision: "pandora-ds-auth-v2-r1"
