# Pandora data_service 服务开发期配置(2026-06-16)。
#
# - gRPC :50003 / HTTP :51003(仅 /metrics)
# - 内网数据网关(不经 Envoy,不直接暴露给玩家)
# - MySQL 强依赖(pandora_player 库 player_data 强 schema 列,事实源;
#   表由服务启动时按 PlayerData proto 经 proto2mysql CreateOrUpdateTable 自动建/同步)
# - Redis 弱依赖(cache-aside 旁路缓存,Ping 失败降级直连 MySQL)
# - 不接 kafka
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50003"
    timeout: "15s"
    enable_reflection: true
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51003"

node:
  node_id: 1
  mysql_client:
    # pandora_player 库(player_data 表由服务启动时按 pb 自动建,不走 mysql-init DDL)
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_player?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

data:
  # cache_ttl: Redis 缓存条目存活时长(读 miss 回填按此 TTL)
  cache_ttl: "5m"
