# Pandora push 服务开发期配置(W2 ⑤ → W3 ④ 2026-06-05 真实化)。
#
# - gRPC 端口 50014(server stream,客户端经 Envoy gRPC-Web 连过来)
# - HTTP 端口 51014(目前只暴露 /metrics;push 服务无 RESTful RPC)
# - W3 ④ 起接 kafka(订阅 push topic) + redis ZSET 离线消息缓存
# - W3 ⑥ 起 duration 字段用 pkg/config.Duration 包装,yaml 可直接写 "5s" / "5m"
# - W3 ③ 起 server.grpc.enable_reflection 可控,dev: true / prod: false(零值)

server:
  grpc:
    network: tcp
    addr: ":50014"
    enable_reflection: true     # dev:开 reflection 便于 grpcurl 联调
  http:
    network: tcp
    addr: ":51014"

node:
  zone_id: 1
  session_expire_min: 1440
  redis_client:
    host: "127.0.0.1:6380"      # Pandora Redis 端口(deploy/docker-compose.dev.yml)
    db: 0
    dial_timeout: "2s"

# W3 ④ kafka 消费者配置(共享 pkg/config.KafkaConfig)。
# brokers 9093 = Pandora 端口规划(deploy/docker-compose.dev.yml,与 vanilla 9092 区分)。
kafka:
  brokers: ["127.0.0.1:9093"]
  group_id: "pandora-push"
  partition_cnt: 4
  dial_timeout: "2s"
  read_timeout: "10s"
  write_timeout: "10s"
  channel_buffer: 1024
  idempotent: true              # 防重复(配合幂等 producer)

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

push:
  # 订阅 topic 列表;不填走 kafkax.PushTopics 默认(team.update / match.progress / chat.private 3 个)。
  # 未来 player.update / friend.event / system.notify Event 落地后,在 kafkax/topics.go 加常量并追加本列表。
  topics:
    - "pandora.team.update"
    - "pandora.match.progress"
    - "pandora.chat.private"

  # 离线消息 redis ZSET TTL(每次写入刷新)。
  offline_cache_ttl: "5m"
