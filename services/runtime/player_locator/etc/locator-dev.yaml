# Pandora player_locator 服务开发期配置(W3 ⑤,W3 ⑥ 2026-06-05 重写)。
#
# - gRPC :50006 / HTTP :51006(仅 /metrics)
# - 强 Redis 依赖(redis 连不上 → 启动失败,本服务是 Pandora "玩家在哪" 唯一真源)
# - 不接 MySQL / Kafka(W3 ⑤ 范围)
# - W3 ⑥ 起 duration 字段用 pkg/config.Duration 包装,yaml 可直接写 "30s"
# - W3 ③ 起 server.grpc.enable_reflection 可控,dev: true / prod: false(零值)

server:
  grpc:
    network: tcp
    addr: ":50006"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev:开 reflection 便于 grpcurl 联调
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51006"

node:
  node_id: 1
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"          # W3 ⑥ 示范

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

locator:
  # infra.md §3.2 表中 30s heartbeat。SetLocation 每次刷 TTL,30s 不刷 → 视为离线。
  # W3 ⑥ 起可直接 yaml 写字符串:
  location_ttl: "30s"
  # placement proof 按 writer 分权；这里只提交公开 dev 值，生产由配置生成器覆盖。
  placement_account_bootstrap_proof_secret: "pandora-dev-placement-bootstrap-key-v1!"
  placement_match_start_proof_secret: "pandora-dev-placement-match-start-key-v1!"
  placement_battle_exit_proof_secret: "pandora-dev-placement-battle-exit-key-v1!"
  placement_hub_transfer_proof_secret: "pandora-dev-placement-hub-transfer-key-v1!"

# 好友在线态订阅推送 fan-out(docs/design/friend-distributed-scaling.md §13.4 / §13.5)。
# 2026-06-19:默认 enabled=false(§13.7「先拉后推」)。开启需配 kafka.brokers(往
# pandora.presence.update 生产 → push 服务投递)。洪峰把 presence/fanout 写进 killswitch 规则即降纯拉。
kafka:
  brokers: ["127.0.0.1:9093"]   # Pandora 端口(deploy/docker-compose.dev.yml,与 vanilla 9092 区分)
  group_id: "pandora-locator"
  partition_cnt: 4
  dial_timeout: "2s"
  write_timeout: "10s"
  idempotent: true

presence:
  enabled: false              # dev 默认纯拉;改 true 开订阅推送
  debounce_window: "8s"       # 上线去抖窗口(§13.4.2)
  coalesce_tick: "1s"         # 合并/flush 间隔(§13.4.3)
  kill_switch_key: "presence/fanout"  # 洪峰降级开关 key(§13.5)

# ── DS 回调服务令牌校验(审核 P1 #1)────────────────────────────────────────────
# player_locator 只校验不签发:Hub DS 经 Envoy :8444 调 SetLocation(HUB)/ReportDisconnect
# 须带 hub 令牌(由 hub_allocator 签发,sub=pod);非 HUB 状态写入只允许内部服务(DenyDS)。
# mode: off(默认;UE DS 未带令牌前必须 off)→ permissive(灰度观察)→ enforce(强制)。
# secret 必须与 hub_allocator ds_auth.secret 一致。
ds_auth:
  mode: "off"
  # 默认 legacy 不读 Hub auth record；部署激活 Model B 时必须与 hub_allocator 同步切为 redis。
  authority_mode: "legacy"
  active_heartbeat_max_age: "30s"
  secret: "pandora-dev-jwt-secret-change-me-32!"
  # authority_mode=redis 时与 allocator 共用同一 required epoch/capability lease。
  # fence:
  #   etcd_endpoints: ["127.0.0.1:2380"]
  #   etcd_prefix: "/pandora/ds-auth/"
  #   etcd_lease_ttl_sec: 15
  #   etcd_dial_timeout: "5s"
  #   keyset_revision: "pandora-ds-auth-v2-r1"
