# Pandora inventory 服务开发期配置(W5 ③,2026-06-18)。
#
# - gRPC :50015 / HTTP :51015(仅 /metrics)
# - MySQL 强依赖(pandora_trade 库:player_currency + player_items + inventory_ledger,
#   发放 / 使用 / 出售幂等 inventory_ledger uk,不变量 §9.7)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50015"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51015"

node:
  node_id: 1
  # Redis:会话现行性门只读 login 会话权威 pandora:sess(R5 复审 P0-1,共享实例)。
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
  # MySQL:dev 连本机 docker mysql 的 pandora_trade 库(强依赖,DSN 必填)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_trade?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"

inventory:
  # 保留期清理(CLAUDE.md §9 不变量 24:只增表必须有界,失效数据最多保留 90 天)。
  # inventory_ledger 超期流水 / auction_escrow closed 超期行由 sweep 周期批量删除;
  # 多副本各自跑,DELETE 幂等无需锁。缺省即以下默认值,列出便于运维一眼看到。
  sweep_interval: "5m"
  sweep_batch: 500
  ledger_retention_days: 90   # 幂等流水保留天数(≫ 一切重试窗口;≥ mail 可领窗口闭环见 conf.go)
  escrow_retention_days: 90   # closed 托管行保留天数(active 行永不清理)

  # item_rules: 道具大厅经济规则表(留空 = 任何道具都不可大厅使用 / 出售,安全默认)。
  # 正式项目应来自配置表服务;W5 ③ demo 给两条样例(经验书可用,材料可卖)。
  item_rules:
    - item_config_id: 2001     # 经验书:大厅可用
      usable: true
    - item_config_id: 3001     # 材料:可出售,单价 10 金币
      sellable: true
      sell_unit_price: 10

# 背包域(pandora.bag.v1,bag-domain.md;phase 1 由本进程承载)。
# dsn 为空 = 未启用(不注册 BagService)。dev 直接开启联调;
# 生产启用前必须先重放 14-bag-tables.sql(启动 schema gate 会 fail-fast 提示)。
bag:
  dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_bag?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
  owner_addr: "127.0.0.1:50017" # 集群生成器改写为 owner:50017；背包写路径 fail-closed 校验 owner
  # 额度(五要件④,反作弊封顶;必须显著高于合法玩法产出)
  max_journal_batch: 64
  max_items_per_op: 64
  hourly_journal_quota: 2000
  # 段基础容量(未配置的段 fail-closed；身上容量用于 LoadBag/扩容规则，物品权威仍在 DS)
  section_capacities:
    - bag_type: 0        # 身上(基础容量;扩容规则校验与 LoadBag 权威下发使用)
      capacity: 100
    - bag_type: 1        # 仓库
      capacity: 200
    - bag_type: 100      # 活动背包样例段(联调用;活动开启由运营写 bag_generation)
      capacity: 50
  journal_retention_days: 90

# 会话现行性门(R5 复审 P0-1,INC-20260722-004):校验客户端面请求 jti == login 会话权威
# (pandora:sess,node.redis_client 指向的共享 Redis)当前一代,顶号后旧 JWT 立即失效。
# dev 宽松档 require=false(gate 已装配时顶号/登出照常拒;仅漏配端点时跳过判定);
# -Prod 产物由 gen_cluster_config.ps1 机械置 true(漏配端点拒启)。
session_gate:
  require: false
