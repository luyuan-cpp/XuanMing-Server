# Pandora auction 服务开发期配置(2026-06-19)。
#
# - gRPC :50016 / HTTP :51016(仅 /metrics)
# - MySQL 强依赖(撮合权威库 pandora_auction:auction_orders + auction_matches)
#   单库模式用 node.mysql_client.dsn;分库模式填 node.mysql_client.shards(按 market_id 路由)
# - Redis 强依赖(订单簿 ZSET pandora:auction:book:{market_id}:ask/bid)
# - Kafka 弱依赖(成交 pandora.auction.match + 流转审计 pandora.auction.audit)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50016"
    timeout: "15s"
    enable_reflection: true     # dev 开;prod 关
    max_conn_age: "15m"         # 达龄 GOAWAY 重拨,滚动更新时流量能滚到新副本(zero-downtime §6.2)
  http:
    network: tcp
    addr: ":51016"

node:
  node_id: 1
  mysql_client:
    # 单库模式(W1):连 pandora_auction。分库时改填 shards 列表(>=2 个 DSN,按 market_id % N 路由)。
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_auction?parseTime=true&charset=utf8mb4&loc=UTC"
    max_open_conns: 20
    max_idle_conns: 10
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

# kafka producer 配置(发布 pandora.auction.match + pandora.auction.audit)
# brokers 9093 = Pandora 端口规划(与 vanilla 9092 区分)
kafka:
  brokers: ["127.0.0.1:9093"]
  dial_timeout: "2s"
  write_timeout: "5s"
  idempotent: true

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

auction:
  max_quantity_per_order: 1000000
  max_price: 1000000000
  default_list_limit: 50
  max_list_limit: 200
  # inventory 内网 gRPC 地址(:50015)。配上 → 成交走真实结算(SettleAuctionMatch:
  # 卖↔买资产原子对转 + match_id 幂等);仅无交易联调/单测可留空并显式设 allow_noop_settlement=true。
  inventory_addr: "127.0.0.1:50015"
  # 挂单存活时长(秒)。> 0 启用过期清扫:超 TTL 仍未成交的挂单自动 EXPIRED、移出簿、退还 escrow。
  # dev 设 7 天;0 = 永不过期。
  order_ttl_seconds: 604800
  expiry_sweep_interval_seconds: 60   # 过期清扫扫描间隔
  expiry_sweep_batch: 200             # 单批最多处理条数
  # 跨实例 per-market 单写者 Redis 锁(限制#2)。单实例 dev 留 false(仅进程内锁);
  # 多实例部署置 true,需配合一致性哈希路由(同一 market 固定落同一实例)降低锁竞争。
  cross_instance_lock: false
  market_lock_ttl_seconds: 30         # 锁 TTL(≤30s,不变量 §10)
  market_lock_max_wait_ms: 3000       # 抢锁最大等待,超时返回 ERR_AUCTION_MARKET_BUSY
